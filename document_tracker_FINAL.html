   BUSINESS LOGIC
   ══════════════════════════════════════════════════════
   Every deal has TWO parties:

   CLIENT (Renter) — the corporation or individual renting
     • Rental Agreement  — lease terms, rate, dates, rules
     • DocuSign           — signature packet executing the deal
     • Payment            — deposit confirmation / full payment
     • Corporate Auth     — internal corporate approval (if applicable)

   HOMEOWNER (Property Owner) — the person who owns the home
     • W-9                — IRS tax form (Patron pays homeowner income)
     • Property Agreement — authorization for Patron to rent the home
     • Insurance          — liability coverage certificate on property
     • Home Photos        — marketing photos of the property

   Patron Properties sits between both parties. The tracker
   must show WHO you're chasing for each missing document.
   ══════════════════════════════════════════════════════ */

/* ── Helpers ── */
const REFERENCE_DATE = new Date('2027-03-01');
const allDocs = DEALS.flatMap(d => [...d.clientDocs, ...d.homeownerDocs]);
const docIcon = (type) => ({ 'Rental Agreement': '📝', 'DocuSign': '✍️', 'Payment': '💳', 'Corporate Auth': '🏛️', 'W-9': '📋', 'Property Agreement': '🏠', 'Insurance': '🛡️', 'Home Photos': '📸' }[type] || '📄');

/* Days remaining from reference date to due date. Negative = overdue. */
const daysUntilDue = (dueDate) => {
  if (!dueDate) return null;
  const due = new Date(dueDate);
  const diffMs = due.getTime() - REFERENCE_DATE.getTime();
  return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
};

/* Find the most urgent incomplete document for a deal */
const getMostUrgentDoc = (deal) => {
  const allDealDocs = [
    ...deal.clientDocs.map(d => ({ ...d, party: 'client' })),
    ...deal.homeownerDocs.map(d => ({ ...d, party: 'homeowner' })),
  ];
  const incomplete = allDealDocs.filter(d => d.status !== 'Complete' && d.status !== 'N/A' && d.dueDate);
  if (incomplete.length === 0) return null;
  incomplete.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
  return incomplete[0];
};

/* Build next-action suggestion text */
const buildNextAction = (deal) => {
  const doc = getMostUrgentDoc(deal);
  if (!doc) return null;
  const days = daysUntilDue(doc.dueDate);
  const contactName = doc.party === 'client'
    ? (deal.client ? deal.client.contact : 'client')
    : deal.homeowner.name;

  if (doc.status === 'Overdue' || (days !== null && days < 0)) {
    return { text: `Follow up with ${contactName} about ${doc.docType} (overdue ${Math.abs(days)} days)`, urgency: 'red' };
  }
  if (doc.status === 'Rejected') {
    return { text: `Resubmit revised ${doc.docType} to ${contactName}`, urgency: 'red' };
  }
  if (doc.status === 'Requested') {
    return { text: `Send DocuSign reminder to ${contactName}`, urgency: days !== null && days <= 7 ? 'amber' : 'green' };
  }
  if (doc.status === 'Pending') {
    if (doc.docType === 'Insurance') {
      return { text: `Request insurance renewal from ${contactName}`, urgency: days !== null && days <= 7 ? 'amber' : 'green' };
    }
    if (doc.docType === 'Payment') {
      return { text: `Follow up on payment with ${contactName} — due ${new Date(doc.dueDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`, urgency: days !== null && days <= 7 ? 'amber' : 'green' };
    }
    return { text: `Follow up with ${contactName} about ${doc.docType} — ${days} days remaining`, urgency: days !== null && days <= 7 ? 'amber' : 'green' };
  }
  return { text: `Check status of ${doc.docType} with ${contactName}`, urgency: 'green' };
};

  const [expandedDocs, setExpandedDocs] = useState(new Set());
  const [collapsedDeals, setCollapsedDeals] = useState(new Set());

  const toggleDoc = (id) => { const n = new Set(expandedDocs); n.has(id) ? n.delete(id) : n.add(id); setExpandedDocs(n); };
  const toggleDeal = (id) => { const n = new Set(collapsedDeals); n.has(id) ? n.delete(id) : n.add(id); setCollapsedDeals(n); };

  /* KPIs */
  const total = allDocs.filter(d => d.status !== 'N/A').length;
  const complete = allDocs.filter(d => d.status === 'Complete').length;
  const pending = allDocs.filter(d => d.status === 'Pending' || d.status === 'Requested').length;
  const overdue = allDocs.filter(d => d.status === 'Overdue').length;
  const rejected = allDocs.filter(d => d.status === 'Rejected').length;
  const completionRate = Math.round((complete / total) * 100);

  /* Status counts for filter buttons */
  const statusCounts = { all: total, Complete: complete, Pending: allDocs.filter(d => d.status === 'Pending').length, Overdue: overdue, Requested: allDocs.filter(d => d.status === 'Requested').length, Rejected: rejected };

  /* Filter deals */
  const matchesFilters = (doc) => {
    if (doc.status === 'N/A') return partyFilter !== 'all' ? false : statusFilter === 'all';
    const matchStatus = statusFilter === 'all' || doc.status === statusFilter;
    return matchStatus;
  };

  const filteredDeals = useMemo(() => {
    return DEALS.filter(deal => {
      const s = search.toLowerCase();
      const matchSearch = !s || deal.dealName.toLowerCase().includes(s) || (deal.client && deal.client.name.toLowerCase().includes(s)) || deal.homeowner.name.toLowerCase().includes(s) || deal.homeowner.property.toLowerCase().includes(s);
      if (!matchSearch) return false;

      const clientVisible = partyFilter !== 'homeowner' && deal.clientDocs.length > 0 && deal.clientDocs.some(matchesFilters);
      const homeownerVisible = partyFilter !== 'client' && deal.homeownerDocs.some(matchesFilters);
      // Show unassigned homeowners when viewing all or homeowner docs
      const showUnassigned = !deal.client && partyFilter !== 'client';
      return clientVisible || homeownerVisible || showUnassigned;
    });
  }, [search, statusFilter, partyFilter]);

  /* Deal progress */
  const dealProgress = (deal) => {
    const docs = [...deal.clientDocs, ...deal.homeownerDocs].filter(d => d.status !== 'N/A');
    const done = docs.filter(d => d.status === 'Complete').length;
    return { done, total: docs.length, pct: docs.length > 0 ? Math.round((done / docs.length) * 100) : 0 };
  };

  /* Party progress */
  const partyProgress = (docs) => {
    const valid = docs.filter(d => d.status !== 'N/A');
    const done = valid.filter(d => d.status === 'Complete').length;
    return { done, total: valid.length, pct: valid.length > 0 ? Math.round((done / valid.length) * 100) : 0 };
  };

  /* Status Badge */
  const Badge = ({ status }) => {
    const s = STATUS_MAP[status] || STATUS_MAP.Pending;
    return (
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 12, background: s.bg, color: s.text }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot }} />
        {status}
      </span>
    );
  };

  /* Party Tag */
  const PartyTag = ({ party }) => {
    const p = PARTY_COLORS[party];
    return (
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 4, background: p.bg, color: p.text, border: `1px solid ${p.border}`, textTransform: 'uppercase', letterSpacing: 0.5 }}>
        {p.icon} {p.label}
      </span>
    );
  };

  /* Progress Bar */
  const ProgressBar = ({ pct, size = 'normal' }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div style={{ flex: 1, height: size === 'small' ? 4 : 6, background: '#e8f0ed', borderRadius: 3, overflow: 'hidden', minWidth: 50 }}>
        <div style={{ width: `${pct}%`, height: '100%', background: pct === 100 ? 'linear-gradient(90deg, #34c759, #27ae20)' : 'linear-gradient(90deg, #006B54, #005543)', borderRadius: 3, transition: 'width 0.3s' }} />
      </div>
      <span style={{ fontSize: 11, fontWeight: 700, color: pct === 100 ? '#15803D' : '#006B54', minWidth: 30, textAlign: 'right' }}>{pct}%</span>
    </div>
  );

  /* Deadline Countdown Badge */
  const DeadlineBadge = ({ dueDate, status }) => {
    if (!dueDate || status === 'Complete' || status === 'N/A') return null;
    const days = daysUntilDue(dueDate);
    if (days === null) return null;
    let bg, color, label;
    if (days < 0) {
      bg = 'rgba(197,48,48,0.12)'; color = '#991B1B'; label = `${Math.abs(days)} days overdue`;
    } else if (days <= 7) {
      bg = 'rgba(255,149,0,0.12)'; color = '#B45309'; label = `${days} day${days !== 1 ? 's' : ''} left`;
    } else {
      bg = 'rgba(52,199,89,0.12)'; color = '#15803D'; label = `${days} days left`;
    }
    return (
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 10, fontWeight: 600, padding: '2px 8px', borderRadius: 10, background: bg, color, whiteSpace: 'nowrap' }}>
        {days < 0 ? '⚠' : days <= 7 ? '⏰' : '📅'} {label}
      </span>
    );
  };

  /* Completion Ring (SVG circular progress) */
  const CompletionRing = ({ done, total }) => {
    const size = 44;
    const strokeWidth = 4;
    const radius = (size - strokeWidth) / 2;
    const circumference = 2 * Math.PI * radius;
    const pct = total > 0 ? done / total : 0;
    const offset = circumference * (1 - pct);
    const ringColor = pct > 0.75 ? '#34c759' : pct >= 0.5 ? '#ff9500' : '#c53030';
    return (
      <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
        <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#e8f0ed" strokeWidth={strokeWidth} />
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={ringColor} strokeWidth={strokeWidth}
            strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
            style={{ transition: 'stroke-dashoffset 0.4s ease' }} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: ringColor, lineHeight: 1 }}>
          {done}/{total}
        </div>
      </div>
    );
  };

  /* Next Action Banner */
  const NextActionBanner = ({ deal }) => {
    const action = buildNextAction(deal);
    if (!action) return (
      <div style={{ padding: '10px 20px', background: 'rgba(52,199,89,0.05)', borderTop: '1px solid #e8f0ed', display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 14 }}>✅</span>
        <span style={{ fontSize: 12, fontWeight: 600, color: '#15803D' }}>All documents complete — deal is ready</span>
      </div>
    );
    const colors = {
      red:   { bg: 'rgba(197,48,48,0.05)', border: '#fca5a5', text: '#991B1B', icon: '🚨' },
      amber: { bg: 'rgba(255,149,0,0.05)', border: '#fdba74', text: '#92400E', icon: '⚡' },
      green: { bg: 'rgba(0,107,84,0.04)', border: '#a7f3d0', text: '#006B54', icon: '👉' },
    };
    const c = colors[action.urgency] || colors.green;
    return (
      <div style={{ padding: '10px 20px', background: c.bg, borderTop: `1px solid ${c.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 13 }}>{c.icon}</span>
        <span style={{ fontSize: 11, fontWeight: 700, color: c.text, textTransform: 'uppercase', letterSpacing: 0.5 }}>Next Action</span>
        <span style={{ fontSize: 12, fontWeight: 500, color: c.text }}>{action.text}</span>
      </div>
    );
  };

  /* Document Row */
  const DocRow = ({ doc, party }) => {
    const isExpanded = expandedDocs.has(doc.id);
    const isOverdue = doc.dueDate && new Date(doc.dueDate) < new Date() && doc.status !== 'Complete' && doc.status !== 'N/A';
    const canResend = doc.sentDate && doc.status !== 'Complete';

    return [
      <tr key={`doc-${doc.id}`}
        style={{ borderBottom: '1px solid #f0f0ef', cursor: 'pointer', background: isExpanded ? 'rgba(0,107,84,0.03)' : 'transparent' }}
        onClick={() => toggleDoc(doc.id)}>
        <td style={{ padding: '10px 16px 10px 48px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 9, color: '#888', transition: 'transform 0.2s', transform: isExpanded ? 'rotate(90deg)' : 'none', display: 'inline-block' }}>▶</span>
            <span style={{ fontSize: 16, lineHeight: 1 }}>{docIcon(doc.docType)}</span>
            <span style={{ fontWeight: 600, color: '#1a1a1a', fontSize: 13 }}>{doc.docType}</span>
          </div>
        </td>
        <td style={{ padding: '10px 16px' }}><Badge status={doc.status} /></td>
        <td style={{ padding: '10px 16px', fontSize: 12, color: '#555' }}>{doc.assignedTo}</td>
        <td style={{ padding: '10px 16px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 12, color: isOverdue ? '#c53030' : '#555', fontWeight: isOverdue ? 600 : 400 }}>
              {doc.dueDate ? new Date(doc.dueDate).toLocaleDateString() : '—'}
            </span>
            <DeadlineBadge dueDate={doc.dueDate} status={doc.status} />
          </div>
        </td>
        <td style={{ padding: '10px 16px', fontSize: 12, color: '#888' }}>
          {doc.lastUpdated ? new Date(doc.lastUpdated).toLocaleDateString() : '—'}
        </td>
        <td style={{ padding: '10px 16px' }}>
          <div style={{ display: 'flex', gap: 4 }} onClick={e => e.stopPropagation()}>
            {doc.uploads && doc.uploads.length > 0 && (
              <button style={{ padding: '4px 10px', background: '#007aff', color: '#fff', border: 'none', borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: 'pointer' }}>View</button>
            )}
            <button style={{ padding: '4px 10px', background: doc.status === 'N/A' ? '#e0e0e0' : '#006B54', color: doc.status === 'N/A' ? '#999' : '#fff', border: 'none', borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: doc.status === 'N/A' ? 'default' : 'pointer', pointerEvents: doc.status === 'N/A' ? 'none' : 'auto' }}>Remind</button>
            {canResend && (
              <button style={{ padding: '4px 10px', background: '#fff', color: '#006B54', border: '1px solid #006B54', borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: 'pointer' }}>Resend</button>
            )}
            <button style={{ padding: '4px 10px', background: '#fff', color: '#555', border: '1px solid #e0e0e0', borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: 'pointer' }}>Upload</button>
          </div>
        </td>
      </tr>,

      isExpanded && (
        <tr key={`exp-${doc.id}`} style={{ background: 'rgba(0,107,84,0.02)' }}>
          <td colSpan="6" style={{ padding: '0 16px 12px 56px' }}>
            <div style={{ padding: '14px 18px', background: '#fff', borderRadius: 8, border: '1px solid #e8e8e8', marginTop: 2 }}>
              {/* Notes */}
              <div style={{ fontSize: 13, color: '#555', lineHeight: 1.5, marginBottom: doc.uploads.length > 0 || doc.versions.length > 0 ? 14 : 0 }}>
                {doc.notes}
              </div>

              {/* Sent info */}
              {doc.sentDate && (
                <div style={{ fontSize: 11, color: '#888', marginBottom: 10 }}>
                  Originally sent: <span style={{ fontWeight: 600, color: '#555' }}>{new Date(doc.sentDate).toLocaleDateString()}</span>
                </div>
              )}

              {/* Uploads */}
              {doc.uploads.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Files</div>
                  {doc.uploads.map((u, i) => (
                    <div key={i} style={{ fontSize: 12, color: '#555', padding: '4px 0' }}>
                      <span style={{ fontWeight: 600, color: '#1a1a1a' }}>{u.file}</span>
                      <span style={{ color: '#888' }}> — {u.date} by {u.by}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Versions */}
              {doc.versions.length > 0 && (
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Versions</div>
                  {doc.versions.map((v, i) => (
                    <div key={i} style={{ fontSize: 12, color: '#555', padding: '4px 0' }}>
                      <span style={{ fontWeight: 600 }}>v{v.v}</span> — {v.date}
                      <span style={{ marginLeft: 6, fontSize: 10, padding: '1px 6px', borderRadius: 4, background: v.status === 'Final' || v.status === 'Fully Executed' || v.status === 'Executed' || v.status === 'Verified' || v.status === 'Confirmed' || v.status === 'Published' || v.status === 'Filed' ? 'rgba(52,199,89,0.12)' : v.status === 'Rejected' ? 'rgba(197,48,48,0.12)' : 'rgba(0,107,84,0.06)', color: v.status === 'Rejected' ? '#991B1B' : v.status === 'Final' || v.status === 'Fully Executed' || v.status === 'Executed' || v.status === 'Verified' || v.status === 'Confirmed' || v.status === 'Published' || v.status === 'Filed' ? '#15803D' : '#006B54' }}>{v.status}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </td>
        </tr>
      ),
    ];
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Branded Gradient Header ── */}
      <header style={{ background: 'linear-gradient(135deg, #006B54 0%, #004D3B 100%)', color: '#fff', padding: '20px 32px', boxShadow: '0 2px 8px rgba(0,0,0,0.12)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5 }}>Document Tracker</h1>
            <p style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>Patron Properties · Masters 2027</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button style={{ padding: '8px 16px', background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>Export</button>
            <button style={{ padding: '8px 16px', background: '#fff', color: '#006B54', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>+ Request Doc</button>
          </div>
        </div>
      </header>

      {/* ── KPI Bar ── */}
      <div style={{ background: '#fff', padding: '20px 32px', borderBottom: '1px solid #e0e0e0', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 24 }}>
        {[
          { label: 'Total Documents', value: total, color: '#006B54' },
          { label: 'Complete', value: complete, color: '#15803D' },
          { label: 'Pending / Requested', value: pending, color: '#B45309' },
          { label: 'Overdue', value: overdue, color: overdue > 0 ? '#c53030' : '#006B54' },
          { label: 'Rejected', value: rejected, color: rejected > 0 ? '#c53030' : '#006B54' },
          { label: 'Deals Assigned', value: `${DEALS.filter(d => d.assignment).length}/${DEALS.length}`, color: DEALS.some(d => !d.assignment) ? '#B45309' : '#15803D' },
          { label: 'Completion', value: `${completionRate}%`, color: '#006B54' },
        ].map(kpi => (
          <div key={kpi.label}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>{kpi.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: kpi.color, lineHeight: 1 }}>{kpi.value}</div>
          </div>
        ))}
        <div style={{ gridColumn: '1 / -1' }}>
          <div style={{ width: '100%', height: 6, background: '#e8f0ed', borderRadius: 3, overflow: 'hidden' }}>
            <div style={{ width: `${completionRate}%`, height: '100%', background: 'linear-gradient(90deg, #006B54, #005543)', borderRadius: 3 }} />
          </div>
        </div>
      </div>

      {/* ── Masters Banner ── */}
      <div style={{ background: 'linear-gradient(90deg, #D4AF37 0%, #F4E4A6 50%, #D4AF37 100%)', color: '#333', padding: '10px 32px', textAlign: 'center', fontSize: 13, fontWeight: 600, letterSpacing: 0.5, borderBottom: '2px solid #B8941C' }}>
        The Masters Tournament · April 7–13, 2027 · Augusta National Golf Club
      </div>

      {/* ── Filter Bar ── */}
      <div style={{ background: '#fff', padding: '14px 32px', borderBottom: '1px solid #e0e0e0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search deals, clients, homeowners…"
            style={{ width: 260, padding: '8px 12px', fontSize: 13, border: '1px solid #e0e0e0', borderRadius: 6, outline: 'none', background: '#f5f5f4' }} />

          <div style={{ width: 1, height: 28, background: '#e0e0e0' }} />

          {/* Party filter */}
          {[
            { id: 'all', label: 'All Parties', icon: '📋' },
            { id: 'client', label: 'Client Docs', icon: '🏢' },
            { id: 'homeowner', label: 'Homeowner Docs', icon: '🏠' },
          ].map(f => {
            const isActive = partyFilter === f.id;
            return (
              <button key={f.id} onClick={() => setPartyFilter(f.id)}
                style={{
                  padding: '5px 12px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  border: `2px solid ${isActive ? '#006B54' : '#e0e0e0'}`,
                  background: isActive ? '#006B54' : '#fff',
                  color: isActive ? '#fff' : '#006B54',
                  transition: 'all 0.15s',
                }}>
                {f.icon} {f.label}
              </button>
            );
          })}

          <div style={{ width: 1, height: 28, background: '#e0e0e0' }} />

          {/* Status filter */}
          {[
            { id: 'all', label: 'All', color: '#006B54' },
            { id: 'Complete', label: 'Complete', color: '#15803D' },
            { id: 'Pending', label: 'Pending', color: '#B45309' },
            { id: 'Overdue', label: 'Overdue', color: '#c53030' },
            { id: 'Requested', label: 'Requested', color: '#1D4ED8' },
            { id: 'Rejected', label: 'Rejected', color: '#991B1B' },
          ].map(f => {
            const isActive = statusFilter === f.id;
            return (
              <button key={f.id} onClick={() => setStatusFilter(f.id)}
                style={{
                  padding: '5px 10px', borderRadius: 20, fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  border: `1.5px solid ${isActive ? f.color : '#e0e0e0'}`,
                  background: isActive ? f.color : '#fff',
                  color: isActive ? '#fff' : f.color,
                  transition: 'all 0.15s',
                  display: 'flex', alignItems: 'center', gap: 4,
                }}>
                {f.label}
                <span style={{ fontSize: 9, opacity: 0.8 }}>{statusCounts[f.id]}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* ── Deal Document Cards ── */}
      <div style={{ flex: 1, padding: '24px 32px' }}>
        {filteredDeals.length === 0 ? (
          <div style={{ background: '#fff', borderRadius: 10, padding: '60px 24px', textAlign: 'center', color: '#888', border: '1px solid #e0e0e0' }}>
            No documents match your filters.
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            {filteredDeals.map(deal => {
              const prog = dealProgress(deal);
              const isCollapsed = collapsedDeals.has(deal.id);
              const clientProg = partyProgress(deal.clientDocs);
              const ownerProg = partyProgress(deal.homeownerDocs);
              const showClient = partyFilter !== 'homeowner';
              const showOwner = partyFilter !== 'client';

              return (
                <div key={deal.id} style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', overflow: 'hidden' }}>

                  {/* Deal Header */}
                  <div onClick={() => toggleDeal(deal.id)}
                    style={{ padding: '16px 20px', cursor: 'pointer', borderBottom: isCollapsed ? 'none' : '1px solid #e0e0e0', background: prog.pct === 100 ? 'rgba(52,199,89,0.04)' : '#fafaf9' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                        <span style={{ fontSize: 11, color: '#888', transform: isCollapsed ? 'rotate(0deg)' : 'rotate(90deg)', transition: 'transform 0.2s', display: 'inline-block' }}>▶</span>
                        <div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: '#1a1a1a', letterSpacing: -0.2 }}>{deal.id}</div>
                          <div style={{ fontSize: 12, color: '#888', marginTop: 2 }}>
                            {deal.client ? deal.client.type : 'Unassigned'} · {deal.rate} · {deal.dates}
                          </div>
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                        <CompletionRing done={prog.done} total={prog.total} />
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontSize: 11, color: '#888', whiteSpace: 'nowrap' }}>{prog.done}/{prog.total} docs</div>
                        </div>
                        <div style={{ width: 120 }}>
                          <ProgressBar pct={prog.pct} size="small" />
                        </div>
                      </div>
                    </div>

                    {/* ── Assignment Bar: Client ↔ Homeowner ── */}
                    <div style={{ marginTop: 10, marginLeft: 23, display: 'flex', alignItems: 'center', gap: 0 }}>

                      {deal.assignment ? (
                        <>
                          {/* Client side */}
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#EFF6FF', padding: '6px 12px', borderRadius: '8px 0 0 8px', border: '1px solid #93C5FD', borderRight: 'none' }}>
                            <span style={{ fontSize: 14 }}>🏢</span>
                            <div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: '#1E40AF', lineHeight: 1.2 }}>{deal.client.name}</div>
                              <div style={{ fontSize: 10, color: '#60A5FA' }}>{deal.client.contact}</div>
                            </div>
                          </div>

                          {/* Assignment link */}
                          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '4px 12px', background: 'linear-gradient(180deg, #EFF6FF 0%, #f8f8f7 50%, #FEF7ED 100%)', border: '1px solid #e0e0e0', borderLeft: 'none', borderRight: 'none' }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: '#006B54', letterSpacing: 0.5, textTransform: 'uppercase', lineHeight: 1 }}>Assigned</div>
                            <div style={{ fontSize: 9, color: '#888', lineHeight: 1.3 }}>{new Date(deal.assignment.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                            <div style={{ fontSize: 9, color: '#aaa' }}>by {deal.assignment.by}</div>
                          </div>

                          {/* Homeowner side */}
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#FEF7ED', padding: '6px 12px', borderRadius: '0 8px 8px 0', border: '1px solid #FDBA74', borderLeft: 'none' }}>
                            <span style={{ fontSize: 14 }}>🏠</span>
                            <div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: '#92400E', lineHeight: 1.2 }}>{deal.homeowner.name}</div>
                              <div style={{ fontSize: 10, color: '#D97706' }}>{deal.homeowner.property}</div>
                            </div>
                          </div>

                          {/* Assignment note */}
                          <div style={{ marginLeft: 10, fontSize: 10, color: '#888', fontStyle: 'italic', maxWidth: 300, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {deal.assignment.note}
                          </div>
                        </>
                      ) : (
                        <>
                          {/* Unassigned — homeowner ready, no client yet */}
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#FEF7ED', padding: '6px 12px', borderRadius: '8px 0 0 8px', border: '1px solid #FDBA74', borderRight: 'none' }}>
                            <span style={{ fontSize: 14 }}>🏠</span>
                            <div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: '#92400E', lineHeight: 1.2 }}>{deal.homeowner.name}</div>
                              <div style={{ fontSize: 10, color: '#D97706' }}>{deal.homeowner.property}</div>
                            </div>
                          </div>

                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 14px', borderRadius: '0 8px 8px 0', border: '2px dashed #ff9500', background: 'rgba(255,149,0,0.06)' }}>
                            <span style={{ fontSize: 14 }}>⏳</span>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: '#B45309', lineHeight: 1.2 }}>Awaiting Client Assignment</div>
                              <div style={{ fontSize: 10, color: '#D97706' }}>Homeowner docs in progress</div>
                            </div>
                          </div>

                          <button onClick={e => { e.stopPropagation(); alert('Assign Client flow — would open client selection modal'); }}
                            style={{ marginLeft: 10, padding: '5px 14px', background: '#006B54', color: '#fff', border: 'none', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                            + Assign Client
                          </button>
                        </>
                      )}
                    </div>
                  </div>

                  {/* Document Tables (collapsed/expanded) */}
                  {!isCollapsed && (
                    <div>
                      {/* Client Documents */}
                      {showClient && deal.client && deal.clientDocs.length > 0 && (
                        <div>
                          <div style={{ padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'rgba(239,246,255,0.5)', borderBottom: '1px solid #f0f0ef' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <PartyTag party="client" />
                              <span style={{ fontSize: 12, fontWeight: 600, color: '#555' }}>{deal.client.name}</span>
                              <span style={{ fontSize: 11, color: '#888' }}>· {deal.client.contact}</span>
                            </div>
                            <div style={{ fontSize: 11, color: '#888' }}>{clientProg.done}/{clientProg.total} complete</div>
                          </div>
                          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                            <tbody>
                              {deal.clientDocs.filter(matchesFilters).map(doc => <DocRow key={doc.id} doc={doc} party="client" />)}
                            </tbody>
                          </table>
                        </div>
                      )}
                      {/* No client assigned yet */}
                      {showClient && !deal.client && (
                        <div style={{ padding: '16px 20px', background: 'rgba(255,149,0,0.04)', borderBottom: '1px solid #f0f0ef', display: 'flex', alignItems: 'center', gap: 10 }}>
                          <span style={{ fontSize: 16 }}>⏳</span>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: '#B45309' }}>No client assigned yet</div>
                            <div style={{ fontSize: 11, color: '#888' }}>Client documents will appear once a client is assigned to this homeowner</div>
                          </div>
                        </div>
                      )}

                      {/* Homeowner Documents */}
                      {showOwner && (
                        <div>
                          <div style={{ padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'rgba(254,247,237,0.5)', borderBottom: '1px solid #f0f0ef', borderTop: showClient ? '1px solid #e0e0e0' : 'none' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <PartyTag party="homeowner" />
                              <span style={{ fontSize: 12, fontWeight: 600, color: '#555' }}>{deal.homeowner.name}</span>
                              <span style={{ fontSize: 11, color: '#888' }}>· {deal.homeowner.property}</span>
                            </div>
                            <div style={{ fontSize: 11, color: '#888' }}>{ownerProg.done}/{ownerProg.total} complete</div>
                          </div>
                          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                            <tbody>
                              {deal.homeownerDocs.filter(matchesFilters).map(doc => <DocRow key={doc.id} doc={doc} party="homeowner" />)}
                            </tbody>
                          </table>
                        </div>
                      )}

                      {/* Next Action Suggestion */}
                      <NextActionBanner deal={deal} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Footer */}
        <div style={{ textAlign: 'center', padding: '20px 0', fontSize: 12, color: '#888' }}>
          {filteredDeals.length} deals · {allDocs.filter(d => d.status !== 'N/A').length} total documents
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
