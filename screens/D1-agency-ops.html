<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patron Properties — Agency Operations</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    .app-container {
      display: flex;
      height: 100vh;
      background: #f8f8f8;
    }

    /* Navigation */
    .nav-sidebar {
      width: 220px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 24px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .nav-header {
      margin-bottom: 32px;
    }

    .nav-logo {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .nav-title {
      font-size: 13px;
      color: #999;
      font-weight: 400;
    }

    .nav-items {
      flex: 1;
    }

    .nav-item {
      padding: 12px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }

    .nav-item:hover {
      background: #f0f0f0;
      color: #333;
    }

    .nav-item.active {
      background: #f0f0f0;
      color: #000;
      font-weight: 600;
    }

    .nav-footer {
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
      font-size: 12px;
      color: #999;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 600;
      color: #000;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 13px;
      color: #666;
    }

    .header-right {
      text-align: right;
    }

    .weather-widget {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .time-widget {
      font-size: 12px;
      color: #999;
    }

    /* Content Area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    /* View: Today */
    .today-view {
      display: grid;
      gap: 24px;
    }

    .greeting {
      font-size: 28px;
      font-weight: 600;
      color: #000;
      margin-bottom: 8px;
    }

    .day-indicator {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #000;
      margin-bottom: 16px;
    }

    .schedule-grid {
      display: grid;
      gap: 12px;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 6px;
      border-left: 4px solid #666;
      font-size: 13px;
    }

    .schedule-item.arrival {
      border-left-color: #4a90e2;
    }

    .schedule-item.departure {
      border-left-color: #e94b3c;
    }

    .schedule-item.service {
      border-left-color: #7ed321;
    }

    .schedule-item.cleaning {
      border-left-color: #f5a623;
    }

    .schedule-time {
      font-weight: 600;
      color: #333;
      min-width: 60px;
    }

    .schedule-desc {
      flex: 1;
      margin-left: 16px;
      color: #666;
    }

    .schedule-house {
      font-size: 11px;
      color: #999;
      background: rgba(0,0,0,0.04);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .issues-list {
      display: grid;
      gap: 12px;
    }

    .issue-card {
      padding: 16px;
      background: #f8f8f8;
      border-radius: 6px;
      border-left: 4px solid;
    }

    .issue-card.red {
      border-left-color: #e94b3c;
      background: rgba(233, 75, 60, 0.05);
    }

    .issue-card.amber {
      border-left-color: #f5a623;
      background: rgba(245, 166, 35, 0.05);
    }

    .issue-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .issue-title {
      font-size: 13px;
      font-weight: 600;
      color: #000;
    }

    .issue-status {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .issue-status.urgent {
      color: #e94b3c;
    }

    .issue-status.attention {
      color: #f5a623;
    }

    .issue-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .issue-time {
      font-size: 11px;
      color: #999;
    }

    /* View: Houses */
    .houses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .house-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .house-card:hover {
      border-color: #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .house-header {
      background: #f8f8f8;
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .house-name {
      font-size: 14px;
      font-weight: 600;
      color: #000;
      margin-bottom: 4px;
    }

    .house-address {
      font-size: 12px;
      color: #666;
    }

    .house-body {
      padding: 16px;
    }

    .house-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .house-stat-label {
      color: #666;
    }

    .house-stat-value {
      font-weight: 600;
      color: #000;
    }

    .house-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
    }

    .room-indicator {
      text-align: center;
      padding: 8px 4px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 11px;
    }

    .room-indicator.occupied {
      background: #4a90e2;
      color: #ffffff;
      font-weight: 600;
    }

    .room-indicator.vacant {
      background: #f0f0f0;
      color: #999;
    }

    .room-indicator.cleaning {
      background: #f5a623;
      color: #ffffff;
      font-weight: 600;
    }

    .room-label {
      display: block;
      font-size: 9px;
      margin-top: 2px;
    }

    /* View: Guests */
    .guests-table {
      width: 100%;
      background: #ffffff;
      border-collapse: collapse;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .guests-table thead {
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
    }

    .guests-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guests-table td {
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #e0e0e0;
    }

    .guests-table tr:last-child td {
      border-bottom: none;
    }

    .guest-name {
      font-weight: 600;
      color: #000;
    }

    .guest-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guest-status.in-house {
      background: #4a90e2;
      color: #ffffff;
    }

    .guest-status.arriving {
      background: #7ed321;
      color: #ffffff;
    }

    .guest-status.departing {
      background: #e94b3c;
      color: #ffffff;
    }

    /* View: Schedule */
    .week-timeline {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .day-column {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .day-column.today {
      border: 2px solid #000;
    }

    .day-header {
      background: #f8f8f8;
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      text-align: center;
    }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: #000;
    }

    .day-date {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .day-column.today .day-header {
      background: #000;
      color: #fff;
    }

    .day-column.today .day-name {
      color: #fff;
    }

    .day-column.today .day-date {
      color: #ccc;
    }

    .day-events {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 200px;
    }

    .day-event {
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      color: #ffffff;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .day-event.arrival {
      background: #4a90e2;
    }

    .day-event.departure {
      background: #e94b3c;
    }

    .day-event.service {
      background: #7ed321;
    }

    .day-event.cleaning {
      background: #f5a623;
    }

    /* View: Issues */
    .issues-view {
      max-width: 800px;
    }

    .new-issue-form {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: inherit;
      color: #333;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #666;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #000;
      color: #fff;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .emergency-contacts {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .contact-card {
      padding: 12px;
      background: #f8f8f8;
      border-radius: 6px;
    }

    .contact-name {
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 4px;
    }

    .contact-phone {
      font-size: 12px;
      color: #4a90e2;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-phone:hover {
      text-decoration: underline;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #ffffff;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal-header {
      font-size: 20px;
      font-weight: 600;
      color: #000;
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #333;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .room-card {
      padding: 12px;
      background: #f8f8f8;
      border-radius: 6px;
      border-left: 4px solid #e0e0e0;
    }

    .room-card.occupied {
      background: rgba(74, 144, 226, 0.1);
      border-left-color: #4a90e2;
    }

    .room-card.cleaning {
      background: rgba(245, 166, 35, 0.1);
      border-left-color: #f5a623;
    }

    .room-title {
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 4px;
    }

    .room-info {
      font-size: 12px;
      color: #666;
    }

    .house-details {
      background: #f8f8f8;
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 12px;
    }

    .house-detail-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .house-detail-item:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      font-weight: 600;
      color: #000;
    }

    @media (max-width: 1024px) {
      .nav-sidebar {
        width: 180px;
        padding: 16px 12px;
      }

      .content-area {
        padding: 16px;
      }

      .header {
        padding: 16px;
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        text-align: left;
        margin-top: 12px;
      }

      .houses-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      }

      .week-timeline {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .nav-sidebar {
        width: 100%;
        padding: 12px;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        max-height: 60px;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        overflow-x: auto;
      }

      .nav-header {
        margin-bottom: 0;
        margin-right: 24px;
      }

      .nav-items {
        display: flex;
        gap: 0;
        flex: 1;
      }

      .nav-item {
        margin-bottom: 0;
        margin-right: 8px;
        padding: 8px;
        white-space: nowrap;
      }

      .nav-footer {
        display: none;
      }

      .main-content {
        height: calc(100vh - 60px);
      }

      .header {
        flex-direction: column;
        padding: 12px;
      }

      .greeting {
        font-size: 20px;
      }

      .quick-stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .houses-grid {
        grid-template-columns: 1fr;
      }

      .week-timeline {
        grid-template-columns: repeat(2, 1fr);
      }

      .guests-table {
        font-size: 12px;
      }

      .guests-table th, .guests-table td {
        padding: 8px 12px;
      }
    }
  </style>
</head>

  </script>
