/* ── Score Color ── */
function scoreColor(score) {
  if (score >= 90) return '#2d6a4f';
  if (score >= 80) return '#2563EB';
  if (score >= 75) return '#D97706';
  return '#6B7280';
}

function fmtPhone(num) {

}

  const filtered = useMemo(() => {
    let result = prospects.filter(p => {
      if (scoreFilter === '90' && p.patron_score < 90) return false;
      if (scoreFilter === '80' && (p.patron_score < 80 || p.patron_score >= 90)) return false;
      if (scoreFilter === '75' && (p.patron_score < 75 || p.patron_score >= 80)) return false;
      if (cleanOnly && !p.is_clean_cell_no_dnc) return false;
      if (bedMin !== 'any' && (parseInt(p.beds) || 0) < parseInt(bedMin)) return false;
      if (bathMin !== 'any' && (parseFloat(p.baths) || 0) < parseInt(bathMin)) return false;
      if (valueRange !== 'any') {
        const v = p.est_value || 0;
        if (valueRange === '0-200' && v >= 200000) return false;
        if (valueRange === '200-400' && (v < 200000 || v >= 400000)) return false;
        if (valueRange === '400-600' && (v < 400000 || v >= 600000)) return false;
        if (valueRange === '600-1000' && (v < 600000 || v >= 1000000)) return false;
        if (valueRange === '1000+' && v < 1000000) return false;
      }
      if (sqftMin !== 'any' && (parseInt(p.sqft) || 0) < parseInt(sqftMin)) return false;
      if (search) {
        const hay = [p.property_address, p.owner_name, p.owner_2_name, ...(p.phones||[]).map(ph=>ph.number), ...(p.emails||[])].join(' ').toLowerCase();
        if (!hay.includes(search.toLowerCase())) return false;
      }
      return true;
    });
    result.sort((a, b) => {
      switch (sortBy) {
        case 'score-desc': return b.patron_score - a.patron_score;
        case 'score-asc': return a.patron_score - b.patron_score;
        case 'address': return a.property_address.localeCompare(b.property_address);
        case 'value-desc': return (b.est_value||0) - (a.est_value||0);
        case 'beds-desc': return (parseInt(b.beds)||0) - (parseInt(a.beds)||0);
        default: return 0;
      }
    });
    return result;
  }, [prospects, search, scoreFilter, cleanOnly, sortBy, bedMin, bathMin, valueRange, sqftMin]);

  /* ── KPIs ── */
  const kpis = useMemo(() => ({
    total: prospects.length,
    withPhone: prospects.filter(p => p.phones?.length).length,
    withEmail: prospects.filter(p => p.emails?.length).length,
    cleanCell: prospects.filter(p => p.is_clean_cell_no_dnc).length,
    avgScore: (prospects.reduce((s, p) => s + p.patron_score, 0) / prospects.length).toFixed(0),
    hotCount: prospects.filter(p => p.pipelineStatus === 'hot').length,
    warmCount: prospects.filter(p => p.pipelineStatus === 'warm').length,
    convertedCount: prospects.filter(p => p.pipelineStatus === 'converted').length,
  }), [prospects]);

  /* ── Handlers ── */
  const updateStatus = (id, status) => setProspects(ps => ps.map(p => p.id === id ? {...p, status} : p));
  const updatePipelineStatus = (id, pipelineStatus) => setProspects(ps => ps.map(p => p.id === id ? {...p, pipelineStatus} : p));
  const updateNote = (id, text) => setProspectNotes(n => ({...n, [id]: text}));
  const toggleActivity = (id) => setExpandedActivities(ea => ({...ea, [id]: !ea[id]}));

  const clearFilters = () => {
    setSearch(''); setScoreFilter('all'); setCleanOnly(false); setSortBy('score-desc');
    setBedMin('any'); setBathMin('any'); setValueRange('any'); setSqftMin('any');
  };

  const exportCSV = () => {
    const headers = ['Score','Address','Owner','Phone 1','Phone 1 Type','Phone 1 DNC','Phone 2','Email 1','Email 2','Beds','Baths','Sqft','Est Value','Est Equity','LTV %','Clean Cell','Status','Pipeline'];
    const rows = filtered.map(p => [
      p.patron_score, p.property_address, p.owner_name,
      p.phones?.[0]?.number||'', p.phones?.[0]?.type||'', p.phones?.[0]?.dnc?'Y':'N',
      p.phones?.[1]?.number||'', p.emails?.[0]||'', p.emails?.[1]||'',
      p.beds, p.baths, p.sqft, p.est_value, p.est_equity,
      p.ltv_pct?.toFixed(2)||'', p.is_clean_cell_no_dnc?'Y':'N', p.status, p.pipelineStatus
    ]);
    let csv = headers.join(',') + '\n';
    rows.forEach(row => {
      csv += row.map(c => { const s = String(c??''); return s.includes(',')||s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s; }).join(',') + '\n';
    });
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'patron-prospects.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  const selected = selectedId !== null ? prospects.find(p => p.id === selectedId) : null;

  /* ── Pill Button Helper ── */
  const Pill = ({active, onClick, children}) => (
    <button onClick={onClick} style={{
      padding: '5px 12px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
      border: active ? '2px solid #2d6a4f' : '1px solid #e5e5e5',
      background: active ? '#2d6a4f' : '#fff', color: active ? '#fff' : '#6b7280',
      transition: 'all 0.15s', whiteSpace: 'nowrap',
    }}>{children}</button>
  );

  /* ── Pipeline Badge ── */
  const PipelineBadge = ({status, small}) => {
    const c = PIPELINE_STATUS[status] || PIPELINE_STATUS.cold;
    return (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        fontSize: small ? 10 : 11, fontWeight: 600, padding: small ? '2px 6px' : '3px 8px',
        borderRadius: 4, background: c.bg, color: c.text, border: `1px solid ${c.border}`,
        textTransform: 'uppercase', letterSpacing: 0.5,
      }}>
        <span style={{width: small ? 5 : 6, height: small ? 5 : 6, borderRadius: '50%', background: c.dot}} />
        {c.label}
      </span>
    );
  };

  /* ── Status Badge ── */
  const StatusBadge = ({status}) => {
    const c = STATUS_COLORS[status] || STATUS_COLORS.New;
    return (
      <span style={{
        fontSize: 10, fontWeight: 600, padding: '2px 8px', borderRadius: 4,
        background: c.bg, color: c.text, border: `1px solid ${c.border}`,
        textTransform: 'uppercase', letterSpacing: 0.5,
      }}>{status}</span>
    );
  };

  /* ── Activity Section ── */
  const ActivitySection = ({prospect}) => {
    const isOpen = expandedActivities[prospect.id];
    const activities = generateActivities(prospect);
    return (
      <div style={{marginTop: 8}}>
        <button onClick={(e) => {e.stopPropagation(); toggleActivity(prospect.id);}} style={{
          display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none',
          cursor: 'pointer', fontSize: 11, fontWeight: 600, color: '#2d6a4f', padding: '4px 0',
        }}>
          <span style={{transform: isOpen ? 'rotate(90deg)' : 'rotate(0)', transition: 'transform 0.15s', display: 'inline-block'}}>&#9654;</span>
          Activity Log ({activities.length})
        </button>
        {isOpen && (
          <div style={{marginTop: 6, paddingLeft: 4}}>
            {activities.length === 0 ? (
              <div style={{fontSize: 11, color: '#6b7280', fontStyle: 'italic'}}>No activities recorded yet.</div>
            ) : activities.map((a, i) => (
              <div key={i} style={{
                display: 'flex', gap: 8, alignItems: 'flex-start', padding: '6px 0',
                borderBottom: i < activities.length - 1 ? '1px solid #f3f4f6' : 'none',
              }}>
                <span style={{
                  fontSize: 9, fontWeight: 700, padding: '2px 5px', borderRadius: 3, flexShrink: 0,
                  background: a.type === 'Call' ? '#DBEAFE' : a.type === 'Email' ? '#FEF3C7' : '#F3F4F6',
                  color: a.type === 'Call' ? '#1E40AF' : a.type === 'Email' ? '#92400E' : '#6B7280',
                }}>{a.type}</span>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{fontSize: 11, color: '#1a1a1a', lineHeight: 1.4}}>{a.note}</div>
                  <div style={{fontSize: 10, color: '#6b7280', marginTop: 2}}>{a.date}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{minHeight: '100vh', display: 'flex', flexDirection: 'column'}}>

        background: 'linear-gradient(135deg, #2d6a4f 0%, #1a2332 100%)',

      }}>
        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12}}>
          <div>
            <h1 style={{fontSize: 28, fontWeight: 700, letterSpacing: -0.5}}>Prospect Pipeline</h1>
            <p style={{fontSize: 13, opacity: 0.85, marginTop: 2}}>Patron Properties &middot; Masters 2027 &middot; A-01</p>
          </div>
          <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
            <span style={{
              padding: '6px 12px', background: 'rgba(255,255,255,0.12)', border: '1px solid rgba(255,255,255,0.2)',
              borderRadius: 6, fontSize: 12, fontWeight: 500, color: '#6EE7B7',

            <button onClick={exportCSV} style={{

        </div>

      {/* ── KPI Cards ── */}
      <div style={{

          {label: 'Hot Prospects', value: kpis.hotCount, color: '#DC2626'},
          {label: 'Warm Prospects', value: kpis.warmCount, color: '#D97706'},

            {id: '75', label: '75-79'},
          ].map(f => (
            <Pill key={f.id} active={scoreFilter === f.id} onClick={() => setScoreFilter(f.id)}>{f.label}</Pill>
          ))}

          <div style={{width: 1, height: 28, background: '#e5e5e5'}} />

          <button onClick={() => setCleanOnly(!cleanOnly)} style={{
            padding: '6px 14px', borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: 'pointer',
            border: `2px solid ${cleanOnly ? '#D97706' : '#e5e5e5'}`,
            background: cleanOnly ? '#D97706' : '#fff', color: cleanOnly ? '#fff' : '#D97706',
            transition: 'all 0.15s', letterSpacing: 0.3,
          }}>&#x1F4DE; Clean Outreach Only</button>

          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            padding: '8px 12px', background: '#f5f5f4', border: '1px solid #e5e5e5',
            color: '#1a1a1a', borderRadius: 6, fontSize: 13, cursor: 'pointer',
          }}>
            <option value="score-desc">Score: High → Low</option>
            <option value="score-asc">Score: Low → High</option>
            <option value="address">Address: A → Z</option>
            <option value="value-desc">Value: High → Low</option>
            <option value="beds-desc">Beds: Most → Least</option>
          </select>
        </div>
      </div>

      {/* ── Advanced Filter Bar ── */}
      <div style={{
        background: '#fff', padding: '12px 32px', borderBottom: '1px solid #e5e5e5',
        display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
      }}>
        <span style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginRight: 4}}>Filters</span>

        <span style={{fontSize: 12, color: '#6b7280'}}>Beds</span>
        {['any','2','3','4','5','6'].map(v => (
          <Pill key={'bed'+v} active={bedMin === v} onClick={() => setBedMin(v)}>
            {v === 'any' ? 'Any' : v + '+'}
          </Pill>
        ))}

        <div style={{width: 1, height: 24, background: '#e5e5e5'}} />

        <span style={{fontSize: 12, color: '#6b7280'}}>Baths</span>
        {['any','2','3','4','5'].map(v => (
          <Pill key={'bath'+v} active={bathMin === v} onClick={() => setBathMin(v)}>
            {v === 'any' ? 'Any' : v + '+'}
          </Pill>
        ))}

        <div style={{width: 1, height: 24, background: '#e5e5e5'}} />

        <span style={{fontSize: 12, color: '#6b7280'}}>Value</span>
        <select value={valueRange} onChange={e => setValueRange(e.target.value)} style={{
          padding: '5px 10px', background: '#f5f5f4', border: '1px solid #e5e5e5',
          color: '#1a1a1a', borderRadius: 6, fontSize: 12, cursor: 'pointer',
        }}>
          <option value="any">Any</option>
          <option value="0-200">Under $200K</option>
          <option value="200-400">$200K – $400K</option>
          <option value="400-600">$400K – $600K</option>
          <option value="600-1000">$600K – $1M</option>
          <option value="1000+">$1M+</option>
        </select>

        <div style={{width: 1, height: 24, background: '#e5e5e5'}} />

        <span style={{fontSize: 12, color: '#6b7280'}}>Sqft</span>
        <select value={sqftMin} onChange={e => setSqftMin(e.target.value)} style={{
          padding: '5px 10px', background: '#f5f5f4', border: '1px solid #e5e5e5',
          color: '#1a1a1a', borderRadius: 6, fontSize: 12, cursor: 'pointer',
        }}>
          <option value="any">Any</option>
          <option value="1000">1,000+</option>
          <option value="1500">1,500+</option>
          <option value="2000">2,000+</option>
          <option value="3000">3,000+</option>
          <option value="5000">5,000+</option>
        </select>

        <button onClick={clearFilters} style={{
          marginLeft: 'auto', padding: '5px 10px', background: 'none', border: '1px solid transparent',
          color: '#DC2626', borderRadius: 6, cursor: 'pointer', fontSize: 11, fontWeight: 600,
        }}>Clear All</button>
      </div>

      {/* ── Results Count ── */}
      <div style={{padding: '8px 32px', background: '#f5f5f4'}}>
        <span style={{fontSize: 12, color: '#6b7280'}}>
          {filtered.length === prospects.length
            ? `${prospects.length} Tier 1 Prospects \u2022 Augusta, GA 30904`
            : `Showing ${filtered.length} of ${prospects.length} prospects`
          }
        </span>
      </div>

      {/* ── Card Grid ── */}
      <div style={{
        flex: 1, padding: '16px 32px',
        display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(340px, 1fr))',
        gap: 16, alignItems: 'start',
      }}>
        {filtered.map(p => {
          const streetView = `https://maps.googleapis.com/maps/api/streetview?size=600x300&location=${encodeURIComponent(p.property_address + ', Augusta, GA 30904')}&key=${API_KEY}`;

          const email = p.emails?.[0];

                  fontSize: 14, fontWeight: 700, color: '#fff', background: scoreColor(p.patron_score),

                {isClean && <div style={{
                  position: 'absolute', top: 10, right: 10, padding: '3px 8px', borderRadius: 4,

              {/* Card Body */}
              <div style={{padding: '14px 16px'}}>

                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>{p.property_address}</div>

        })}
      </div>

      {/* ── Detail Modal ── */}
      {selected && (
        <div onClick={() => setSelectedId(null)} style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 100,
          display: 'flex', justifyContent: 'center', alignItems: 'flex-start',
          overflowY: 'auto', padding: '40px 20px',
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: '#fff', borderRadius: 12, width: '100%', maxWidth: 900,
            overflow: 'hidden', boxShadow: '0 25px 50px rgba(0,0,0,0.15)',
          }}>
            {/* Modal Photo */}
            <div style={{width: '100%', height: 300, background: '#f5f5f4', overflow: 'hidden', position: 'relative'}}>
              <img src={`https://maps.googleapis.com/maps/api/streetview?size=900x400&location=${encodeURIComponent(selected.property_address + ', Augusta, GA 30904')}&key=${API_KEY}`}
                alt={selected.property_address} style={{width: '100%', height: '100%', objectFit: 'cover'}} />
              <button onClick={() => setSelectedId(null)} style={{
                position: 'absolute', top: 12, right: 12, width: 32, height: 32, borderRadius: 6,
                background: 'rgba(0,0,0,0.6)', border: 'none', color: '#fff', fontSize: 18,
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>&times;</button>
            </div>

            {/* Modal Body */}
            <div style={{padding: 24}}>
              {/* Header row */}
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20, flexWrap: 'wrap', gap: 12}}>
                <div>
                  <div style={{fontSize: 22, fontWeight: 700, color: '#1a1a1a'}}>{selected.property_address}</div>
                  <div style={{fontSize: 14, color: '#6b7280', marginTop: 2}}>
                    {selected.owner_name}{selected.owner_2_name ? ' & ' + selected.owner_2_name : ''}
                  </div>
                </div>
                <div style={{display: 'flex', gap: 10, alignItems: 'center'}}>
                  {/* Pipeline Status Selector */}
                  <select value={selected.pipelineStatus} onChange={e => updatePipelineStatus(selected.id, e.target.value)}
                    style={{padding: '6px 12px', background: '#f5f5f4', border: '1px solid #e5e5e5', color: '#1a1a1a', borderRadius: 6, fontSize: 13, cursor: 'pointer'}}>
                    {Object.entries(PIPELINE_STATUS).map(([k, v]) => (
                      <option key={k} value={k}>{v.label}</option>
                    ))}
                  </select>
                  {/* Status Selector */}
                  <select value={selected.status} onChange={e => updateStatus(selected.id, e.target.value)}
                    style={{padding: '6px 12px', background: '#f5f5f4', border: '1px solid #e5e5e5', color: '#1a1a1a', borderRadius: 6, fontSize: 13, cursor: 'pointer'}}>
                    {['New','Contacted','Interested','Signed','Passed'].map(s => (
                      <option key={s} value={s}>{s}</option>
                    ))}
                  </select>
                  <div style={{
                    padding: '6px 14px', borderRadius: 6, fontSize: 18, fontWeight: 700,
                    color: '#fff', background: scoreColor(selected.patron_score),
                  }}>{selected.patron_score}</div>
                </div>
              </div>

              {/* Pipeline Status Banner */}
              <div style={{marginBottom: 20, display: 'flex', alignItems: 'center', gap: 8}}>
                <span style={{fontSize: 12, fontWeight: 600, color: '#6b7280'}}>Pipeline:</span>
                <PipelineBadge status={selected.pipelineStatus} />
              </div>

              {/* Stats Grid */}
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 20}}>
                {[
                  {label: 'Est Value', value: fmtCurrency(selected.est_value)},
                  {label: 'Equity', value: fmtCurrency(selected.est_equity)},
                  {label: 'Beds / Baths', value: `${selected.beds} / ${selected.baths}`},
                  {label: 'Sqft', value: selected.sqft ? parseInt(selected.sqft).toLocaleString() : '-'},
                  {label: 'Year Built', value: selected.year_built},
                  {label: 'LTV', value: `${selected.ltv_pct ? selected.ltv_pct.toFixed(1) : '-'}%`},
                  {label: 'Owner Occupied', value: selected.owner_occupied},
                  {label: 'Last Sale', value: fmtCurrency(selected.last_sale_price)},
                ].map(stat => (
                  <div key={stat.label} style={{background: '#f5f5f4', border: '1px solid #e5e5e5', borderRadius: 8, padding: 12}}>
                    <div style={{fontSize: 10, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4, fontWeight: 600}}>{stat.label}</div>
                    <div style={{fontSize: 16, fontWeight: 600, color: '#1a1a1a'}}>{stat.value}</div>
                  </div>
                ))}
                {selected.mailing_address !== selected.property_address && (
                  <div style={{background: '#f5f5f4', border: '1px solid #e5e5e5', borderRadius: 8, padding: 12, gridColumn: 'span 2'}}>
                    <div style={{fontSize: 10, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4, fontWeight: 600}}>Mailing Address</div>
                    <div style={{fontSize: 13, fontWeight: 500, color: '#1a1a1a'}}>{selected.mailing_address}, {selected.mailing_city} {selected.mailing_state} {selected.mailing_zip}</div>
                  </div>
                )}
              </div>

              {/* Phones Section */}
              <div style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 10, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>Phones</div>
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 8}}>
                {(selected.phones||[]).length > 0 ? selected.phones.map((ph, i) => (
                  <div key={i} style={{background: '#f5f5f4', border: '1px solid #e5e5e5', padding: '10px 12px', borderRadius: 6, fontSize: 12, textAlign: 'center'}}>
                    <div style={{fontWeight: 600, color: '#2563EB', marginBottom: 4}}>{fmtPhone(ph.number)}</div>
                    <span style={{display: 'inline-block', fontSize: 10, padding: '2px 6px', background: '#DBEAFE', color: '#1E40AF', borderRadius: 3, margin: 2}}>{ph.type}</span>
                    {ph.dnc && <span style={{display: 'inline-block', fontSize: 10, padding: '2px 6px', background: '#FEE2E2', color: '#DC2626', borderRadius: 3, margin: 2}}>DNC</span>}
                  </div>
                )) : <span style={{color: '#6b7280', fontSize: 12}}>No phones on file</span>}
              </div>

              {/* Emails Section */}
              <div style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 10, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>Emails</div>
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 8}}>
                {(selected.emails||[]).length > 0 ? selected.emails.map((em, i) => (
                  <div key={i} style={{background: '#f5f5f4', border: '1px solid #e5e5e5', padding: '8px 12px', borderRadius: 6, fontSize: 12, color: '#2563EB', wordBreak: 'break-all'}}>{em}</div>
                )) : <span style={{color: '#6b7280', fontSize: 12}}>No emails on file</span>}
              </div>

              {/* Patron Score Breakdown */}
              <div style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 10, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>Patron Score Breakdown</div>
              {[
                {label: 'Proximity', val: selected.scoring.proximity, max: 30},
                {label: 'Value', val: selected.scoring.value, max: 25},
                {label: 'Beds', val: selected.scoring.beds, max: 20},
                {label: 'Equity', val: selected.scoring.equity, max: 15},
                {label: 'Sqft', val: selected.scoring.sqft, max: 10},
              ].map(s => (
                <div key={s.label} style={{display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8}}>
                  <div style={{fontSize: 12, color: '#6b7280', minWidth: 70}}>{s.label}</div>
                  <div style={{flex: 1, height: 8, background: '#e5e5e5', borderRadius: 4, overflow: 'hidden'}}>
                    <div style={{height: '100%', width: `${(s.val/s.max)*100}%`, background: '#2d6a4f', borderRadius: 4, transition: 'width 0.3s'}} />
                  </div>
                  <div style={{fontSize: 12, fontWeight: 600, color: '#1a1a1a', minWidth: 35, textAlign: 'right'}}>{s.val}/{s.max}</div>
                </div>
              ))}

              {/* Activity Log in Modal */}
              <div style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 10, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>Recent Activity</div>
              {(() => {
                const acts = generateActivities(selected);
                return acts.length > 0 ? acts.map((a, i) => (
                  <div key={i} style={{display: 'flex', gap: 10, alignItems: 'flex-start', padding: '8px 0', borderBottom: i < acts.length - 1 ? '1px solid #f3f4f6' : 'none'}}>
                    <span style={{
                      fontSize: 10, fontWeight: 700, padding: '2px 6px', borderRadius: 3, flexShrink: 0,
                      background: a.type === 'Call' ? '#DBEAFE' : a.type === 'Email' ? '#FEF3C7' : '#F3F4F6',
                      color: a.type === 'Call' ? '#1E40AF' : a.type === 'Email' ? '#92400E' : '#6B7280',
                    }}>{a.type}</span>
                    <div style={{flex: 1}}>
                      <div style={{fontSize: 12, color: '#1a1a1a', lineHeight: 1.4}}>{a.note}</div>
                      <div style={{fontSize: 11, color: '#6b7280', marginTop: 2}}>{a.date}</div>
                    </div>
                  </div>
                )) : <div style={{fontSize: 12, color: '#6b7280', fontStyle: 'italic'}}>No activities recorded yet.</div>;
              })()}

              {/* Notes */}
              <div style={{fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 10, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>Notes</div>
              <textarea
                defaultValue={prospectNotes[selected.id] || selected.notes || ''}
                onChange={e => updateNote(selected.id, e.target.value)}
                placeholder="Add notes..."
                style={{
                  width: '100%', padding: '10px 12px', background: '#f5f5f4', border: '1px solid #e5e5e5',
                  borderRadius: 6, color: '#1a1a1a', fontSize: 13, fontFamily: 'inherit',
                  resize: 'vertical', minHeight: 70, outline: 'none',
                }} />

              {/* Action Buttons */}
              <div style={{display: 'flex', gap: 8, marginTop: 20, paddingTop: 16, borderTop: '1px solid #e5e5e5'}}>
                {(() => {
                  const phone = bestPhone(selected);
                  const email = selected.emails?.[0];
                  return (
                    <>
                      {phone && <a href={`tel:${phone.number}`} style={{
                        flex: 1, padding: '10px 14px', borderRadius: 6, fontSize: 13, fontWeight: 600,
                        textAlign: 'center', textDecoration: 'none', background: '#2d6a4f', color: '#fff', border: 'none',
                      }}>&#x1F4DE; Call {fmtPhone(phone.number)}</a>}
                      {email && <a href={`mailto:${email}`} style={{
                        flex: 1, padding: '10px 14px', borderRadius: 6, fontSize: 13, fontWeight: 600,
                        textAlign: 'center', textDecoration: 'none', background: '#2563EB', color: '#fff', border: 'none',
                      }}>&#x2709; Email</a>}
                      <a href={selected.google_maps_url} target="_blank" style={{
                        flex: 1, padding: '10px 14px', borderRadius: 6, fontSize: 13, fontWeight: 600,
                        textAlign: 'center', textDecoration: 'none', background: '#fff', color: '#6b7280',
                        border: '1px solid #e5e5e5',
                      }}>&#x1F5FA; Google Maps</a>
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Footer ── */}
      <footer style={{padding: '12px 32px', borderTop: '1px solid #e5e5e5', background: '#fff', display: 'flex', justifyContent: 'space-between'}}>
        <span style={{fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#6b7280', textTransform: 'uppercase'}}>Patron Properties</span>
        <span style={{fontSize: 11, color: '#6b7280'}}>Masters 2027 &middot; Prospect Pipeline &middot; {filtered.length} prospects shown</span>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
