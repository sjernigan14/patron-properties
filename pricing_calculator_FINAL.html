<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patron Properties — Pricing Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --primary: #006B54;
    --primary-dark: #004D3B;
    --primary-light: rgba(0,107,84,0.08);
    --bg: #f5f5f4;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --border: #e0e0e0;
    --red: #c53030;
    --green: #34c759;
    --amber: #ff9500;
    --blue: #007aff;
    --gold: #D4A843;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }
  ::selection { background: rgba(0,107,84,0.2); }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  input, button, select { font-family: var(--font); }

  input[type="range"] {
    width: 100%; height: 5px; border-radius: 2.5px; outline: none;
    -webkit-appearance: none; appearance: none;
    background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--val, 50%), var(--border) var(--val, 50%), var(--border) 100%);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: var(--primary); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%; background: var(--primary);
    cursor: pointer; border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ══════════════════════════════════════════════════════
   PRICING LOGIC
   ══════════════════════════════════════════════════════
   Base Rate = $150 + ($75 × beds) + ($50 × baths) + ($0.25 × sqft)
   Location  = Base × neighborhood multiplier
   Distance  = -5% per mile over 2 mi from Augusta National
   Amenities = flat nightly adders
   Season    = final multiplier (Masters Week = 3.5x)
   ══════════════════════════════════════════════════════ */

const NEIGHBORHOODS = [
  { id: 'west_augusta',   label: 'West Augusta',   mult: 1.40, icon: '⛳' },
  { id: 'summerville',    label: 'Summerville',     mult: 1.35, icon: '🌳' },
  { id: 'forest_hills',   label: 'Forest Hills',   mult: 1.30, icon: '🏡' },
  { id: 'national_hills', label: 'National Hills',  mult: 1.20, icon: '🏘️' },
  { id: 'lake_olmstead',  label: 'Lake Olmstead',   mult: 1.25, icon: '🌊' },
  { id: 'downtown',       label: 'Downtown',        mult: 1.15, icon: '🏙️' },
  { id: 'martinez',       label: 'Martinez',        mult: 1.00, icon: '📍' },
  { id: 'evans',          label: 'Evans',           mult: 0.95, icon: '🗺️' },
];

const PROPERTY_TYPES = [
  { id: 'single_family', label: 'Single Family', icon: '🏠' },
  { id: 'luxury_villa',  label: 'Luxury Villa',  icon: '🏛️' },
  { id: 'estate',        label: 'Estate',        icon: '🏰' },
  { id: 'modern',        label: 'Modern Retreat', icon: '✨' },
  { id: 'colonial',      label: 'Colonial Manor', icon: '🏛️' },
];

const SEASONS = [
  { id: 'masters',  label: 'Tournament Days',   mult: 3.5,  icon: '🏆', desc: 'Thu–Sun · Apr 10–13' },
  { id: 'practice', label: 'Practice Rounds',   mult: 2.0,  icon: '🏌️', desc: 'Mon–Wed · Apr 7–9' },
];

const RENTAL_PACKAGES = [
  { id: 7,  label: '7 Nights',  desc: 'Full Week (Mon–Sun)',       practiceNights: 3, tournamentNights: 4 },
  { id: 8,  label: '8 Nights',  desc: 'Sun Arrival – Sun Depart',  practiceNights: 3, tournamentNights: 4, extraNights: 1 },
  { id: 10, label: '10 Nights', desc: 'Fri Arrival – Mon Depart',  practiceNights: 3, tournamentNights: 4, extraNights: 3 },
];

const AMENITIES = [
  { id: 'pool',            label: 'Pool',             price: 200, icon: '🏊' },
  { id: 'hotTub',          label: 'Hot Tub',          price: 150, icon: '♨️' },
  { id: 'golfCart',        label: 'Golf Cart',        price: 100, icon: '🛒' },
  { id: 'outdoorKitchen',  label: 'Outdoor Kitchen',  price: 75,  icon: '🍳' },
  { id: 'chefService',     label: 'Chef Service',     price: 350, icon: '👨‍🍳' },
  { id: 'smartHome',       label: 'Smart Home',       price: 50,  icon: '📱' },
  { id: 'security',        label: 'Security',         price: 25,  icon: '🔒' },
  { id: 'concierge',       label: 'Concierge',        price: 200, icon: '🛎️' },
];

const COMPARABLES = [
  { name: 'Magnolia Manor', address: '1847 Magnolia Dr', beds: 5, baths: 4, sqft: 4800, neighborhood: 'West Augusta', priceMult: 0.88 },
  { name: 'Azalea Estate', address: '411 Cumming Rd', beds: 6, baths: 5, sqft: 6200, neighborhood: 'National Hills', priceMult: 1.15 },
  { name: 'Colonial Gardens', address: '2205 Henry St', beds: 3, baths: 2, sqft: 3200, neighborhood: 'Olde Town', priceMult: 0.72 },
  { name: 'Lake Olmstead Villa', address: '925 Lake Olmstead Dr', beds: 4, baths: 3, sqft: 4100, neighborhood: 'Lake Olmstead', priceMult: 0.95 },
];

/* ── App ── */
function App() {
  const [bedrooms, setBedrooms] = useState(4);
  const [bathrooms, setBathrooms] = useState(3);
  const [sqft, setSqft] = useState('5000');
  const [propertyType, setPropertyType] = useState('single_family');
  const [neighborhood, setNeighborhood] = useState('west_augusta');
  const [distance, setDistance] = useState(3);
  const [amenities, setAmenities] = useState({});
  const [season, setSeason] = useState('masters');
  const [rentalDays, setRentalDays] = useState(7);

  const toggleAmenity = (id) => setAmenities(prev => ({ ...prev, [id]: !prev[id] }));
  const nbhood = NEIGHBORHOODS.find(n => n.id === neighborhood);
  const szn = SEASONS.find(s => s.id === season);
  const pkg = RENTAL_PACKAGES.find(p => p.id === rentalDays);

  /* Calculate pricing */
  const pricing = useMemo(() => {
    const sqftNum = parseFloat(sqft) || 0;
    const baseRate = 150 + (75 * bedrooms) + (50 * bathrooms) + (0.25 * sqftNum);
    const locationMult = nbhood.mult;
    const afterLocation = baseRate * locationMult;
    const distPenalty = distance > 2 ? (distance - 2) * 0.05 : 0;
    const afterDistance = afterLocation * (1 - distPenalty);
    const amenityTotal = AMENITIES.reduce((sum, a) => sum + (amenities[a.id] ? a.price : 0), 0);
    const beforeSeason = afterDistance + amenityTotal;
    const nightly = Math.round(beforeSeason * szn.mult);
    const weekly = nightly * 7;

    return {
      baseRate: Math.round(baseRate),
      locationMult,
      distPenalty: Math.round(distPenalty * 100),
      amenityTotal,
      nightly,
      weekly,
      seasonMult: szn.mult,
    };
  }, [bedrooms, bathrooms, sqft, neighborhood, distance, amenities, season]);

  /* Revenue estimates — Masters rental window only */
  const baseNightly = useMemo(() => {
    const sqftNum = parseFloat(sqft) || 0;
    const base = 150 + (75 * bedrooms) + (50 * bathrooms) + (0.25 * sqftNum);
    const afterLoc = base * nbhood.mult;
    const distP = distance > 2 ? (distance - 2) * 0.05 : 0;
    const afterDist = afterLoc * (1 - distP);
    const amenTotal = AMENITIES.reduce((sum, a) => sum + (amenities[a.id] ? a.price : 0), 0);
    return afterDist + amenTotal;
  }, [bedrooms, bathrooms, sqft, neighborhood, distance, amenities]);

  const tournamentRev = Math.round(baseNightly * 3.5 * pkg.tournamentNights);
  const practiceRev = Math.round(baseNightly * 2.0 * pkg.practiceNights);
  const extraRev = Math.round(baseNightly * 1.2 * (pkg.extraNights || 0));
  const totalRental = tournamentRev + practiceRev + extraRev;
  const patronCut = Math.round(totalRental * 0.15);
  const homeownerNetAmt = totalRental - patronCut;

  /* Comparables with adjusted pricing */
  const comps = COMPARABLES.map(c => ({
    ...c,
    nightlyRate: Math.round(pricing.nightly * c.priceMult),
  }));

  /* Market range */
  const lowPrice = Math.round(pricing.nightly * 0.7);
  const avgPrice = Math.round(pricing.nightly * 0.9);
  const highPrice = Math.round(pricing.nightly * 1.3);
  const maxBar = highPrice;

  /* Patron commission (15% standard) */
  /* patronCut and homeownerNetAmt calculated in rental revenue block above */

  /* Pill button helper */
  const Pill = ({ active, onClick, children, color = '--primary' }) => (
    <button onClick={onClick} style={{
      padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
      border: `2px solid ${active ? `var(${color})` : '#e0e0e0'}`,
      background: active ? `var(${color})` : '#fff',
      color: active ? '#fff' : `var(${color})`,
      transition: 'all 0.15s', whiteSpace: 'nowrap',
    }}>{children}</button>
  );

  const fmt = (n) => '$' + n.toLocaleString();

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Branded Gradient Header ── */}
      <header style={{ background: 'linear-gradient(135deg, #006B54 0%, #004D3B 100%)', color: '#fff', padding: '20px 32px', boxShadow: '0 2px 8px rgba(0,0,0,0.12)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5 }}>Pricing Calculator</h1>
            <p style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>Patron Properties · Masters 2027</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button style={{ padding: '8px 16px', background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>Export PDF</button>
            <button style={{ padding: '8px 16px', background: '#fff', color: '#006B54', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>Save Estimate</button>
          </div>
        </div>
      </header>

      {/* ── KPI Bar ── */}
      <div style={{ background: '#fff', padding: '20px 32px', borderBottom: '1px solid #e0e0e0', display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 24 }}>
        {[
          { label: 'Your Net Payout', value: fmt(homeownerNetAmt), color: '#15803D', hero: true },
          { label: 'Gross Revenue', value: fmt(totalRental), color: '#006B54' },
          { label: 'Patron (15%)', value: fmt(patronCut), color: '#D97706' },
          { label: 'Nightly Rate', value: fmt(pricing.nightly), color: '#006B54' },
          { label: 'Rental Period', value: `${rentalDays} Nights`, color: '#006B54' },
        ].map(kpi => (
          <div key={kpi.label}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>{kpi.label}</div>
            <div style={{ fontSize: kpi.hero ? 32 : 28, fontWeight: kpi.hero ? 800 : 700, color: kpi.color, lineHeight: 1 }}>{kpi.value}</div>
          </div>
        ))}
      </div>

      {/* ── Masters Banner ── */}
      <div style={{ background: 'linear-gradient(90deg, #D4AF37 0%, #F4E4A6 50%, #D4AF37 100%)', color: '#333', padding: '10px 32px', textAlign: 'center', fontSize: 13, fontWeight: 600, letterSpacing: 0.5, borderBottom: '2px solid #B8941C' }}>
        The Masters Tournament · Practice Rounds Apr 7–9 · Tournament Apr 10–13, 2027 · Augusta National Golf Club
      </div>

      {/* ── Main Content: Two Columns ── */}
      <div style={{ flex: 1, padding: '24px 32px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, alignItems: 'start' }}>

        {/* ═══ LEFT: Property Inputs ═══ */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

          {/* Property Type */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Property Type</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {PROPERTY_TYPES.map(pt => (
                <Pill key={pt.id} active={propertyType === pt.id} onClick={() => setPropertyType(pt.id)}>
                  {pt.icon} {pt.label}
                </Pill>
              ))}
            </div>
          </div>

          {/* Property Attributes */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 16 }}>Property Attributes</div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>Bedrooms</span>
                <span style={{ background: 'var(--primary-light)', padding: '4px 14px', borderRadius: 20, fontSize: 13, fontWeight: 700, color: 'var(--primary)' }}>{bedrooms}</span>
              </div>
              <input type="range" min="1" max="8" value={bedrooms} onChange={e => setBedrooms(+e.target.value)} style={{ '--val': `${((bedrooms-1)/7)*100}%` }} />
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>Bathrooms</span>
                <span style={{ background: 'var(--primary-light)', padding: '4px 14px', borderRadius: 20, fontSize: 13, fontWeight: 700, color: 'var(--primary)' }}>{bathrooms}</span>
              </div>
              <input type="range" min="1" max="6" value={bathrooms} onChange={e => setBathrooms(+e.target.value)} style={{ '--val': `${((bathrooms-1)/5)*100}%` }} />
            </div>

            <div>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 8 }}>Square Footage</div>
              <input type="text" value={sqft} onChange={e => setSqft(e.target.value.replace(/[^0-9]/g, ''))} placeholder="5000"
                style={{ width: '100%', padding: '10px 12px', fontSize: 14, border: '1px solid #e0e0e0', borderRadius: 6, outline: 'none', background: '#f5f5f4' }} />
            </div>
          </div>

          {/* Neighborhood */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Neighborhood</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {NEIGHBORHOODS.map(n => (
                <Pill key={n.id} active={neighborhood === n.id} onClick={() => setNeighborhood(n.id)}>
                  {n.icon} {n.label} <span style={{ opacity: 0.7, fontSize: 10 }}>({n.mult}x)</span>
                </Pill>
              ))}
            </div>

            <div style={{ marginTop: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>Distance from Augusta National</span>
                <span style={{ background: 'var(--primary-light)', padding: '4px 14px', borderRadius: 20, fontSize: 13, fontWeight: 700, color: 'var(--primary)' }}>{distance.toFixed(1)} mi</span>
              </div>
              <input type="range" min="0.5" max="10" step="0.5" value={distance} onChange={e => setDistance(+e.target.value)} style={{ '--val': `${((distance-0.5)/9.5)*100}%` }} />
              {pricing.distPenalty > 0 && (
                <div style={{ fontSize: 11, color: '#c53030', marginTop: 4 }}>-{pricing.distPenalty}% distance adjustment (over 2 mi)</div>
              )}
            </div>
          </div>

          {/* Amenities */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>
              Amenities
              {pricing.amenityTotal > 0 && <span style={{ marginLeft: 8, color: '#006B54' }}>+${pricing.amenityTotal}/night</span>}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {AMENITIES.map(a => {
                const active = !!amenities[a.id];
                return (
                  <div key={a.id} onClick={() => toggleAmenity(a.id)}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                      border: `1.5px solid ${active ? '#006B54' : '#e0e0e0'}`,
                      background: active ? 'rgba(0,107,84,0.06)' : '#fff',
                      transition: 'all 0.15s',
                    }}>
                    <span style={{ fontSize: 18 }}>{a.icon}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: active ? '#006B54' : '#1a1a1a' }}>{a.label}</div>
                      <div style={{ fontSize: 11, color: '#888' }}>+${a.price}/night</div>
                    </div>
                    <div style={{
                      width: 20, height: 20, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: active ? '#006B54' : '#fff', border: active ? 'none' : '1.5px solid #ccc',
                    }}>
                      {active && <span style={{ color: '#fff', fontSize: 12, fontWeight: 700 }}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Rate Preview Toggle */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Preview Rate For</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {SEASONS.map(s => {
                const active = season === s.id;
                return (
                  <div key={s.id} onClick={() => setSeason(s.id)}
                    style={{
                      flex: 1, padding: '14px 16px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                      border: `2px solid ${active ? (s.id === 'masters' ? '#D4AF37' : '#006B54') : '#e0e0e0'}`,
                      background: active ? (s.id === 'masters' ? 'rgba(212,175,55,0.08)' : 'rgba(0,107,84,0.04)') : '#fff',
                      transition: 'all 0.15s',
                    }}>
                    <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: active ? (s.id === 'masters' ? '#92400E' : '#006B54') : '#1a1a1a' }}>{s.label}</div>
                    <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{s.desc}</div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: s.id === 'masters' ? '#D97706' : '#006B54', marginTop: 4 }}>{s.mult}x</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Rental Package */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Rental Package</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {RENTAL_PACKAGES.map(p => {
                const active = rentalDays === p.id;
                return (
                  <div key={p.id} onClick={() => setRentalDays(p.id)}
                    style={{
                      flex: 1, padding: '12px 14px', borderRadius: 10, cursor: 'pointer', textAlign: 'center',
                      border: `2px solid ${active ? '#006B54' : '#e0e0e0'}`,
                      background: active ? 'rgba(0,107,84,0.04)' : '#fff',
                      transition: 'all 0.15s',
                    }}>
                    <div style={{ fontSize: 20, fontWeight: 800, color: active ? '#006B54' : '#1a1a1a' }}>{p.label}</div>
                    <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>{p.desc}</div>
                    <div style={{ fontSize: 10, color: '#006B54', fontWeight: 600, marginTop: 4 }}>{p.practiceNights} practice + {p.tournamentNights} tournament{p.extraNights ? ` + ${p.extraNights} extra` : ''}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* ═══ RIGHT: Pricing Output ═══ */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20, position: 'sticky', top: 24 }}>

          {/* Hero Net Payout */}
          <div style={{ background: 'linear-gradient(135deg, rgba(21,128,61,0.07) 0%, rgba(21,128,61,0.02) 100%)', borderRadius: 12, border: '2px solid #15803D', padding: '32px 28px', boxShadow: '0 4px 16px rgba(21,128,61,0.12)' }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Your Net Payout</div>
            <div style={{ fontSize: 64, fontWeight: 800, letterSpacing: -2, color: '#15803D', lineHeight: 1 }}>
              {fmt(homeownerNetAmt)}
            </div>
            <div style={{ fontSize: 13, color: '#888', marginTop: 8 }}>{rentalDays}-night rental · What you take home after Patron's commission</div>

            {/* Waterfall Breakdown */}
            <div style={{ marginTop: 20, background: '#fff', borderRadius: 8, padding: '16px 18px', border: '1px solid #e0e0e0' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', fontSize: 14 }}>
                <span style={{ color: '#555', fontWeight: 500 }}>Gross Revenue</span>
                <span style={{ fontWeight: 700, color: '#006B54' }}>{fmt(totalRental)}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', fontSize: 14 }}>
                <span style={{ color: '#555', fontWeight: 500 }}>Patron Commission</span>
                <span style={{ fontWeight: 700, color: '#D97706' }}>-{fmt(patronCut)} <span style={{ fontSize: 11, fontWeight: 500, color: '#888' }}>(15%)</span></span>
              </div>
              <div style={{ borderTop: '2px solid #15803D', marginTop: 6, paddingTop: 8, display: 'flex', justifyContent: 'space-between', fontSize: 16 }}>
                <span style={{ fontWeight: 700, color: '#1a1a1a' }}>Your Net Payout</span>
                <span style={{ fontWeight: 800, color: '#15803D', fontSize: 18 }}>{fmt(homeownerNetAmt)}</span>
              </div>
            </div>
          </div>

          {/* Nightly Rate + Rate Breakdown */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>Recommended Nightly Rate</div>
                <div style={{ fontSize: 36, fontWeight: 800, letterSpacing: -1, color: '#006B54', lineHeight: 1 }}>{fmt(pricing.nightly)}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: '#888' }}>{szn.label} rate</div>
                <div style={{ fontSize: 11, color: '#888' }}>{pricing.seasonMult}x multiplier</div>
              </div>
            </div>
            {/* Rate Breakdown */}
            <div style={{ borderTop: '1px solid #e0e0e0', paddingTop: 10 }}>
              {[
                { label: 'Base Rate', value: fmt(pricing.baseRate) },
                { label: `${nbhood.label} Premium`, value: `${((pricing.locationMult - 1) * 100).toFixed(0)}%` },
                ...(pricing.distPenalty > 0 ? [{ label: 'Distance Adj.', value: `-${pricing.distPenalty}%`, red: true }] : []),
                ...(pricing.amenityTotal > 0 ? [{ label: 'Amenity Adders', value: `+$${pricing.amenityTotal}` }] : []),
                { label: 'Season Multiplier', value: `${pricing.seasonMult}x`, bold: true },
              ].map((row, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: 12 }}>
                  <span style={{ color: '#888' }}>{row.label}</span>
                  <span style={{ fontWeight: 600, color: row.red ? '#c53030' : row.bold ? '#006B54' : '#1a1a1a' }}>{row.value}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Market Comparison */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Market Comparison</div>
            {[
              { label: 'Low', value: lowPrice, highlight: false },
              { label: 'Average', value: avgPrice, highlight: false },
              { label: 'Your Rate', value: pricing.nightly, highlight: true },
              { label: 'High', value: highPrice, highlight: false },
            ].map((bar, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: bar.highlight ? '10px 12px' : '6px 0', marginBottom: 6,
                borderRadius: bar.highlight ? 8 : 0,
                background: bar.highlight ? 'rgba(0,107,84,0.06)' : 'transparent',
              }}>
                <span style={{ fontSize: 12, fontWeight: bar.highlight ? 700 : 500, color: bar.highlight ? '#006B54' : '#888', minWidth: 60 }}>{bar.label}</span>
                <div style={{ flex: 1, height: 6, background: '#e8f0ed', borderRadius: 3, overflow: 'hidden' }}>
                  <div style={{ width: `${(bar.value / maxBar) * 100}%`, height: '100%', background: bar.highlight ? 'linear-gradient(90deg, #006B54, #004D3B)' : '#c4d4cd', borderRadius: 3, transition: 'width 0.3s' }} />
                </div>
                <span style={{ fontSize: 12, fontWeight: 700, color: bar.highlight ? '#006B54' : '#1a1a1a', minWidth: 55, textAlign: 'right' }}>{fmt(bar.value)}</span>
              </div>
            ))}
          </div>

          {/* Comparables */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Comparable Properties</div>
            {comps.map((c, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: i < comps.length - 1 ? '1px solid #f0f0ef' : 'none' }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a' }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: '#888' }}>{c.beds} bed · {c.baths} bath · {c.neighborhood}</div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 800, color: '#006B54' }}>{fmt(c.nightlyRate)}<span style={{ fontSize: 11, fontWeight: 400, color: '#888' }}>/night</span></div>
              </div>
            ))}
          </div>

          {/* Rental Revenue Breakdown */}
          <div style={{ background: '#fff', borderRadius: 10, border: '1px solid #e0e0e0', padding: '20px 24px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 12 }}>Rental Revenue Breakdown — {rentalDays} Nights</div>
            {[
              { label: `Tournament Days (${pkg.tournamentNights} nights @ 3.5x)`, value: tournamentRev, icon: '🏆' },
              { label: `Practice Rounds (${pkg.practiceNights} nights @ 2.0x)`, value: practiceRev, icon: '🏌️' },
              ...(pkg.extraNights ? [{ label: `Extra Days (${pkg.extraNights} nights @ 1.2x)`, value: extraRev, icon: '📅' }] : []),
            ].map((row, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid #f0f0ef' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span>{row.icon}</span>
                  <span style={{ fontSize: 13, color: '#555' }}>{row.label}</span>
                </div>
                <span style={{ fontSize: 15, fontWeight: 800, color: '#006B54' }}>{fmt(row.value)}</span>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', marginTop: 8, borderRadius: 8, background: 'rgba(0,107,84,0.04)' }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a' }}>Gross Rental Income</span>
              <span style={{ fontSize: 18, fontWeight: 800, color: '#006B54' }}>{fmt(totalRental)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 12px', fontSize: 12 }}>
              <span style={{ color: '#888' }}>Less: Patron Commission (15%)</span>
              <span style={{ fontWeight: 600, color: '#D97706' }}>-{fmt(patronCut)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 12px', marginTop: 4, borderRadius: 8, background: 'linear-gradient(135deg, rgba(0,107,84,0.06) 0%, rgba(0,107,84,0.02) 100%)' }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>Homeowner Net Income</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: '#15803D' }}>{fmt(homeownerNetAmt)}</span>
            </div>
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{ textAlign: 'center', padding: '20px 32px', fontSize: 12, color: '#888', borderTop: '1px solid #e0e0e0' }}>
        Patron Properties Rate Calculator · Luxury Home Rentals · Augusta, GA
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
