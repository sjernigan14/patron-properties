  { id: 1, title: 'Draft contracts for 3 homes', description: 'Nakamura Group selected 3 homes — draft and prepare for signature', assignedTo: 'Katie', dueDate: '2026-04-04', status: 'To Do', priority: 'overdue', linkedDeal: 6 },

  { id: 5, title: 'Send pre-arrival info forms', description: 'Pre-Arrival: Send guest details, housekeeping needs, check-in info', assignedTo: 'Jackie', dueDate: '2026-04-05', status: 'To Do', priority: 'upcoming', linkedDeal: 7 },

  { id: 8, title: 'Send W-9s to homeowners (Wasserman)', description: 'Attach W-9s to Wasserman invoice package', assignedTo: 'Taite', dueDate: '2026-04-05', status: 'To Do', priority: 'upcoming', linkedDeal: 1 },
  { id: 9, title: 'ProLink: Draft 4 contracts', description: 'Houses selected — draft contracts for ProLink 4-home deal', assignedTo: 'Katie', dueDate: '2026-04-05', status: 'To Do', priority: 'upcoming', linkedDeal: 4 },
  { id: 10, title: 'Payment reminder: CBS Sports', description: 'Send reminder to CBS re: payment 1 due date (4/10)', assignedTo: 'Taite', dueDate: '2026-04-08', status: 'To Do', priority: 'upcoming', linkedDeal: 2 },
  { id: 11, title: 'Event Week checkout — damage report forms', description: 'Send damage report template to Event Week properties', assignedTo: 'Jackie', dueDate: '2026-04-07', status: 'To Do', priority: 'upcoming', linkedDeal: 8 },

  { id: 14, title: 'Wasserman: Confirm payment 1 receipt', description: 'Record payment received + send homeowner confirmation', assignedTo: 'Taite', dueDate: '2026-04-10', status: 'To Do', priority: 'upcoming', linkedDeal: 1 },
  { id: 15, title: 'Homeowner follow-up: 30+ days no contact', description: 'Reach out to 8 homeowners not confirmed in 30+ days', assignedTo: 'Jackie', dueDate: '2026-04-05', status: 'To Do', priority: 'upcoming', linkedDeal: null }

/* ── Homeowners ── */
const HOMEOWNERS_DATA = [
  { id: 1, name: 'David & Susan Mitchell', address: '2501 Magnolia Dr', lastContact: '2026-04-02', status: 'Available', method: 'Phone', new: false },
  { id: 2, name: 'James & Patricia Brown', address: '2507 Magnolia Dr', lastContact: '2026-04-01', status: 'Available', method: 'Email', new: false },
  { id: 3, name: 'Robert Collins', address: '2510 Azalea Dr', lastContact: '2026-03-15', status: 'Pending Confirmation', method: 'SMS', new: false },
  { id: 4, name: 'Emma & Michael Torres', address: '2515 Azalea Dr', lastContact: '2026-02-28', status: 'Unavailable', method: 'Phone', new: false },
  { id: 5, name: 'Jennifer & Charles Martinez', address: '2520 Magnolia Dr', lastContact: '2026-03-20', status: 'Available', method: 'Email', new: true },
  { id: 6, name: 'William & Lisa Anderson', address: '2525 Azalea Dr', lastContact: '2026-03-10', status: 'Pending Confirmation', method: 'SMS', new: false },
  { id: 7, name: 'Sarah & David White', address: '2530 Magnolia Dr', lastContact: '2026-01-15', status: 'Unavailable', method: 'Email', new: false },
  { id: 8, name: 'Jennifer & Thomas Lee', address: '2535 Azalea Dr', lastContact: '2026-04-03', status: 'Available', method: 'Phone', new: false },
];

const STALE_THRESHOLD = 7;

/* ── App ── */
function App() {
  const [view, setView] = useState('pipeline');
  const [selectedDeal, setSelectedDeal] = useState(null);
  const [myTasksFilter, setMyTasksFilter] = useState(false);
  const [search, setSearch] = useState('');
  const [assigneeFilter, setAssigneeFilter] = useState('all');

  const deals = DEALS_DATA;
  const tasks = TASKS_DATA;
  const homeowners = HOMEOWNERS_DATA;

  const getDealById = (id) => deals.find(d => d.id === id);

  /* Filtered deals for pipeline */
  const filteredDeals = useMemo(() => deals.filter(d => {
    if (assigneeFilter !== 'all' && d.assignedTo !== assigneeFilter) return false;
    if (search) {
      const s = search.toLowerCase();
      return [d.agency, d.renter, d.stage].some(x => x.toLowerCase().includes(s));
    }
    return true;
  }), [deals, assigneeFilter, search]);

  const pipelineStages = stages.map(stage => ({
    stage,
    deals: filteredDeals.filter(d => d.stage === stage)
  }));

  const filteredTasks = tasks.filter(t => {
    if (myTasksFilter && t.assignedTo !== 'Katie') return false;
    return true;
  });

  /* KPI computations */
  const totalValue = deals.reduce((s, d) => s + d.value, 0);
  const totalHomes = deals.reduce((s, d) => s + d.homes, 0);
  const activeDeals = deals.length;
  const staleCount = deals.filter(d => d.daysInStage > STALE_THRESHOLD).length;

  const statusColor = (s) => s === 'green' ? '#059669' : s === 'amber' ? '#D97706' : '#DC2626';

  const priorityStyles = {
    'overdue': { bg: '#FEE2E2', text: '#991B1B', border: '#FCA5A5', label: 'Overdue' },
    'due-today': { bg: '#FEF3C7', text: '#92400E', border: '#FCD34D', label: 'Due Today' },
    'upcoming': { bg: '#DBEAFE', text: '#1E40AF', border: '#93C5FD', label: 'Upcoming' },
  };

  const homeownerStatusStyle = (status) => {
    if (status === 'Available') return { bg: '#D1FAE5', text: '#065F46', border: '#6EE7B7' };
    if (status === 'Unavailable') return { bg: '#FEE2E2', text: '#991B1B', border: '#FCA5A5' };
    return { bg: '#FEF3C7', text: '#92400E', border: '#FCD34D' };
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Header ── */}
      <header style={{
        background: 'linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%)',
        color: '#fff', padding: '20px 32px',
        boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5 }}>Workflow Board</h1>
            <p style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>Patron Properties · Masters 2027 · A-02</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button style={{ padding: '8px 16px', background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>Export</button>
          </div>
        </div>
      </header>

      {/* ── KPI Bar ── */}
      <div style={{
        background: '#fff', padding: '20px 32px', borderBottom: '1px solid #e5e5e5',
        display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 24,
      }}>
        {[
          { label: 'Total Pipeline', value: `$${(totalValue/1000000).toFixed(1)}M`, sub: `${activeDeals} active deals`, color: '#2d6a4f' },
          { label: 'Total Homes', value: totalHomes, sub: 'Across all deals', color: '#2d6a4f' },
          { label: 'Active Stages', value: pipelineStages.filter(s => s.deals.length > 0).length, sub: `of ${stages.length} stages`, color: '#0891B2' },
          { label: 'Stale Deals', value: staleCount, sub: `>${STALE_THRESHOLD} days in stage`, color: staleCount > 0 ? '#DC2626' : '#6b7280' },
          { label: 'Open Tasks', value: tasks.filter(t => t.status !== 'Done').length, sub: `${tasks.filter(t => t.priority === 'overdue').length} overdue`, color: '#D97706' },
        ].map(kpi => (
          <div key={kpi.label}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>{kpi.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: kpi.color, lineHeight: 1 }}>{kpi.value}</div>
            <div style={{ fontSize: 11, color: '#9ca3af', marginTop: 4 }}>{kpi.sub}</div>

      <div style={{
        background: 'linear-gradient(90deg, #D4AF37 0%, #F4E4A6 50%, #D4AF37 100%)',
        color: '#333', padding: '10px 32px', textAlign: 'center',
        fontSize: 13, fontWeight: 600, letterSpacing: 0.5,
        borderBottom: '2px solid #B8941C',
      }}>
        The Masters Tournament · April 7–13, 2027 · Augusta National Golf Club
      </div>

      {/* ── Navigation + Filter Bar ── */}
      <div style={{ background: '#fff', padding: '14px 32px', borderBottom: '1px solid #e5e5e5' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          {/* View tabs */}
          {[
            { id: 'pipeline', label: 'Pipeline Board' },
            { id: 'tasks', label: 'Task Queue' },
            { id: 'homeowners', label: 'Homeowner Tracker' },
            { id: 'dashboard', label: 'Season Dashboard' },
          ].map(v => {
            const isActive = view === v.id;
            return (
              <button key={v.id} onClick={() => setView(v.id)}
                style={{
                  padding: '7px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: 'pointer',
                  border: isActive ? '2px solid #2d6a4f' : '2px solid #e5e5e5',
                  background: isActive ? '#2d6a4f' : '#fff',
                  color: isActive ? '#fff' : '#1a1a1a',
                  transition: 'all 0.15s',
                }}>
                {v.label}
              </button>
            );
          })}

          <div style={{ width: 1, height: 28, background: '#e5e5e5', margin: '0 4px' }} />

          {/* Search */}
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..."
            style={{ width: 200, padding: '8px 12px', fontSize: 13, border: '1px solid #e5e5e5', borderRadius: 6, outline: 'none', background: '#f5f5f4', color: '#1a1a1a' }} />

          {/* Pipeline filters */}
          {view === 'pipeline' && (
            <>
              <div style={{ width: 1, height: 28, background: '#e5e5e5', margin: '0 4px' }} />
              {['all', 'Taite', 'Katie', 'Jackie'].map(f => {
                const isActive = assigneeFilter === f;
                return (
                  <button key={f} onClick={() => setAssigneeFilter(f)}
                    style={{
                      padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                      border: `2px solid ${isActive ? '#2d6a4f' : '#e5e5e5'}`,
                      background: isActive ? '#2d6a4f' : '#fff',
                      color: isActive ? '#fff' : '#1a1a1a',
                      transition: 'all 0.15s',
                    }}>
                    {f === 'all' ? 'All Assignees' : f}
                  </button>
                );
              })}
            </>
          )}

          {/* Task filter */}
          {view === 'tasks' && (
            <>
              <div style={{ width: 1, height: 28, background: '#e5e5e5', margin: '0 4px' }} />
              <button onClick={() => setMyTasksFilter(!myTasksFilter)}
                style={{
                  padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  border: `2px solid ${myTasksFilter ? '#2d6a4f' : '#e5e5e5'}`,
                  background: myTasksFilter ? '#2d6a4f' : '#fff',
                  color: myTasksFilter ? '#fff' : '#1a1a1a',
                  transition: 'all 0.15s',
                }}>
                My Tasks Only
              </button>
            </>
          )}
        </div>
      </div>

      {/* ── Main Content ── */}
      <div style={{ flex: 1, overflow: 'auto' }}>

        {/* ═══ PIPELINE BOARD ═══ */}
        {view === 'pipeline' && (
          <div style={{ padding: '16px 24px', overflowX: 'auto' }}>
            <div style={{ display: 'flex', gap: 12, minWidth: stages.length * 240 }}>
              {pipelineStages.map(group => {
                const sc = STAGE_COLORS[group.stage];
                const stageVal = group.deals.reduce((s,d) => s + d.value, 0);
                return (
                  <div key={group.stage} style={{ flex: 1, minWidth: 220 }}>
                    {/* Column header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 4px 12px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ width: 10, height: 10, borderRadius: 3, background: sc.solid }} />
                        <span style={{ fontSize: 12, fontWeight: 600, color: '#1a1a1a' }}>{group.stage}</span>
                        <span style={{ fontSize: 11, fontWeight: 600, color: sc.text, background: sc.bg, padding: '2px 8px', borderRadius: 4, border: `1px solid ${sc.border}` }}>{group.deals.length}</span>
                      </div>
                      {stageVal > 0 && <span style={{ fontSize: 11, color: '#6b7280', fontWeight: 500 }}>${(stageVal/1000).toFixed(0)}K</span>}
                    </div>

                    {/* Cards */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      {group.deals.length === 0 && (
                        <div style={{ padding: 20, textAlign: 'center', color: '#9ca3af', fontSize: 12, border: '1px dashed #e5e5e5', borderRadius: 8, background: '#fafaf9' }}>No deals</div>
                      )}
                      {group.deals.map(deal => {
                        const stale = deal.daysInStage > STALE_THRESHOLD;
                        return (
                          <div key={deal.id}
                            onClick={() => setSelectedDeal(deal)}
                            style={{
                              background: stale ? '#FFFBEB' : '#fff', borderRadius: 8, padding: '14px 16px', cursor: 'pointer',
                              border: stale ? '1px solid #FCD34D' : '1px solid #e5e5e5',
                              borderLeft: `4px solid ${stale ? '#DC2626' : sc.solid}`,
                              boxShadow: '0 1px 3px rgba(0,0,0,0.06)',
                              transition: 'all 0.15s',
                            }}
                          >
                            {/* Name + Value */}
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
                              <span style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', lineHeight: 1.2 }}>{deal.agency}</span>
                              <span style={{ fontSize: 14, fontWeight: 700, color: '#2d6a4f', letterSpacing: -0.3, flexShrink: 0, marginLeft: 8 }}>${(deal.value/1000).toFixed(0)}K</span>
                            </div>

                            {/* Meta */}
                            <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 8 }}>
                              {deal.homes} home{deal.homes !== 1 ? 's' : ''} · {deal.renter}
                            </div>

                            {/* Footer */}
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11, color: '#6b7280' }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                <div style={{ width: 6, height: 6, borderRadius: '50%', background: statusColor(deal.status) }} />
                                <span>{deal.assignedTo}</span>
                              </div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                <span style={{ color: stale ? '#DC2626' : '#9ca3af', fontWeight: stale ? 600 : 400 }}>{deal.daysInStage}d</span>
                                {stale && <span style={{ fontSize: 9, fontWeight: 700, color: '#DC2626', background: '#FEE2E2', padding: '1px 5px', borderRadius: 3 }}>STALE</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ═══ TASK QUEUE ═══ */}
        {view === 'tasks' && (
          <div style={{ padding: '24px 32px' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {filteredTasks.map(task => {
                const ps = priorityStyles[task.priority] || priorityStyles.upcoming;
                return (
                  <div key={task.id} style={{
                    padding: '16px 20px', background: '#fff', borderRadius: 8,
                    border: '1px solid #e5e5e5',
                    borderLeft: `4px solid ${ps.border}`,
                    boxShadow: '0 1px 3px rgba(0,0,0,0.06)',
                    display: 'grid', gridTemplateColumns: '1fr auto auto auto', alignItems: 'center', gap: 16,
                  }}>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 4 }}>{task.title}</div>
                      <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>{task.description}</div>
                      {task.linkedDeal && (
                        <div style={{ fontSize: 11, color: '#9ca3af' }}>Deal: {getDealById(task.linkedDeal)?.agency || ''}</div>
                      )}
                    </div>
                    <span style={{ fontSize: 12, background: '#f5f5f4', padding: '6px 10px', borderRadius: 4, color: '#1a1a1a', fontWeight: 500 }}>{task.assignedTo}</span>
                    <span style={{ fontSize: 12, color: '#6b7280', minWidth: 80, textAlign: 'right' }}>{task.dueDate}</span>
                    <span style={{
                      fontSize: 11, fontWeight: 600, padding: '5px 10px', borderRadius: 4,
                      background: ps.bg, color: ps.text, border: `1px solid ${ps.border}`,
                    }}>{task.status}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ═══ HOMEOWNER TRACKER ═══ */}
        {view === 'homeowners' && (
          <div style={{ padding: '24px 32px' }}>
            <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #e5e5e5', overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: '#f5f5f4' }}>
                    {['Name', 'Address', 'Last Contact', 'Status', 'Method', 'New (2020+)'].map(h => (
                      <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', borderBottom: '1px solid #e5e5e5' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {homeowners.map(hw => {
                    const ss = homeownerStatusStyle(hw.status);
                    return (
                      <tr key={hw.id} style={{ borderBottom: '1px solid #e5e5e5' }}>
                        <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 500, color: '#1a1a1a' }}>{hw.name}</td>
                        <td style={{ padding: '12px 16px', fontSize: 13, color: '#6b7280' }}>{hw.address}</td>
                        <td style={{ padding: '12px 16px', fontSize: 13, color: '#6b7280' }}>{hw.lastContact}</td>
                        <td style={{ padding: '12px 16px' }}>
                          <span style={{ display: 'inline-block', padding: '4px 10px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: ss.bg, color: ss.text, border: `1px solid ${ss.border}` }}>{hw.status}</span>
                        </td>
                        <td style={{ padding: '12px 16px', fontSize: 13, color: '#6b7280' }}>{hw.method}</td>
                        <td style={{ padding: '12px 16px', fontSize: 13, color: hw.new ? '#059669' : '#9ca3af', fontWeight: hw.new ? 600 : 400 }}>{hw.new ? 'Yes' : '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ═══ SEASON DASHBOARD ═══ */}
        {view === 'dashboard' && (
          <div style={{ padding: '24px 32px' }}>
            {/* KPI Cards */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16, marginBottom: 32 }}>
              {[
                { label: 'Homes Under Contract', value: '169', sub: 'Goal: 200 (+18.4%)', positive: true },
                { label: 'Total Deal Value', value: '$2.1M', sub: '+31% vs prior year', positive: true },
                { label: 'Homes Available', value: '21', sub: 'From 190+ total', positive: true },
                { label: 'Pre-Arrival Info %', value: '73%', sub: '-2% (target: 95%)', positive: false },
                { label: 'Payments Outstanding', value: '$847K', sub: 'Mostly due by 4/15', positive: true },
                { label: 'Days to Masters', value: '24', sub: 'April 7-13', positive: true },
              ].map(kpi => (
                <div key={kpi.label} style={{ background: '#fff', border: '1px solid #e5e5e5', borderRadius: 8, padding: 20, boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
                  <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 8, textTransform: 'uppercase', fontWeight: 600, letterSpacing: 0.3 }}>{kpi.label}</div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: '#1a1a1a', marginBottom: 4 }}>{kpi.value}</div>
                  <div style={{ fontSize: 12, color: kpi.positive ? '#059669' : '#DC2626', fontWeight: 500 }}>{kpi.sub}</div>
                </div>
              ))}
            </div>

            {/* Upcoming Milestones */}
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5, paddingBottom: 8, borderBottom: '1px solid #e5e5e5' }}>Upcoming Milestones</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {[
                  { title: 'CBS Housekeeping Needs Due', date: 'April 5, 2026', badge: 'CBS (40 homes)' },
                  { title: 'On Location Contract Deadline', date: 'April 8, 2026', badge: 'On Location (12 homes)' },
                  { title: '30-Day Pre-Masters Outreach', date: 'April 7, 2026', badge: '169 homes' },
                  { title: 'Masters Week Begins', date: 'April 7-13, 2026', badge: 'Peak operations' },
                  { title: 'Post-Masters Checkout Period', date: 'April 14-20, 2026', badge: 'Damage reports due' },
                ].map(m => (
                  <div key={m.title} style={{
                    padding: '14px 16px', background: '#fff', borderRadius: 8,
                    borderLeft: '4px solid #0284C7',
                    border: '1px solid #e5e5e5', borderLeftWidth: 4, borderLeftColor: '#0284C7',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.06)',
                  }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 2 }}>{m.title}</div>
                      <div style={{ fontSize: 12, color: '#6b7280' }}>{m.date}</div>
                    </div>
                    <span style={{ fontSize: 11, background: '#f5f5f4', padding: '4px 10px', borderRadius: 4, color: '#6b7280', fontWeight: 500, whiteSpace: 'nowrap' }}>{m.badge}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Team Workload */}
            <div>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5, paddingBottom: 8, borderBottom: '1px solid #e5e5e5' }}>Team Workload</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>
                {[
                  { name: 'Taite', items: [['Active Deals', '4'], ['Tasks Assigned', '8'], ['Overdue Tasks', '1']] },
                  { name: 'Katie', items: [['Active Deals', '3'], ['Tasks Assigned', '5'], ['Contracts to Draft', '7 homes']] },
                  { name: 'Jackie (Temp)', items: [['Active Deals', '2'], ['Tasks Assigned', '4'], ['Follow-ups Due', '2']] },
                ].map(person => (
                  <div key={person.name} style={{ background: '#fff', border: '1px solid #e5e5e5', borderRadius: 8, padding: 20, boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12 }}>{person.name}</div>
                    {person.items.map(([label, val]) => (
                      <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid #f5f5f4', fontSize: 13 }}>
                        <span style={{ color: '#6b7280' }}>{label}</span>
                        <span style={{ fontWeight: 600, color: '#1a1a1a' }}>{val}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── Deal Detail Modal ── */}
      {selectedDeal && (
        <div onClick={() => setSelectedDeal(null)} style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.4)', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: 1000,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: '#fff', borderRadius: 12, width: '90%', maxWidth: 900, maxHeight: '90vh', overflowY: 'auto',
            boxShadow: '0 20px 60px rgba(0,0,0,0.2)', border: '1px solid #e5e5e5',
          }}>
            {/* Modal Header */}
            <div style={{ padding: '24px 28px', borderBottom: '1px solid #e5e5e5', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 600, color: '#1a1a1a' }}>{selectedDeal.renter}</div>
                <div style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>{selectedDeal.agency}</div>
              </div>
              <button onClick={() => setSelectedDeal(null)} style={{ background: 'none', border: 'none', color: '#6b7280', fontSize: 24, cursor: 'pointer', padding: '4px 8px' }}>x</button>
            </div>

            <div style={{ padding: '24px 28px' }}>
              {/* Info Grid */}
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24,
                padding: 16, background: '#f5f5f4', borderRadius: 8,
              }}>
                {[
                  ['Stage', selectedDeal.stage],
                  ['Homes', selectedDeal.homes],
                  ['Deal Value', `$${(selectedDeal.value / 1000).toFixed(0)}K`],
                  ['Assigned To', selectedDeal.assignedTo],
                ].map(([label, value]) => (
                  <div key={label}>
                    <div style={{ fontSize: 11, color: '#6b7280', textTransform: 'uppercase', marginBottom: 4, fontWeight: 600 }}>{label}</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>{value}</div>
                  </div>
                ))}
              </div>

              {/* Properties */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5, paddingBottom: 8, borderBottom: '1px solid #e5e5e5' }}>Properties in Deal</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 10, maxHeight: 200, overflowY: 'auto' }}>
                  {selectedDeal.houses.map((house, idx) => (
                    <div key={idx} style={{ padding: '10px 12px', background: '#f5f5f4', borderRadius: 6, borderLeft: '3px solid #059669' }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 2 }}>{house.address}</div>
                      <div style={{ fontSize: 11, color: '#6b7280' }}>{house.status}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Timeline */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5, paddingBottom: 8, borderBottom: '1px solid #e5e5e5' }}>Activity Timeline</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {selectedDeal.timeline.map((item, idx) => (
                    <div key={idx} style={{ display: 'flex', gap: 12 }}>
                      <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#2d6a4f', marginTop: 2, flexShrink: 0 }} />
                      <div>
                        <div style={{ fontSize: 13, color: '#1a1a1a', marginBottom: 2 }}>{item.action}</div>
                        <div style={{ fontSize: 11, color: '#9ca3af' }}>{item.date}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Notes */}
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5, paddingBottom: 8, borderBottom: '1px solid #e5e5e5' }}>Internal Notes</div>
                <div style={{ background: '#f5f5f4', border: '1px solid #e5e5e5', borderRadius: 8, padding: 14, color: '#6b7280', fontSize: 13, minHeight: 60, lineHeight: 1.5 }}>
                  {selectedDeal.notes}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Footer ── */}
      <footer style={{ padding: '12px 32px', borderTop: '1px solid #e5e5e5', background: '#fff', display: 'flex', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#9ca3af', textTransform: 'uppercase' }}>Patron Properties</span>
        <span style={{ fontSize: 11, color: '#9ca3af' }}>Masters 2027 · Click cards for deal details</span>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
