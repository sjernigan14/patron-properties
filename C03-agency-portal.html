const fmt = (n) => '$' + n.toLocaleString();
const pct = (n) => (n * 100).toFixed(0) + '%';

function daysUntil(month, day, year) {
  const target = new Date(year, month - 1, day);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((target - now) / (1000*60*60*24));
}

    'Pending': { bg: 'rgba(245,158,11,0.08)', text: '#b45309', dot: '#b45309' },

  const c = colors[status] || colors['Active'];
  return (

function Card({ children, style, onClick, hover }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div

      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: C.surface,
        borderRadius: C.radius,
        border: `1px solid ${hovered && hover ? C.goldBorder : C.borderLight}`,
        padding: 24,
        transition: 'all 0.25s ease',
        cursor: onClick ? 'pointer' : 'default',
        transform: hovered && hover ? 'translateY(-1px)' : 'none',
        ...style
      }}
    >
      {children}
    </div>
  );
}

function InventoryView({ onAddToProposal }) {
  const [filter, setFilter] = useState('All');
  const [priceRange, setPriceRange] = useState('all');
  const [bedFilter, setBedFilter] = useState('all');

  const types = ['All', 'Host Home', 'Dinner Home', 'Sleeper Home', 'Staff Home'];

  const filtered = useMemo(() => {
    return PROPERTIES.filter(p => {
      if (filter !== 'All' && p.type !== filter) return false;
      if (bedFilter !== 'all' && p.beds < parseInt(bedFilter)) return false;
      if (priceRange === 'under3k' && p.rate >= 3000) return false;
      if (priceRange === '3k-5k' && (p.rate < 3000 || p.rate >= 5000)) return false;
      if (priceRange === 'over5k' && p.rate < 5000) return false;
      return true;
    });
  }, [filter, priceRange, bedFilter]);

  const groupedByType = useMemo(() => {
    const groups = {};
    filtered.forEach(p => {
      if (!groups[p.type]) groups[p.type] = [];
      groups[p.type].push(p);
    });
    return groups;
  }, [filtered]);

  return (
    <div style={{ maxWidth:1100, margin:'0 auto' }}>
      <SectionTitle sub={`${PROPERTIES.length} curated homes in the Augusta portfolio`}>
        Patron Collection
      </SectionTitle>

      {/* Filters */}
      <Card style={{ marginBottom:28, padding:'18px 24px', display:'flex', alignItems:'center', gap:16, flexWrap:'wrap' }}>
        <div style={{ display:'flex', gap:6 }}>
          {types.map(t => (
            <button
              key={t}
              onClick={() => setFilter(t)}
              style={{
                padding:'7px 14px',
                fontSize:12,
                fontWeight: filter === t ? 600 : 500,
                background: filter === t ? C.gold : 'transparent',
                color: filter === t ? '#fff' : C.textSec,
                borderRadius:20,
                border: filter === t ? 'none' : `1px solid ${C.border}`,
              }}
            >{t}</button>
          ))}
        </div>
        <div style={{ marginLeft:'auto', display:'flex', gap:10 }}>
          <select value={bedFilter} onChange={e => setBedFilter(e.target.value)} style={{ fontSize:12, padding:'6px 10px', borderColor:C.border }}>
            <option value="all">Any Beds</option>
            <option value="4">4+ Beds</option>
            <option value="5">5+ Beds</option>
            <option value="6">6+ Beds</option>
          </select>
          <select value={priceRange} onChange={e => setPriceRange(e.target.value)} style={{ fontSize:12, padding:'6px 10px', borderColor:C.border }}>
            <option value="all">Any Price</option>
            <option value="under3k">Under $3,000/nt</option>
            <option value="3k-5k">$3,000 - $5,000/nt</option>
            <option value="over5k">$5,000+/nt</option>
          </select>
        </div>
      </Card>

      {/* Grouped Properties */}
      {Object.entries(groupedByType).map(([type, props]) => (
        <div key={type} style={{ marginBottom:36 }}>
          <h3 style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:4 }}>{type}</h3>
          <p style={{ fontSize:12, color:C.textSec, marginBottom:16 }}>
            {type === 'Host Home' && 'Full-scale corporate hosting. Event space, catering kitchen, pool.'}
            {type === 'Dinner Home' && 'C-suite entertaining, partner dinners, golf-focused hospitality.'}
            {type === 'Sleeper Home' && 'Core group of golfers, comfortable sleeping accommodations.'}
            {type === 'Staff Home' && 'Support staff, overflow, driver crews.'}
          </p>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320, 1fr))', gap:20 }}>
            {props.map(p => <PropertyCard key={p.id} property={p} compact showAdd onAdd={onAddToProposal} />)}
          </div>
        </div>
      ))}
    </div>
  );
}

function ProposalBuilderView({ agency }) {
  const [step, setStep] = useState(1);

  const [clientContact, setClientContact] = useState('');
  const [clientEmail, setClientEmail] = useState('');
  const [selectedProps, setSelectedProps] = useState([]);
  const [services, setServices] = useState({ chef: false, transport: false, badges: false, photography: false, catering: false });
  const [notes, setNotes] = useState('');
  const [guestCount, setGuestCount] = useState('');

  const servicePricing = {
    chef: { label: 'Private Chef', price: 18000, desc: 'Personal chef for the week, all meals' },
    transport: { label: 'Transportation', price: 12000, desc: 'Airport transfers + daily tournament shuttle' },
    badges: { label: 'Badges & Tickets', price: 35000, desc: 'Practice round + tournament day badges' },
    photography: { label: 'Content & Photography', price: 8000, desc: 'Event photographer, social media assets' },
    catering: { label: 'Welcome & Closing Events', price: 12000, desc: 'Welcome dinner + closing reception' }
  };

  const housingTotal = selectedProps.reduce((sum, p) => sum + (p.rate * 7), 0);
  const servicesTotal = Object.entries(services).filter(([,v]) => v).reduce((sum, [k]) => sum + servicePricing[k].price, 0);
  const grandTotal = housingTotal + servicesTotal;

  const toggleProp = (prop) => {
    setSelectedProps(prev => prev.find(p => p.id === prop.id) ? prev.filter(p => p.id !== prop.id) : [...prev, prop]);
  };

  const stepLabels = ['Client Details', 'Select Properties', 'Add Services', 'Review & Customize', 'Export'];

    <div style={{ maxWidth:900, margin:'0 auto' }}>

              <div style={{
                width:32, height:32, borderRadius:16,
                background: step === i + 1 ? C.gold : step > i + 1 ? C.green : C.bg,
                color: step >= i + 1 ? '#fff' : C.textTer,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:13, fontWeight:700,
                border: step < i + 1 ? `1px solid ${C.border}` : 'none',

              <span style={{ fontSize:11, fontWeight: step === i + 1 ? 700 : 500, color: step === i + 1 ? C.text : C.textSec }}>{label}</span>
            </div>
            {i < stepLabels.length - 1 && <div style={{ flex:1, height:1, background:C.border, margin:'0 8px', marginBottom:20 }}></div>}

      </div>

      {/* Step 1: Client Details */}
      {step === 1 && (
        <Card style={{ padding:32 }}>
          <h3 style={{ fontSize:18, fontWeight:700, marginBottom:24 }}>Client Information</h3>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.textSec, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.04em' }}>Company Name</label>
              <input value={clientName} onChange={e => setClientName(e.target.value)} placeholder="e.g. Acme Corporation" style={{ width:'100%' }} />

            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.textSec, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.04em' }}>Contact Name</label>

            </div>
            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.textSec, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.04em' }}>Contact Email</label>
              <input value={clientEmail} onChange={e => setClientEmail(e.target.value)} placeholder="e.g. jane@acme.com" style={{ width:'100%' }} />
            </div>
            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.textSec, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.04em' }}>Expected Guests</label>

        </Card>

            <Card style={{ marginBottom:20, padding:'16px 22px' }}>
