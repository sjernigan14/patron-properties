const StatusBadge = ({status}) => {
  const map = {
    'occupied':{ bg:'#00b894',text:'#fff',label:'Occupied' }, 'available':{ bg:'#2d3a34',text:'#8a9a8e',label:'Available' },
    'turnover':{ bg:'#fdcb6e',text:'#2d3436',label:'Turnover' }, 'ready':{ bg:'#55efc4',text:'#2d3436',label:'Ready' },
    'checked-in':{ bg:'#00b894',text:'#fff',label:'Checked In' }, 'confirmed':{ bg:'#0984e3',text:'#fff',label:'Confirmed' },
    'new':{ bg:'#d63031',text:'#fff',label:'New' }, 'under-review':{ bg:'#fdcb6e',text:'#2d3436',label:'Under Review' },
    'resolved':{ bg:'#00b894',text:'#fff',label:'Resolved' },
  };
  const c = map[status]||map['available'];
