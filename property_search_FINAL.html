/* ── Best For logic ── */
function getBestFor(p) {
  if (p.walkable) return { label: 'Walking Distance', color: '#006B54', bg: '#D1FAE5' };
  if (p.bedrooms >= 6) return { label: 'Corporate Entertainment', color: '#1E40AF', bg: '#DBEAFE' };
  if (p.amenities.includes('Pool') && p.amenities.includes('Hot Tub')) return { label: 'Luxury Retreat', color: '#6D28D9', bg: '#F5F3FF' };
  if (p.bedrooms >= 3 && p.bedrooms <= 4 && p.pricePerNight <= 2000) return { label: 'Budget-Friendly', color: '#92400E', bg: '#FEF3C7' };
  if (p.bedrooms >= 4 && p.bedrooms <= 5 && p.pricePerNight > 2000 && p.pricePerNight <= 3500) return { label: 'Group Getaway', color: '#0E7490', bg: '#ECFEFF' };
  return { label: 'Group Getaway', color: '#0E7490', bg: '#ECFEFF' };
}

                          <span><strong>{p.maxGuests}</strong> Guests</span>
                          <span><strong>{p.sqft.toLocaleString()}</strong> sf</span>
                          <span>★ <strong>{p.rating}</strong> ({p.reviews})</span>
                        </div>
                        {p.highlight && (
                          <div style={{ marginTop: 8, padding: '4px 10px', borderRadius: 4, background: '#FFFBEB', color: '#92400E', fontSize: 11, fontWeight: 600, display: 'inline-block' }}>
                            ✦ {p.highlight}
                          </div>
                        )}
                        {(() => { const bf = getBestFor(p); return (
                          <div style={{ marginTop: 6 }}>
                            <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: bf.bg, color: bf.color, border: `1px solid ${bf.color}22` }}>
                              {bf.label}
                            </span>
                          </div>
                        ); })()}
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginTop: 10 }}>
                        <div>
                          <span style={{ fontSize: 24, fontWeight: 700, color: '#006B54' }}>${p.pricePerNight.toLocaleString()}</span>
                          <span style={{ fontSize: 13, color: '#888' }}>/night</span>
                          <div style={{ fontSize: 12, color: '#aaa', marginTop: 2 }}>${(p.pricePerNight * currentPackage.nights).toLocaleString()} total ({currentPackage.nights} nights)</div>
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <button onClick={(e) => { e.stopPropagation(); setExpanded(isExp ? null : p.id); }} style={{
                            padding: '8px 16px', borderRadius: 8, border: '1px solid #e0e0e0',
                            background: '#fff', color: '#555', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit'
                          }}>
                            {isExp ? 'Less' : 'Details'}
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); setInquiryId(p.id); }} style={{
                            padding: '8px 16px', borderRadius: 8, border: 'none',
                            background: '#006B54', color: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit'
                          }}>Inquire</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Expanded Details */}
                  {isExp && (
                    <div style={{ borderTop: '1px solid #e0e0e0', padding: '16px 20px', background: '#fafaf9' }}>
                      <p style={{ fontSize: 14, color: '#555', lineHeight: 1.6, marginBottom: 12 }}>{p.description}</p>
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: '#888', letterSpacing: 1, marginBottom: 8 }}>AMENITIES</div>
                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                          {p.amenities.map(a => (
                            <span key={a} style={{ padding: '4px 10px', borderRadius: 4, background: '#f0f0f0', fontSize: 12, color: '#555', fontWeight: 500 }}>{a}</span>
                          ))}
                        </div>
                      </div>
                      <div style={{ marginTop: 12, fontSize: 12, color: '#aaa' }}>Listed since {p.yearListed} · {p.sqft.toLocaleString()} sq ft</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Inquiry Modal */}
      {inquiryId && <InquiryModal p={PROPERTIES.find(x => x.id === inquiryId)} onClose={() => setInquiryId(null)} />}

      {/* ── Footer ── */}
      <div style={{
        borderTop: '1px solid #e0e0e0', padding: '16px 40px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontSize: 12, color: '#aaa', background: '#fff'
      }}>
        <span>Patron Properties · Masters 2027 · Property Search</span>
        <span>Prototype v2.0 · Hybrid Design</span>
      </div>
    </div>
  );
}

ReactDOM.render(<PropertySearch />, document.getElementById('root'));
</script>
</body>
</html>
