<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters Week 2027 — Patron Properties</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf7;
      --surface: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --accent-green: #2d5016;
      --patron-green: #2d6a4f;
      --gold: #c4a35a;
      --accent-light: #f2f5ef;
      --divider: #e8e8e3;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 1.0625rem;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1 { font-size: clamp(3rem, 6vw, 5rem); font-weight: 600; line-height: 1.05; }
    h2 { font-size: clamp(1.75rem, 3.5vw, 3rem); font-weight: 600; line-height: 1.15; }
    h3 { font-size: clamp(1.25rem, 2.5vw, 1.75rem); font-weight: 600; line-height: 1.25; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 80vh;
      min-height: 600px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1920&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.2) 40%, transparent 60%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      color: #fff;
      padding: 0 2rem 6rem;
      max-width: 800px;
    }
    .hero-content h1 {
      font-weight: 300;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
      text-shadow: 0 2px 40px rgba(0,0,0,0.3);
    }
    .hero-content p {
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.01em;
      opacity: 0.9;
      margin-bottom: 2.5rem;
    }
    .hero-cta {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.8);
      background: transparent;
      color: #fff;
      padding: 1rem 2.5rem;
      font-size: 0.8125rem;
      font-family: var(--font);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .hero-cta:hover {
      background: rgba(255,255,255,0.15);
      border-color: #fff;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: scrollPulse 2s ease-in-out infinite;
    }
    .scroll-indicator svg { width: 20px; height: 20px; }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(4px); }
    }

    /* ── Sections ── */
    .section { padding: clamp(4rem, 8vw, 8rem) clamp(1.5rem, 5vw, 4rem); }
    .section-narrow { max-width: 720px; margin: 0 auto; }
    .section-standard { max-width: 980px; margin: 0 auto; }
    .section-wide { max-width: 1200px; margin: 0 auto; }

    /* ── Intake ── */
    .intake-section { background: var(--surface); border-bottom: 1px solid var(--divider); }
    .intake-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    @media (max-width: 768px) { .intake-steps { grid-template-columns: 1fr; } }
    .intake-step-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .intake-step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent-green); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.625rem; font-weight: 600;
    }
    .pill-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .pill {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--divider);
      background: var(--bg);
      border-radius: 100px;
      font-size: 0.875rem;
      font-family: var(--font);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }
    .pill:hover { border-color: var(--text-tertiary); }
    .pill.active { background: var(--accent-green); color: #fff; border-color: var(--accent-green); }
    .toggle-pill {
      padding: 0.4rem 1rem;
      border: 1px solid var(--divider);
      background: var(--bg);
      border-radius: 100px;
      font-size: 0.8125rem;
      font-family: var(--font);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }
    .toggle-pill:hover { border-color: var(--text-tertiary); }
    .toggle-pill.active { background: var(--accent-light); color: var(--accent-green); border-color: var(--patron-green); }
    .intake-result {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--divider);
      font-size: 1rem;
      color: var(--text-secondary);
      text-align: center;
    }
    .intake-result strong { color: var(--text-primary); font-weight: 600; }

    /* ── Collections ── */
    .collection-section { border-top: 1px solid var(--divider); }
    .collection-header { margin-bottom: 2.5rem; }
    .collection-header h2 { margin-bottom: 0.5rem; }
    .collection-editorial {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 640px;
      line-height: 1.7;
    }

    /* ── Card Grids ── */
    .cards-grid-entertainer {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto auto;
      gap: 1.5rem;
    }
    .cards-grid-entertainer .card:first-child { grid-row: 1 / 3; }
    @media (max-width: 900px) {
      .cards-grid-entertainer { grid-template-columns: 1fr; }
      .cards-grid-entertainer .card:first-child { grid-row: auto; }
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-2px); }
    .card-img-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 6s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.05); }
    .card-badge-type {
      position: absolute; top: 1rem; left: 1rem;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0.35rem 0.75rem; border-radius: 100px;
      backdrop-filter: blur(8px);
    }
    .card-avail-badge {
      position: absolute; top: 1rem; right: 1rem;
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(0,0,0,0.5); color: #fff;
      font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.3rem 0.7rem; border-radius: 100px;
      backdrop-filter: blur(8px);
    }
    .avail-dot { width: 6px; height: 6px; border-radius: 50%; background: #34c759; }
    .avail-dot.pending { background: #ff9f0a; }
    .card-body { padding: 1.25rem 1.5rem 1.5rem; }
    .card-address { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.25rem; }
    .card-neighborhood { font-size: 0.8125rem; color: var(--text-tertiary); margin-bottom: 0.75rem; }
    .card-facts { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .card-facts span { white-space: nowrap; }
    .card-facts .sep { margin: 0 0.4rem; opacity: 0.4; }
    .card-bottom {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--divider);
    }
    .card-price { font-size: 1.25rem; font-weight: 600; color: var(--gold); }
    .card-price-label {
      font-size: 0.6875rem; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .card-verified {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.6875rem; color: var(--patron-green); letter-spacing: 0.02em;
    }
    .card-verified svg { width: 14px; height: 14px; }
    .card-track { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.35rem; }

    /* ── Quick View Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      max-width: 960px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: rgba(0,0,0,0.5);
      color: #fff; font-size: 1.125rem;
      cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(0,0,0,0.7); }
    .modal-hero { position: relative; aspect-ratio: 16/9; overflow: hidden; }
    .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
    .modal-thumbnails { display: flex; gap: 0.5rem; padding: 0.75rem 2rem; overflow-x: auto; }
    .modal-thumb {
      width: 80px; height: 60px; border-radius: 8px;
      overflow: hidden; cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s; flex-shrink: 0;
    }
    .modal-thumb.active, .modal-thumb:hover { opacity: 1; }
    .modal-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .modal-body { padding: 2rem; }
    .modal-title-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 0.5rem;
    }
    .modal-title { font-size: 1.75rem; font-weight: 600; }
    .modal-type-badge {
      font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--patron-green); background: var(--accent-light);
      padding: 0.35rem 0.75rem; border-radius: 100px;
    }
    .modal-price-tag { font-size: 1.5rem; font-weight: 600; color: var(--gold); }
    .modal-neighborhood { font-size: 0.9375rem; color: var(--text-tertiary); margin-bottom: 1.5rem; }
    .modal-avail {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.8125rem; color: var(--patron-green); margin-bottom: 1.5rem;
    }
    .modal-editorial {
      font-size: 1.0625rem; color: var(--text-secondary);
      line-height: 1.75; margin-bottom: 2rem; max-width: 640px;
    }
    .modal-facts-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem; margin-bottom: 2rem; padding: 1.25rem;
      background: var(--bg); border-radius: 12px;
    }
    .modal-fact-item { text-align: center; }
    .modal-fact-value { font-size: 1.25rem; font-weight: 600; }
    .modal-fact-label { font-size: 0.75rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; }
    .modal-amenities-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-tertiary); margin-bottom: 0.75rem;
    }
    .modal-amenities {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem; margin-bottom: 2rem;
    }
    @media (max-width: 640px) { .modal-amenities { grid-template-columns: 1fr 1fr; } }
    .modal-amenity {
      font-size: 0.875rem; color: var(--text-secondary);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .modal-amenity-icon { color: var(--patron-green); font-size: 0.75rem; }
    .modal-distance {
      font-size: 0.9375rem; color: var(--text-secondary); font-style: italic;
      margin-bottom: 2rem; padding: 1rem 1.25rem;
      background: var(--accent-light); border-radius: 8px;
    }
    .modal-packages { margin-bottom: 2rem; }
    .modal-packages-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-tertiary); margin-bottom: 0.75rem;
    }
    .package-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px solid var(--divider);
      font-size: 0.9375rem;
    }
    .package-row:last-child { border-bottom: none; }
    .package-name { color: var(--text-primary); }
    .package-dates { color: var(--text-tertiary); font-size: 0.8125rem; }
    .package-price { color: var(--gold); font-weight: 600; }
    .modal-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-request {
      padding: 1rem 2.5rem; background: var(--accent-green); color: #fff;
      border: none; border-radius: 8px; font-size: 0.875rem;
      font-family: var(--font); font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-request:hover { background: #1f3d0f; }
    .btn-compare {
      padding: 1rem 2rem; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--divider); border-radius: 8px;
      font-size: 0.875rem; font-family: var(--font);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-compare:hover { border-color: var(--text-tertiary); color: var(--text-primary); }
    .btn-compare.added { background: var(--accent-light); border-color: var(--patron-green); color: var(--patron-green); }

    /* ── Compare Bar ── */
    .compare-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--divider);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      z-index: 900; animation: slideBarUp 0.3s ease;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    @keyframes slideBarUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .compare-thumbs { display: flex; gap: 0.5rem; }
    .compare-thumb-circle {
      width: 40px; height: 40px; border-radius: 50%;
      overflow: hidden; border: 2px solid var(--patron-green);
    }
    .compare-thumb-circle img { width: 100%; height: 100%; object-fit: cover; }
    .compare-bar-text { font-size: 0.9375rem; color: var(--text-secondary); }
    .compare-bar-btn {
      padding: 0.75rem 1.5rem; background: var(--accent-green); color: #fff;
      border: none; border-radius: 8px; font-size: 0.8125rem;
      font-family: var(--font); text-transform: uppercase;
      letter-spacing: 0.08em; cursor: pointer; transition: background 0.2s;
    }
    .compare-bar-btn:hover { background: #1f3d0f; }
    .compare-clear {
      background: none; border: none; color: var(--text-tertiary);
      font-size: 0.8125rem; cursor: pointer; font-family: var(--font);
    }
    .compare-clear:hover { color: var(--text-primary); }

    /* ── Compare Modal ── */
    .compare-modal-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    @media (max-width: 768px) { .compare-modal-body { grid-template-columns: 1fr; } }
    .compare-col { border-right: 1px solid var(--divider); }
    .compare-col:last-child { border-right: none; }
    .compare-col-img { aspect-ratio: 16/10; overflow: hidden; }
    .compare-col-img img { width: 100%; height: 100%; object-fit: cover; }
    .compare-col-body { padding: 1.5rem; }
    .compare-col-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    .compare-col-price { font-size: 1.125rem; color: var(--gold); font-weight: 600; margin-bottom: 1rem; }
    .compare-row {
      display: flex; justify-content: space-between;
      padding: 0.6rem 0; border-bottom: 1px solid var(--divider); font-size: 0.875rem;
    }
    .compare-row.diff { background: var(--accent-light); margin: 0 -1.5rem; padding: 0.6rem 1.5rem; }
    .compare-row-label { color: var(--text-tertiary); }
    .compare-row-value { color: var(--text-primary); font-weight: 500; }

    /* ── Concierge Sidebar ── */
    .concierge-sidebar {
      position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
      background: var(--surface); border-radius: 16px; padding: 1.5rem;
      width: 220px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      z-index: 800; display: none;
    }
    @media (min-width: 1400px) { .concierge-sidebar { display: block; } }
    .concierge-photo {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; color: var(--patron-green);
      font-size: 1.25rem; font-weight: 600;
    }
    .concierge-label {
      font-size: 0.6875rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 0.25rem;
    }
    .concierge-name { font-size: 0.9375rem; font-weight: 600; margin-bottom: 0.75rem; }
    .concierge-detail { font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 0.35rem; }
    .concierge-btn {
      margin-top: 1rem; width: 100%; padding: 0.75rem;
      background: var(--accent-green); color: #fff; border: none;
      border-radius: 8px; font-size: 0.8125rem; font-family: var(--font);
      cursor: pointer; transition: background 0.2s;
    }
    .concierge-btn:hover { background: #1f3d0f; }
    .concierge-response {
      font-size: 0.6875rem; color: var(--text-tertiary);
      text-align: center; margin-top: 0.75rem;
    }

    /* Mobile concierge */
    .concierge-mobile {
      display: block; background: var(--surface); border-radius: 12px;
      padding: 2rem; text-align: center; margin-top: 2rem;
    }
    @media (min-width: 1400px) { .concierge-mobile { display: none; } }

    /* ── Footer ── */
    .site-footer {
      text-align: center; padding: 3rem 2rem;
      border-top: 1px solid var(--divider);
      color: var(--text-tertiary); font-size: 0.8125rem;
    }
    .site-footer .footer-brand {
      font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    // ── Property Data (from patron-demo-universe.md) ──
    const PROPERTIES = [
      {
        id: 'PP-1001', address: '142 Berckmans Dr',
        beds: 7, baths: 5, sleeps: 18, nightlyRate: 5500,
        owner: 'Margaret Ashford', neighborhood: 'West Augusta',
        type: 'Host Home', distanceToGate6: 0.3,
        status: 'available', mastersYears: 3, renter: 'Goldman Sachs',
        img: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=80',
        imgs: [
          'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=80',
          'https://images.unsplash.com/photo-1600566753190-17f0baa2a6c0?w=400&q=80',
          'https://images.unsplash.com/photo-1600573472592-401b489a3cdc?w=400&q=80',
          'https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=400&q=80',
          'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=400&q=80',
        ],
        editorial: "You'll find yourself steps from Gate 6 in this seven-bedroom estate on Berckmans Drive, the most coveted address in Masters week housing. The catering kitchen, resort-style pool, and covered entertaining terraces make this home the centerpiece of three consecutive years of Goldman Sachs hospitality programs.",
        amenities: {
          entertaining: ['Catering Kitchen', 'Event Terrace', 'Resort Pool', 'Outdoor Dining for 20'],
          comfort: ['7 En-Suite Bedrooms', 'Home Theater', 'Wine Storage', 'Smart Home System'],

    function getWeeklyPrice(prop) { return prop.nightlyRate * 7; }
    function getDriveTime(miles) {
      if (miles <= 0.3) return 'a 2-minute drive';
      if (miles <= 0.7) return 'a 3-minute drive';
      if (miles <= 1.1) return 'a 4-minute drive';
      if (miles <= 1.5) return 'a 5-minute drive';
      if (miles <= 2.0) return 'a 7-minute drive';
      return 'a 10-minute drive';

              {[a, b].map((prop, idx) => (
                <div key={prop.id} className="compare-col">
                  <div className="compare-col-img"><img src={prop.img} alt={prop.address} /></div>
                  <div className="compare-col-body">
                    <div className="compare-col-name">{prop.address}</div>
                    <div className="compare-col-price">{formatPrice(getWeeklyPrice(prop))} /week</div>
                    {rows.map((row, ri) => {
                      const val = idx === 0 ? row.aVal : row.bVal;
                      const diff = String(row.aVal) !== String(row.bVal);
                      return (
                        <div key={ri} className={`compare-row${diff ? ' diff' : ''}`}>
                          <span className="compare-row-label">{row.label}</span>
                          <span className="compare-row-value">{val}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── App ──
    function App() {
      const [partySize, setPartySize] = useState(null);
      const [experienceType, setExperienceType] = useState(null);
      const [priorities, setPriorities] = useState({});
      const [quickView, setQuickView] = useState(null);
      const [compared, setCompared] = useState([]);
      const [showCompare, setShowCompare] = useState(false);
      const collectionsRef = useRef(null);

      const togglePriority = (key) => {
        setPriorities(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const toggleCompare = (prop) => {
        setCompared(prev => {
          const exists = prev.find(p => p.id === prop.id);
          if (exists) return prev.filter(p => p.id !== prop.id);
          if (prev.length >= 2) return [prev[1], prop];
          return [...prev, prop];
        });
      };

      const isCompared = (prop) => compared.some(p => p.id === prop.id);

      const filteredIds = useMemo(() => {
        let props = PROPERTIES;
        if (partySize) {
          const size = PARTY_SIZES.find(s => s.key === partySize);
          if (size) props = props.filter(p => p.sleeps >= size.min && p.sleeps <= size.max + 4);
        }
        if (experienceType) {
          const exp = EXPERIENCE_TYPES.find(e => e.key === experienceType);
          if (exp) props = props.filter(p => exp.types.includes(p.type));
        }
        if (priorities.walkingDistance) props = props.filter(p => p.walkingDistance);
        if (priorities.pool) props = props.filter(p => p.pool);
        if (priorities.chefKitchen) props = props.filter(p => ['Commercial Catering', 'Professional', 'Private Chef', 'Chef-Ready'].includes(p.kitchenTier));
        if (priorities.multiProperty) props = props.filter(p => ['Host Home', 'Staff Home'].includes(p.type));
        return new Set(props.map(p => p.id));
      }, [partySize, experienceType, priorities]);

      const hasFilters = partySize || experienceType || Object.values(priorities).some(Boolean);

      const scrollToCollection = () => {
        collectionsRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      return (
        <>
          {/* ── Hero ── */}
          <section className="hero">
            <div className="hero-bg" />
            <div className="hero-overlay" />
            <div className="hero-content">
              <h1>Masters Week 2027</h1>
              <p>Curated homes near Augusta National Golf Club</p>
              <button className="hero-cta" onClick={scrollToCollection}>View This Year's Collection</button>
            </div>
            <div className="scroll-indicator">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </div>
          </section>

          {/* ── Concierge Intake ── */}
          <section className="intake-section section">
            <div className="section-wide">
              <div className="intake-steps">
                <div>
                  <div className="intake-step-label"><span className="intake-step-num">1</span> Party Size</div>
                  <div className="pill-group">
                    {PARTY_SIZES.map(s => (
                      <button key={s.key} className={`pill${partySize === s.key ? ' active' : ''}`} onClick={() => setPartySize(partySize === s.key ? null : s.key)}>
                        {s.label}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="intake-step-label"><span className="intake-step-num">2</span> Experience Type</div>
                  <div className="pill-group">
                    {EXPERIENCE_TYPES.map(e => (
                      <button key={e.key} className={`pill${experienceType === e.key ? ' active' : ''}`} onClick={() => setExperienceType(experienceType === e.key ? null : e.key)}>
                        {e.label}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="intake-step-label"><span className="intake-step-num">3</span> Priorities</div>
                  <div className="pill-group">
                    {PRIORITIES.map(p => (
                      <button key={p.key} className={`toggle-pill${priorities[p.key] ? ' active' : ''}`} onClick={() => togglePriority(p.key)}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="intake-result">
                Show <strong>{filteredIds.size}</strong> {filteredIds.size === 1 ? 'property' : 'properties'} matching your needs
              </div>
            </div>
          </section>

          {/* ── Curated Collections ── */}
          <div ref={collectionsRef}>
            {COLLECTIONS.map(collection => {
              const collectionProps = collection.propertyIds
                .map(id => PROPERTIES.find(p => p.id === id))
                .filter(p => !hasFilters || filteredIds.has(p.id));
              if (collectionProps.length === 0) return null;

              return (
                <section key={collection.key} className="collection-section section">
                  <div className="section-wide">
                    <div className="collection-header">
                      <h2>{collection.title}</h2>
                      <p className="collection-editorial">{collection.editorial}</p>
                    </div>
                    <div className={collection.layout === 'entertainer' ? 'cards-grid-entertainer' : 'cards-grid'}>
                      {collectionProps.map(prop => (
                        <PropertyCard key={prop.id} property={prop} onOpen={setQuickView} />
                      ))}
                    </div>

                    {collection.key === 'host' && (
                      <div className="concierge-mobile">
                        <div style={{width:56,height:56,borderRadius:'50%',background:'var(--accent-light)',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'var(--patron-green)',fontSize:'1.25rem',fontWeight:600,marginBottom:'1rem'}}>SM</div>
                        <div className="concierge-label">Your Masters Week Contact</div>
                        <div className="concierge-name">Sarah Mitchell, Guest Services</div>
                        <div className="concierge-detail">+1 (706) 555-0142</div>
                        <div className="concierge-detail">sarah@patronproperties.com</div>
                        <button className="concierge-btn" style={{maxWidth:280,margin:'1rem auto 0'}}>Schedule a Call</button>
                        <div className="concierge-response">Response within 2 hours</div>
                      </div>
                    )}
                  </div>
                </section>
              );
            })}
          </div>

          {/* ── Footer ── */}
          <footer className="site-footer">
            <div className="footer-brand">Patron Properties &middot; Masters Tournament Housing &middot; Augusta, GA</div>
            <div>Powered by Patron Properties</div>
          </footer>

          {/* ── Concierge Sidebar (desktop) ── */}
          <div className="concierge-sidebar">
            <div className="concierge-photo">SM</div>
            <div className="concierge-label">Your Masters Week Contact</div>
            <div className="concierge-name">Sarah Mitchell, Guest Services</div>
            <div className="concierge-detail">+1 (706) 555-0142</div>
            <div className="concierge-detail">sarah@patronproperties.com</div>
            <button className="concierge-btn">Schedule a Call</button>
            <div className="concierge-response">Response within 2 hours</div>
          </div>

          {/* ── Compare Bar ── */}
          {compared.length >= 2 && !showCompare && (
            <div className="compare-bar">
              <div className="compare-thumbs">
                {compared.map(p => (
                  <div key={p.id} className="compare-thumb-circle">
                    <img src={p.img} alt={p.address} />
                  </div>
                ))}
              </div>
              <span className="compare-bar-text">Compare Your Selections</span>
              <button className="compare-bar-btn" onClick={() => setShowCompare(true)}>Compare</button>
              <button className="compare-clear" onClick={() => setCompared([])}>Clear</button>
            </div>
          )}

          {/* ── Quick View Modal ── */}
          {quickView && (
            <QuickViewModal
              property={quickView}
              onClose={() => setQuickView(null)}
              onToggleCompare={toggleCompare}
              isCompared={isCompared(quickView)}
            />
          )}

          {/* ── Compare Modal ── */}
          {showCompare && compared.length >= 2 && (
            <CompareModal properties={compared} onClose={() => setShowCompare(false)} />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
