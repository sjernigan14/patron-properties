<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patron Properties — Agency Operations</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f4;
      color: #1a1a1a;
    }

    .app-container {
      display: flex;
      height: 100vh;
      background: #f5f5f4;
    }

    /* Navigation */
    .nav-sidebar {
      width: 220px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 24px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .nav-header {
      margin-bottom: 32px;
    }

    .nav-logo {
      font-size: 14px;
      font-weight: 600;
      color: #2d6a4f;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .nav-title {
      font-size: 13px;
      color: #999;
      font-weight: 400;
    }

    .nav-items {
      flex: 1;
    }

    .nav-item {
      padding: 12px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }

    .nav-item:hover {
      background: #e8f5e9;
      color: #2d6a4f;
    }

    .nav-item.active {
      background: #e8f5e9;
      color: #2d6a4f;
      font-weight: 600;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 12px 6px;
    }

    .nav-footer {
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
      font-size: 12px;
      color: #999;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 13px;
      color: #666;
    }

    .header-right {
      text-align: right;
    }

    .weather-widget {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .time-widget {
      font-size: 12px;
      color: #999;
    }

    /* Content Area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    /* View: Today */
    .today-view {
      display: grid;
      gap: 24px;
    }

    .greeting {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .day-indicator {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .schedule-grid {
      display: grid;
      gap: 12px;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #fafaf9;
      border-radius: 6px;
      border-left: 4px solid #666;
      font-size: 13px;
    }

    .schedule-item.arrival {
      border-left-color: #4a90e2;
    }

    .schedule-item.departure {
      border-left-color: #e94b3c;
    }

    .schedule-item.service {
      border-left-color: #2d6a4f;
    }

    .schedule-item.cleaning {
      border-left-color: #f5a623;
    }

    .schedule-time {
      font-weight: 600;
      color: #333;
      min-width: 60px;
    }

    .schedule-desc {
      flex: 1;
      margin-left: 16px;
      color: #666;
    }

    .schedule-house {
      font-size: 11px;
      color: #999;
      background: rgba(0,0,0,0.04);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .issues-list {
      display: grid;
      gap: 12px;
    }

    .issue-card {
      padding: 16px;
      background: #fafaf9;
      border-radius: 6px;
      border-left: 4px solid;
    }

    .issue-card.red, .issue-card.urgent {
      border-left-color: #e94b3c;
      background: rgba(233, 75, 60, 0.05);
    }

    .issue-card.amber, .issue-card.attention, .issue-card.high {
      border-left-color: #f5a623;
      background: rgba(245, 166, 35, 0.05);
    }

    .issue-card.normal {
      border-left-color: #4a90e2;
      background: rgba(74, 144, 226, 0.05);
    }

    .issue-card.low {
      border-left-color: #999;
      background: rgba(153, 153, 153, 0.05);
    }

    .issue-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .issue-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .issue-status {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .issue-status.urgent {
      color: #e94b3c;
    }

    .issue-status.attention, .issue-status.high {
      color: #f5a623;
    }

    .issue-status.normal {
      color: #4a90e2;
    }

    .issue-status.low {
      color: #999;
    }

    .issue-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .issue-time {
      font-size: 11px;
      color: #999;
    }

    /* View: Houses */
    .houses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .house-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .house-card:hover {
      border-color: #2d6a4f;
      box-shadow: 0 2px 8px rgba(45,106,79,0.12);
    }

    .house-header {
      background: #fafaf9;
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .house-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .house-address {
      font-size: 12px;
      color: #666;
    }

    .house-body {
      padding: 16px;
    }

    .house-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .house-stat-label {
      color: #666;
    }

    .house-stat-value {
      font-weight: 600;
      color: #1a1a1a;
    }

    .house-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
    }

    .room-indicator {
      text-align: center;
      padding: 8px 4px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 11px;
    }

    .room-indicator.occupied {
      background: #4a90e2;
      color: #ffffff;
      font-weight: 600;
    }

    .room-indicator.vacant {
      background: #f0f0f0;
      color: #999;
    }

    .room-indicator.cleaning {
      background: #f5a623;
      color: #ffffff;
      font-weight: 600;
    }

    .room-label {
      display: block;
      font-size: 9px;
      margin-top: 2px;
    }

    /* View: Guests */
    .guests-table {
      width: 100%;
      background: #ffffff;
      border-collapse: collapse;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .guests-table thead {
      background: #fafaf9;
      border-bottom: 1px solid #e0e0e0;
    }

    .guests-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guests-table td {
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #e0e0e0;
    }

    .guests-table tr:last-child td {
      border-bottom: none;
    }

    .guest-name {
      font-weight: 600;
      color: #1a1a1a;
    }

    .guest-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guest-status.in-house {
      background: #4a90e2;
      color: #ffffff;
    }

    .guest-status.arriving {
      background: #2d6a4f;
      color: #ffffff;
    }

    .guest-status.departing {
      background: #e94b3c;
      color: #ffffff;
    }

    /* View: Schedule */
    .week-timeline {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .day-column {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .day-column.today {
      border: 2px solid #2d6a4f;
    }

    .day-header {
      background: #fafaf9;
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      text-align: center;
    }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .day-date {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .day-column.today .day-header {
      background: #2d6a4f;
      color: #fff;
    }

    .day-column.today .day-name {
      color: #fff;
    }

    .day-column.today .day-date {
      color: #b7e4c7;
    }

    .day-events {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 200px;
    }

    .day-event {
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      color: #ffffff;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .day-event.arrival {
      background: #4a90e2;
    }

    .day-event.departure {
      background: #e94b3c;
    }

    .day-event.service {
      background: #2d6a4f;
    }

    .day-event.cleaning {
      background: #f5a623;
    }

    /* View: Issues */
    .issues-view {
      max-width: 900px;
    }

    .new-issue-form {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: inherit;
      color: #333;
      background: #fff;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 2px rgba(45,106,79,0.1);
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #2d6a4f;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1b4332;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 11px;
    }

    .btn-danger {
      background: #e94b3c;
      color: #fff;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .emergency-contacts {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .contact-card {
      padding: 12px;
      background: #fafaf9;
      border-radius: 6px;
    }

    .contact-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .contact-role {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }

    .contact-phone {
      font-size: 12px;
      color: #2d6a4f;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-phone:hover {
      text-decoration: underline;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #ffffff;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .modal-header {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #333;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .room-card {
      padding: 12px;
      background: #fafaf9;
      border-radius: 6px;
      border-left: 4px solid #e0e0e0;
    }

    .room-card.occupied {
      background: rgba(74, 144, 226, 0.1);
      border-left-color: #4a90e2;
    }

    .room-card.cleaning {
      background: rgba(245, 166, 35, 0.1);
      border-left-color: #f5a623;
    }

    .room-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .room-info {
      font-size: 12px;
      color: #666;
    }

    .house-details {
      background: #fafaf9;
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 12px;
    }

    .house-detail-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .house-detail-item:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      font-weight: 600;
      color: #1a1a1a;
    }

    /* House Status Board */
    .status-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .status-summary-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border-top: 4px solid transparent;
    }

    .status-summary-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .status-summary-card.active {
      border-color: #2d6a4f;
      box-shadow: 0 2px 8px rgba(45,106,79,0.15);
    }

    .status-summary-card .count {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .status-summary-card .label {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-board-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-select {
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: #fff;
      color: #333;
    }

    .status-board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .status-property-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .status-property-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .status-property-banner {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-property-banner.ready {
      background: #e8f5e9;
      border-bottom: 2px solid #2d6a4f;
    }

    .status-property-banner.guest-in-house {
      background: #e3f2fd;
      border-bottom: 2px solid #4a90e2;
    }

    .status-property-banner.needs-attention {
      background: #fff3e0;
      border-bottom: 2px solid #f5a623;
    }

    .status-property-banner.turnover {
      background: #fce4ec;
      border-bottom: 2px solid #e94b3c;
    }

    .status-property-banner.issue-reported {
      background: #f3e5f5;
      border-bottom: 2px solid #9c27b0;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .status-badge.ready { background: #2d6a4f; }
    .status-badge.guest-in-house { background: #4a90e2; }
    .status-badge.needs-attention { background: #f5a623; }
    .status-badge.turnover { background: #e94b3c; }
    .status-badge.issue-reported { background: #9c27b0; }

    .status-property-body {
      padding: 16px;
    }

    .status-property-body .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .status-property-body .meta-row strong {
      color: #1a1a1a;
    }

    /* Issue Workflow */
    .issue-workflow-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid;
      transition: all 0.15s ease;
    }

    .issue-workflow-card:hover {
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .issue-workflow-card.priority-urgent { border-left-color: #e94b3c; }
    .issue-workflow-card.priority-high { border-left-color: #f5a623; }
    .issue-workflow-card.priority-normal { border-left-color: #4a90e2; }
    .issue-workflow-card.priority-low { border-left-color: #999; }

          week.push(d);
        }
        return week;
      };

      const handleOpenHouseModal = (house) => {
        setSelectedHouse(house);
        setShowHouseModal(true);

      // Status board computed values
      const statusCounts = useMemo(() => {
        const counts = { 'ready': 0, 'guest-in-house': 0, 'needs-attention': 0, 'turnover': 0, 'issue-reported': 0 };
        SAMPLE_DATA.houses.forEach(h => {
          if (counts[h.houseStatus] !== undefined) counts[h.houseStatus]++;
        });
        return counts;
      }, []);

      const filteredHouses = useMemo(() => {
        return SAMPLE_DATA.houses.filter(h => {
          if (statusFilter !== 'all' && h.houseStatus !== statusFilter) return false;
          if (neighborhoodFilter !== 'all' && h.neighborhood !== neighborhoodFilter) return false;
          if (propertyTypeFilter !== 'all' && h.propertyType !== propertyTypeFilter) return false;
          return true;
        });
      }, [statusFilter, neighborhoodFilter, propertyTypeFilter]);

      const neighborhoods = [...new Set(SAMPLE_DATA.houses.map(h => h.neighborhood))];
      const propertyTypes = [...new Set(SAMPLE_DATA.houses.map(h => h.propertyType))];

      // Issue workflow
      const filteredWorkflowIssues = useMemo(() => {
        return workflowIssues.filter(issue => {
          if (issueStatusFilter !== 'all' && issue.status !== issueStatusFilter) return false;
          if (issuePriorityFilter !== 'all' && issue.priority !== issuePriorityFilter) return false;
          return true;
        });
      }, [workflowIssues, issueStatusFilter, issuePriorityFilter]);

      const handleSubmitIssue = () => {
        if (newIssue.house && newIssue.title && newIssue.description) {
          const now = new Date().toISOString();
          setWorkflowIssues(prev => [{
            id: Date.now(),
            house: newIssue.house,
            title: newIssue.title,
            description: newIssue.description,
            category: newIssue.category,
            priority: newIssue.priority,
            status: newIssue.assignedTo ? 'assigned' : 'reported',
            assignedTo: newIssue.assignedTo || 'Unassigned',
            reportedAt: now,
            updatedAt: now,
            resolvedAt: null,
            escalated: false
          }, ...prev]);
          setNewIssue({ house: '', title: '', description: '', category: 'maintenance', priority: 'normal', assignedTo: '' });

      const updateIssueStatus = (issueId, newStatus) => {
        setWorkflowIssues(prev => prev.map(issue => {
          if (issue.id === issueId) {
            return {
              ...issue,
              status: newStatus,
              updatedAt: new Date().toISOString(),
              resolvedAt: newStatus === 'resolved' ? new Date().toISOString() : issue.resolvedAt

          }
          return issue;
        }));
      };

      const getTimeSince = (isoString) => {
        const reported = new Date(isoString);
        const now = new Date(2026, 3, 8, 11, 0, 0);
        const diffMs = now - reported;
        const diffMins = Math.floor(diffMs / 60000);
        if (diffMins < 60) return `${diffMins}m ago`;
        const diffHrs = Math.floor(diffMins / 60);
        if (diffHrs < 24) return `${diffHrs}h ${diffMins % 60}m ago`;
        return `${Math.floor(diffHrs / 24)}d ago`;
      };

      const getResolutionTime = (issue) => {
        if (!issue.resolvedAt) return null;
        const start = new Date(issue.reportedAt);
        const end = new Date(issue.resolvedAt);
        const diffMins = Math.floor((end - start) / 60000);
        if (diffMins < 60) return `${diffMins}m`;
        return `${Math.floor(diffMins / 60)}h ${diffMins % 60}m`;
      };

      const isOverdue = (issue) => {
        if (issue.status === 'resolved') return false;
        if (issue.priority === 'urgent') {
          const reported = new Date(issue.reportedAt);
          const now = new Date(2026, 3, 8, 11, 0, 0);
          return (now - reported) > 60 * 60 * 1000; // 1 hour for urgent
        }
        if (issue.priority === 'high') {
          const reported = new Date(issue.reportedAt);
          const now = new Date(2026, 3, 8, 11, 0, 0);
          return (now - reported) > 3 * 60 * 60 * 1000; // 3 hours for high
        }
        return false;

        { property: 'Cumming Rd', tasks: 'ISP technician meet, Wi-Fi check', eta: '9:30 AM', distance: '0.8 mi' },

              {/* ===== GUESTS VIEW ===== */}
              {activeView === 'guests' && (
                <div>
                  <div className="section-title" style={{ marginBottom: '20px' }}>All Guests</div>
                  <table className="guests-table">
                    <thead>
                      <tr>

                      </tr>

                    <tbody>
                      {SAMPLE_DATA.guests.map(guest => (

                </div>

              {/* ===== SCHEDULE VIEW ===== */}

                      </div>

                      <div className="contact-card">
                        <div className="contact-name">Patron Hotline</div>
                        <a href="tel:+17065551234" className="contact-phone">+1 (706) 555-1234</a>
                      </div>
                      <div className="contact-card">
                        <div className="contact-name">Local Plumber</div>
                        <a href="tel:+17065556789" className="contact-phone">+1 (706) 555-6789</a>
                      </div>
                      <div className="contact-card">
                        <div className="contact-name">HVAC Emergency</div>
                        <a href="tel:+17065554321" className="contact-phone">+1 (706) 555-4321</a>
                      </div>
                      <div className="contact-card">
                        <div className="contact-name">Electrician</div>
                        <a href="tel:+17065559876" className="contact-phone">+1 (706) 555-9876</a>
                      </div>
                      <div className="contact-card">
                        <div className="contact-name">Window Cleaning</div>
                        <a href="tel:+17065555555" className="contact-phone">+1 (706) 555-5555</a>
                      </div>
                      <div className="contact-card">
                        <div className="contact-name">Appliance Repair</div>
                        <a href="tel:+17065557777" className="contact-phone">+1 (706) 555-7777</a>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ===== FIELD LOGISTICS VIEW ===== */}
              {activeView === 'logistics' && (
                <div>
                  <div className="section-title" style={{ marginBottom: '4px' }}>Field Logistics</div>
                  <div style={{ fontSize: '13px', color: '#666', marginBottom: '20px' }}>Route planning, supply tracking, and vendor contacts for field staff</div>

                  {/* Sub-tabs */}
                  <div className="view-tabs">
                    <button className={`view-tab ${logisticsTab === 'routes' ? 'active' : ''}`} onClick={() => setLogisticsTab('routes')}>Route Plan</button>
                    <button className={`view-tab ${logisticsTab === 'supplies' ? 'active' : ''}`} onClick={() => setLogisticsTab('supplies')}>Supply Inventory</button>
                    <button className={`view-tab ${logisticsTab === 'vendors' ? 'active' : ''}`} onClick={() => setLogisticsTab('vendors')}>Vendor Contacts</button>
                  </div>

                  {/* Route Optimization */}
                  {logisticsTab === 'routes' && (
                    <div>
                      <div className="logistics-section">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                          <div>
                            <div style={{ fontSize: '15px', fontWeight: 600, color: '#1a1a1a' }}>Today's Optimized Route</div>
                            <div style={{ fontSize: '12px', color: '#666', marginTop: '2px' }}>6 stops — Est. 6.2 mi total — ~3.5 hrs</div>
                          </div>
                          <span className={`status-badge ready`} style={{ fontSize: '11px', padding: '4px 10px' }}>ACTIVE</span>
                        </div>
                        <div className="route-list">
                          {routeStops.map((stop, idx) => (
                            <React.Fragment key={idx}>
                              <div className="route-stop">
                                <div className="route-stop-number">{idx + 1}</div>
                                <div className="route-stop-info">
                                  <div className="route-stop-name">{stop.property}</div>
                                  <div className="route-stop-tasks">{stop.tasks}</div>
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                  <div className="route-stop-eta">{stop.eta}</div>
                                  {stop.distance !== '—' && (
                                    <div style={{ fontSize: '11px', color: '#999' }}>{stop.distance}</div>
                                  )}
                                </div>
                              </div>
                              {idx < routeStops.length - 1 && (
                                <div className="route-connector">
                                  <div className="route-connector-line"></div>
                                </div>
                              )}
                            </React.Fragment>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Supply Inventory */}
                  {logisticsTab === 'supplies' && (
                    <div>
                      <div className="logistics-section">
                        <div style={{ fontSize: '15px', fontWeight: 600, color: '#1a1a1a', marginBottom: '4px' }}>Supply Levels by Property</div>
                        <div style={{ fontSize: '12px', color: '#666', marginBottom: '16px' }}>Levels below 30% flagged as critical — restock immediately</div>
                        <table className="supply-table">
                          <thead>
                            <tr>
                              <th>Property</th>
                              <th>Linens</th>
                              <th>Toiletries</th>
                              <th>Kitchen</th>
                              <th>Cleaning</th>
                            </tr>
                          </thead>
                          <tbody>
                            {SAMPLE_DATA.houses.map(house => (
                              <tr key={house.id}>
                                <td style={{ fontWeight: 600 }}>{house.name}</td>
                                {['linens', 'toiletries', 'kitchen', 'cleaning'].map(cat => {
                                  const pct = house.supplies[cat];
                                  const level = getSupplyLevel(pct);
                                  return (
                                    <td key={cat}>
                                      <div className="supply-level">
                                        <div className={`supply-level-fill ${level}`} style={{ width: `${pct}%` }}></div>
                                      </div>
                                      <span style={{ fontSize: '11px', color: level === 'critical' ? '#e94b3c' : level === 'warning' ? '#e68a00' : '#666', fontWeight: level === 'critical' ? 700 : 400 }}>
                                        {pct}%
                                      </span>
                                    </td>
                                  );
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      {/* Critical alerts */}
                      {(() => {
                        const criticals = [];
                        SAMPLE_DATA.houses.forEach(h => {
                          Object.entries(h.supplies).forEach(([cat, pct]) => {
                            if (pct < 30) criticals.push({ house: h.name, category: cat, pct });
                          });
                        });
                        if (criticals.length === 0) return null;
                        return (
                          <div className="logistics-section" style={{ borderLeft: '4px solid #e94b3c' }}>
                            <div style={{ fontSize: '14px', fontWeight: 600, color: '#e94b3c', marginBottom: '12px' }}>
                              Critical Supply Alerts ({criticals.length})
                            </div>
                            {criticals.map((c, i) => (
                              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: i < criticals.length - 1 ? '1px solid #f0f0f0' : 'none', fontSize: '13px' }}>
                                <span><strong>{c.house}</strong> — {c.category}</span>
                                <span style={{ color: '#e94b3c', fontWeight: 700 }}>{c.pct}%</span>
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}

                  {/* Vendor Contacts */}
                  {logisticsTab === 'vendors' && (
                    <div>
                      <div className="logistics-section">
                        <div style={{ fontSize: '15px', fontWeight: 600, color: '#1a1a1a', marginBottom: '4px' }}>Vendor Quick-Dial List</div>
                        <div style={{ fontSize: '12px', color: '#666', marginBottom: '16px' }}>Tap to call — all vendors confirmed for Masters week availability</div>
                        <div className="vendor-grid">
                          {SAMPLE_DATA.vendors.map((v, idx) => (
                            <div key={idx} className="vendor-card">
                              <div className="vendor-name">{v.name}</div>
                              <div className="vendor-category">{v.category}</div>
                              <a href={`tel:${v.phone}`} className="vendor-phone">
                                {v.phone.replace(/^\+1(\d{3})(\d{3})(\d{4})$/, '+1 ($1) $2-$3')}
                              </a>
                              {v.note && <div className="vendor-note">{v.note}</div>}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* House Detail Modal */}
          {showHouseModal && selectedHouse && (
            <div className="modal-overlay" onClick={() => setShowHouseModal(false)}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <button className="modal-close" onClick={() => setShowHouseModal(false)}>x</button>
                <div className="modal-header">{selectedHouse.name}</div>
                <div className="modal-header" style={{ fontSize: '14px', fontWeight: '400', color: '#666', marginBottom: '24px' }}>{selectedHouse.address}</div>

                <div style={{ marginBottom: '24px' }}>
                  <div style={{ fontSize: '13px', fontWeight: '600', color: '#1a1a1a', marginBottom: '12px' }}>Room Status</div>
                  <div className="room-grid">
                    {['Master', 'Guest 1', 'Guest 2', 'Guest 3', 'Guest 4', 'Guest 5'].map((room, idx) => {
                      const occupied = idx < selectedHouse.occupied;
                      const cleaning = idx === selectedHouse.occupied && selectedHouse.cleaning > 0;
                      return (
                        <div key={idx} className={`room-card ${occupied ? 'occupied' : cleaning ? 'cleaning' : ''}`}>
                          <div className="room-title">{room}</div>
                          <div className="room-info">
                            {occupied && selectedHouse.guests[idx] && selectedHouse.guests[idx]}
                            {cleaning && 'Being cleaned'}
                            {!occupied && !cleaning && 'Vacant'}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="house-details">
                  <div className="house-detail-item">
                    <span className="detail-label">Wi-Fi Status</span>
                    <span className="detail-value" style={{ color: selectedHouse.wifiStatus === 'Down' ? '#e94b3c' : '#2d6a4f' }}>{selectedHouse.wifiStatus}</span>
                  </div>
                  <div className="house-detail-item">
                    <span className="detail-label">Wi-Fi Password</span>
                    <span className="detail-value">Delta2027!</span>
                  </div>
                  <div className="house-detail-item">
                    <span className="detail-label">Parking Spaces</span>
                    <span className="detail-value">{selectedHouse.parkingSpaces} available</span>
                  </div>
                  <div className="house-detail-item">
                    <span className="detail-label">Last Cleaned</span>
                    <span className="detail-value">{selectedHouse.lastCleaned}</span>
                  </div>
                  <div className="house-detail-item">
                    <span className="detail-label">Next Cleaning</span>
                    <span className="detail-value">{selectedHouse.nextCleaning}</span>
                  </div>
                  <div className="house-detail-item">
                    <span className="detail-label">Access Codes</span>
                    <span className="detail-value">Front: 4792 — Garage: 5521</span>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
