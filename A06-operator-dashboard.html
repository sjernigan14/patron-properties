/* ── Section Wrapper ── */
function Section({ title, subtitle, children, id }) {
  return (
    <div id={id} style={{ marginBottom: 28, animation: 'slideIn 0.4s ease-out' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>

        {subtitle && <span style={{ fontSize: 13, color: '#6b7280' }}>{subtitle}</span>}
      </div>
      {children}
    </div>
  );
}

/* ── KPI Card ── */
function KPICard({ label, value, sub, color, large }) {
  return (
    <div style={{
      background: '#fff', borderRadius: 10, padding: large ? '20px 24px' : '16px 20px',
      border: '1px solid #e5e5e5', boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
      flex: 1, minWidth: large ? 200 : 150,
    }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: large ? 32 : 26, fontWeight: 700, color: color || '#2d6a4f', letterSpacing: -0.5, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: '#6b7280', marginTop: 6 }}>{sub}</div>}
    </div>
  );
}

/* ── Attention Card ── */
function AttentionCard({ item }) {
  const colors = {
    red: { bg: '#FEF2F2', border: '#FECACA', accent: '#DC2626', text: '#991B1B', badge: '#DC2626' },
    amber: { bg: '#FFFBEB', border: '#FDE68A', accent: '#D97706', text: '#92400E', badge: '#D97706' },
    green: { bg: '#F0FDF4', border: '#BBF7D0', accent: '#059669', text: '#065F46', badge: '#059669' },
  };
  const c = colors[item.severity];
  return (
    <div
      onClick={() => alert(`Navigate to ${item.screen}: ${item.action}`)}
      style={{
        background: c.bg, borderRadius: 10, padding: '16px 20px',
        border: `1px solid ${c.border}`,
        borderLeft: `4px solid ${c.accent}`,
        cursor: 'pointer', transition: 'all 0.15s',
        animation: item.severity === 'red' ? 'pulse 2.5s infinite' : 'none',
        flex: '1 1 280px', minWidth: 280,
      }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = `0 4px 12px ${c.accent}22`; e.currentTarget.style.transform = 'translateY(-1px)'; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.transform = 'none'; }}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: '#fff', background: c.badge, padding: '2px 8px', borderRadius: 4, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            {item.severity === 'red' ? 'Critical' : 'Attention'}
          </span>
          <span style={{ fontSize: 14, fontWeight: 600, color: c.text }}>{item.title}</span>
        </div>
      </div>
      <p style={{ fontSize: 12, color: c.text, lineHeight: 1.5, marginBottom: 8, opacity: 0.85 }}>{item.detail}</p>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: c.accent }}>{item.value}</span>

/* ── Waterfall Chart ── */
function WaterfallChart() {
  const steps = [
    { label: 'Platform Revenue', value: 382700, type: 'total' },
    { label: 'Housing Gross', value: 217700, type: 'segment' },
    { label: 'PM Revenue', value: 165000, type: 'segment' },
    { label: 'Patron Commission', value: -32655, type: 'subtract' },
    { label: 'Net to Owners', value: 185045, type: 'result' },
  ];
  const maxVal = 382700;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, height: 160, padding: '0 8px' }}>
      {steps.map((step, i) => {
        const absVal = Math.abs(step.value);
        const barHeight = Math.max((absVal / maxVal) * 130, 20);
        const color = step.type === 'subtract' ? '#DC2626' : step.type === 'result' ? '#2d6a4f' : step.type === 'total' ? '#1a2332' : '#3b82f6';
        return (
          <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: color }}>{step.value < 0 ? `-${fmtFull(absVal)}` : fmtFull(absVal)}</span>
            <div style={{
              width: '100%', maxWidth: 60, height: barHeight, borderRadius: '4px 4px 0 0',
              background: step.type === 'subtract'
                ? 'repeating-linear-gradient(135deg, #DC2626, #DC2626 3px, #EF4444 3px, #EF4444 6px)'
                : color,
              opacity: 0.9,
            }} />
            <span style={{ fontSize: 10, fontWeight: 500, color: '#6b7280', textAlign: 'center', lineHeight: 1.2 }}>{step.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── Mini Funnel ── */
function PipelineFunnel() {
  const stages = ['inquiry','qualified','property_visit','contract','deposit','booked'];
  const counts = {};
  stages.forEach(s => { counts[s] = PIPELINE_DEALS.filter(d => d.stage === s).length; });
  const maxCount = Math.max(...Object.values(counts), 1);
  const stageColors = {
    inquiry: '#D97706', qualified: '#0891B2', property_visit: '#2563EB',
    contract: '#7C3AED', deposit: '#059669', booked: '#2d6a4f',
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {stages.map(s => {
        const count = counts[s];
        const pct = (count / maxCount) * 100;
        return (
          <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 11, fontWeight: 500, color: '#6b7280', width: 90, textAlign: 'right' }}>{STAGE_LABELS[s]}</span>
            <div style={{ flex: 1, height: 20, background: '#f0f0f0', borderRadius: 4, overflow: 'hidden', position: 'relative' }}>
              <div style={{ width: `${pct}%`, height: '100%', background: stageColors[s], borderRadius: 4, transition: 'width 0.6s ease', minWidth: count > 0 ? 20 : 0 }} />
            </div>
            <span style={{ fontSize: 12, fontWeight: 600, color: '#1a1a1a', width: 20, textAlign: 'center' }}>{count}</span>
          </div>
        );
      })}
    </div>
  );
}

          <span style={{ fontSize: 14, fontWeight: 700, color: h.color }}>{h.count}</span>
          <div style={{
            width: 40, height: (h.count / maxCount) * 80,
            background: h.color, borderRadius: '4px 4px 0 0', opacity: 0.85,
          }} />
          <span style={{ fontSize: 10, fontWeight: 500, color: '#6b7280', textAlign: 'center', lineHeight: 1.2, maxWidth: 60 }}>{h.type}</span>
        </div>

}

  return (
    <div>
      <div style={{ display: 'flex', borderRadius: 8, overflow: 'hidden', height: 28 }}>
        {phases.map((p, i) => (
          <div key={i} style={{
            flex: `0 0 ${p.pct}%`, background: p.active ? p.color : p.done ? p.color : '#e5e5e5',
            opacity: p.done ? 0.5 : p.active ? 1 : 0.3,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 10, fontWeight: 600, color: '#fff', letterSpacing: 0.3,
            position: 'relative',
            borderRight: i < phases.length - 1 ? '2px solid #f5f5f4' : 'none',

            {p.label}
            {p.active && <span style={{ position:'absolute', bottom:-18, fontSize:9, color:'#D97706', fontWeight:700 }}>YOU ARE HERE</span>}
          </div>
        ))}
      </div>
      <div style={{ height: 18 }} />
    </div>
  );
}

                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: '#6b7280' }}>PM Margin</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: '#3b82f6' }}>2.3%</span>
                  </div>
                  <div style={{ height: 8, background: '#f0f0f0', borderRadius: 4, overflow: 'hidden' }}>
                    <div style={{ width: '2.3%', height: '100%', background: '#3b82f6', borderRadius: 4, minWidth: 4 }} />
                  </div>
                </div>
                <div style={{ borderTop: '1px solid #e5e5e5', paddingTop: 12, marginTop: 4 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 12, color: '#6b7280' }}>YoY Growth</span>
                    <span style={{ fontSize: 16, fontWeight: 700, color: '#059669' }}>+18%</span>
                  </div>
                  <span style={{ fontSize: 11, color: '#6b7280' }}>vs Masters 2026 (projected)</span>
                </div>
              </div>
            </div>
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 16 }}>Revenue Waterfall</div>
              <WaterfallChart />
            </div>
          </div>
        </Section>

        {/* ── SECTION 2: ATTENTION ITEMS ── */}
        <Section title="Attention Items" subtitle="What needs action today">
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {ATTENTION_ITEMS.map((item, i) => (
              <AttentionCard key={i} item={item} />
            ))}
          </div>
        </Section>

        {/* ── SECTION 3: PORTFOLIO SNAPSHOT ── */}
        <Section title="Portfolio Snapshot" subtitle="10 homes under management">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            {/* Left: KPIs */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <KPICard label="Homes Under Management" value="10" sub="9 confirmed + 1 prospect" color="#1a2332" />
                <KPICard label="Occupancy Rate" value="90%" sub="9 of 10 booked" color="#2d6a4f" />
                <KPICard label="Avg Nightly Rate" value="$3,620" sub="Across portfolio" color="#3b82f6" />
                <KPICard label="Repeat Homeowner Rate" value="80%" sub="8 of 10 returning" color="#059669" />
              </div>
              <div style={{ background: '#fff', borderRadius: 10, padding: '16px 20px', border: '1px solid #e5e5e5' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: '#1a1a1a', marginBottom: 8 }}>Repeat Renters</div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {[
                    { name:'James Mitchell / Goldman Sachs', years:'Year 3', color:'#2d6a4f' },
                    { name:'Steve Walsh', years:'Year 2', color:'#3b82f6' },
                    { name:'Delta Air Lines / Marcus Chen', years:'Year 3', color:'#7C3AED' },
                  ].map((r, i) => (
                    <span key={i} style={{
                      fontSize: 11, fontWeight: 500, color: r.color, background: `${r.color}10`,
                      padding: '4px 10px', borderRadius: 6, border: `1px solid ${r.color}30`,
                    }}>
                      {r.name} <span style={{ fontWeight: 700 }}>({r.years})</span>
                    </span>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: '#6b7280', marginTop: 8 }}>Repeat Renter Rate: <span style={{ fontWeight: 700, color: '#2d6a4f' }}>40%</span> (3 returning renters)</div>
              </div>
            </div>
            {/* Right: Home Type Chart */}
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5', display: 'flex', flexDirection: 'column' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 16 }}>Homes by Type</div>
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <HomeTypeChart />
              </div>
              <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 12, flexWrap: 'wrap' }}>
                {HOME_TYPES.map(h => (
                  <span key={h.type} style={{ fontSize: 10, color: '#6b7280', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <span style={{ width: 8, height: 8, borderRadius: 2, background: h.color, display: 'inline-block' }} />
                    {h.type}
                  </span>
                ))}
              </div>
            </div>
          </div>
        </Section>

        {/* ── SECTION 4: PIPELINE SUMMARY ── */}
        <Section title="Pipeline Summary" subtitle="From Deal Pipeline (A-04)">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            {/* Left: Funnel + KPI */}
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a' }}>Deals by Stage</div>
                <span
                  onClick={() => alert('Navigate to A-04 Deal Pipeline')}
                  style={{ fontSize: 11, fontWeight: 600, color: '#2d6a4f', cursor: 'pointer', textDecoration: 'underline' }}
                >
                  Open Pipeline &#8594;
                </span>
              </div>
              <PipelineFunnel />
              <div style={{ borderTop: '1px solid #e5e5e5', marginTop: 16, paddingTop: 12, display: 'flex', gap: 20 }}>
                <div>
                  <div style={{ fontSize: 11, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5 }}>Weighted Value</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: '#2d6a4f' }}>~$192K</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5 }}>Total Pipeline</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: '#1a2332' }}>$276K</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.5 }}>Active Deals</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: '#3b82f6' }}>{PIPELINE_DEALS.filter(d => d.stage !== 'booked').length}</div>
                </div>
              </div>
            </div>
            {/* Right: Top Deals */}
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 16 }}>Top Active Deals</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {topDeals.map(deal => {
                  const stageColor = {
                    inquiry:'#D97706', qualified:'#0891B2', property_visit:'#2563EB',
                    contract:'#7C3AED', deposit:'#059669', booked:'#2d6a4f',
                  }[deal.stage] || '#6b7280';
                  return (
                    <div key={deal.id}
                      onClick={() => alert(`Open deal: ${deal.id} — ${deal.renter}`)}
                      style={{
                        padding: '14px 16px', borderRadius: 8, border: '1px solid #e5e5e5',
                        cursor: 'pointer', transition: 'all 0.12s',
                        borderLeft: `4px solid ${stageColor}`,
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = '#fafafa'}
                      onMouseLeave={e => e.currentTarget.style.background = '#fff'}
                    >
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>{deal.renter}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: '#2d6a4f' }}>{deal.total > 0 ? fmtFull(deal.total) : 'TBD'}</span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontSize: 10, fontWeight: 600, color: stageColor, background: `${stageColor}15`, padding: '2px 8px', borderRadius: 4 }}>{STAGE_LABELS[deal.stage]}</span>
                        <span style={{ fontSize: 11, color: '#6b7280' }}>{deal.contact}</span>
                        {deal.property && <span style={{ fontSize: 11, color: '#6b7280' }}>&middot; {deal.property}</span>}
                        <span style={{ fontSize: 11, color: deal.days > 7 ? '#DC2626' : '#6b7280', fontWeight: deal.days > 7 ? 600 : 400 }}>&middot; {deal.days}d in stage</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 12, textAlign: 'center' }}>
                <span
                  onClick={() => alert('Navigate to A-04 Deal Pipeline')}
                  style={{ fontSize: 12, fontWeight: 600, color: '#2d6a4f', cursor: 'pointer', textDecoration: 'underline' }}
                >
                  View all {PIPELINE_DEALS.length} deals &#8594;
                </span>
              </div>
            </div>
          </div>
        </Section>

        {/* ── SECTION 5: TEAM & SEASON STATUS ── */}
        <Section title="Team & Season Status" subtitle="Final Prep Phase -- March 2027">
          {/* Season Timeline */}
          <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5', marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 12 }}>Season Timeline</div>
            <SeasonTimeline />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            {/* Left: Team */}
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 16 }}>Active Programs & Team</div>

              {/* Jackie / Elan Arc */}
              <div style={{ padding: '14px 16px', borderRadius: 8, background: '#f8f9fa', marginBottom: 12 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div>
                    <span style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>Jackie Keller</span>
                    <span style={{ fontSize: 11, color: '#6b7280', marginLeft: 8 }}>Elan Arc</span>
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 600, color: '#7C3AED', background: '#F5F3FF', padding: '2px 8px', borderRadius: 4 }}>PM Lead</span>
                </div>
                {PM_PROGRAMS.map(p => (
                  <div key={p.client} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderTop: '1px solid #e5e5e5' }}>
                    <div>
                      <span style={{ fontSize: 12, fontWeight: 500, color: '#1a1a1a' }}>{p.client}</span>
                      <span style={{ fontSize: 11, color: '#6b7280', marginLeft: 6 }}>{p.status}</span>
                    </div>
                    <span style={{ fontSize: 12, fontWeight: 700, color: '#2d6a4f' }}>{fmtFull(p.value)}</span>
                  </div>
                ))}
                <div style={{ fontSize: 11, color: '#6b7280', marginTop: 8 }}>3 active programs &middot; {fmtFull(PM_PROGRAMS.reduce((s,p) => s+p.value, 0))} total value</div>
              </div>

              {/* Taite */}
              <div style={{ padding: '14px 16px', borderRadius: 8, background: '#f8f9fa' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div>
                    <span style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>Taite Sasnett</span>
                    <span style={{ fontSize: 11, color: '#6b7280', marginLeft: 8 }}>Managing Director</span>
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 600, color: '#1a2332', background: '#E2E8F0', padding: '2px 8px', borderRadius: 4 }}>Operator</span>
                </div>
                <div style={{ fontSize: 12, color: '#1a1a1a', lineHeight: 1.6 }}>
                  3 deals in active negotiation<br />
                  Bennett follow-up, Berkshire deposit, Cabot program review<br />
                  {PIPELINE_DEALS.filter(d => d.priority === 'high' && d.stage !== 'booked').length} high-priority items requiring attention
                </div>
              </div>
            </div>

            {/* Right: Milestones */}
            <div style={{ background: '#fff', borderRadius: 10, padding: '20px 24px', border: '1px solid #e5e5e5' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 16 }}>Next Milestones</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {MILESTONES.map((m, i) => (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                    borderRadius: 8, background: m.urgent ? '#FFFBEB' : '#f8f9fa',
                    border: m.urgent ? '1px solid #FDE68A' : '1px solid transparent',
                  }}>
                    <div style={{
                      width: 8, height: 8, borderRadius: '50%',
                      background: m.urgent ? '#D97706' : m.status === 'future' ? '#e5e5e5' : '#2d6a4f',
                      flexShrink: 0,
                      animation: m.urgent ? 'pulse 2s infinite' : 'none',
                    }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: '#1a1a1a', minWidth: 80 }}>{m.date}</span>
                    <span style={{ fontSize: 12, color: m.urgent ? '#92400E' : '#6b7280', flex: 1 }}>{m.label}</span>
                    {m.urgent && <span style={{ fontSize: 9, fontWeight: 700, color: '#D97706', background: '#FEF3C7', padding: '2px 6px', borderRadius: 3 }}>URGENT</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </Section>

      </div>

      {/* ═══ FOOTER ═══ */}
      <footer style={{
        padding: '16px 32px', borderTop: '1px solid #e5e5e5', background: '#fff',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12,
      }}>
        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#6b7280', textTransform: 'uppercase' }}>Patron Properties &middot; Operator View</span>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
          {[
            { label:'Prospect Finder', screen:'A-01' },
            { label:'Homeowner Intake', screen:'A-02' },
            { label:'Renter CRM', screen:'A-03' },
            { label:'Deal Pipeline', screen:'A-04' },
            { label:'Document Tracker', screen:'A-05' },
            { label:'This Dashboard', screen:'A-06' },
          ].map(link => (
            <span
              key={link.screen}
              onClick={() => alert(`Navigate to ${link.screen}: ${link.label}`)}
              onMouseEnter={() => setHoveredScreen(link.screen)}
              onMouseLeave={() => setHoveredScreen(null)}
              style={{
                fontSize: 11, fontWeight: 500, cursor: 'pointer',
                color: hoveredScreen === link.screen ? '#2d6a4f' : '#6b7280',
                textDecoration: hoveredScreen === link.screen ? 'underline' : 'none',
                transition: 'all 0.12s',
              }}
            >
              {link.screen}: {link.label}
            </span>
          ))}
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
