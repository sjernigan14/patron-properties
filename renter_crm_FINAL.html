<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patron Properties — Renter CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --primary: #006B54;
    --primary-dark: #004D3B;
    --bg: #f5f5f4;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --border: #e0e0e0;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(0,107,84,0.2); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  input, select, button { font-family: var(--font); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const STATUS = {
  /* Master Status Palette — unique per status, no duplicates, consistent across all prototypes */
  active:    { label: 'Active',    bg: '#DBEAFE', text: '#1E40AF', border: '#93C5FD', solid: '#2563EB' },
  booked:    { label: 'Booked',    bg: '#D1FAE5', text: '#065F46', border: '#6EE7B7', solid: '#006B54' },
  qualified: { label: 'Qualified', bg: '#CCFBF1', text: '#115E59', border: '#5EEAD4', solid: '#0891B2' },
  inquiry:   { label: 'Inquiry',   bg: '#FEF3C7', text: '#92400E', border: '#FCD34D', solid: '#D97706' },
  vip:       { label: 'VIP',       bg: '#EDE9FE', text: '#5B21B6', border: '#C4B5FD', solid: '#7C3AED' },
  inactive:  { label: 'Inactive',  bg: '#F3F4F6', text: '#6B7280', border: '#D1D5DB', solid: '#6B7280' },
};

/* Master Type Palette — distinct from statuses, outlined style for visual separation */
const TYPE_COLORS = {
  Corporate: { bg: '#F1F5F9', text: '#475569', border: '#94A3B8' },
  Private: { bg: '#FEF7ED', text: '#92400E', border: '#FDBA74' },
  Local: { bg: '#ECFEFF', text: '#0E7490', border: '#67E8F9' },
  Institutional: { bg: '#F5F3FF', text: '#6D28D9', border: '#C4B5FD' },
};

const RENTERS = [
  { id: 1, name: 'James Mitchell', company: 'Goldman Sachs', email: 'j.mitchell@gs.com', phone: '(212) 555-0142', type: 'Corporate', status: 'booked', property: '1847 Berkman Dr', neighborhood: 'West Augusta', checkIn: 'Apr 9', checkOut: 'Apr 12', rate: 8500, nights: 3, totalValue: 25500, guests: 14, notes: 'VIP returning client — 3rd consecutive year. Requires dedicated concierge.', lastContact: 'Feb 28', source: 'Referral', rating: 5 },
  { id: 2, name: 'Sarah Chen', company: 'Morgan Stanley', email: 's.chen@ms.com', phone: '(212) 555-0198', type: 'Corporate', status: 'active', property: '411 Cumming Rd', neighborhood: 'National Hills', checkIn: 'Apr 7', checkOut: 'Apr 14', rate: 6200, nights: 7, totalValue: 43400, guests: 10, notes: 'Hosting client entertainment. Needs premium property with pool.', lastContact: 'Feb 26', source: 'Direct', rating: 4 },
  { id: 3, name: 'Robert Thompson', company: 'JP Morgan', email: 'r.thompson@jpmc.com', phone: '(212) 555-0167', type: 'Corporate', status: 'qualified', property: '', neighborhood: '', checkIn: 'Apr 8', checkOut: 'Apr 13', rate: 7500, nights: 5, totalValue: 37500, guests: 12, notes: 'Entertaining top-tier clients. Prefers Summerville area. Budget flexible.', lastContact: 'Feb 22', source: 'Referral', rating: 0 },
  { id: 4, name: 'Victoria Stone', company: 'BlackRock', email: 'v.stone@blackrock.com', phone: '(212) 555-0234', type: 'Corporate', status: 'active', property: '628 Forest Hills Dr', neighborhood: 'Forest Hills', checkIn: 'Apr 6', checkOut: 'Apr 15', rate: 5800, nights: 9, totalValue: 52200, guests: 8, notes: 'Extended stay — pre-tournament setup. Private chef required.', lastContact: 'Feb 27', source: 'Repeat', rating: 5 },
  { id: 5, name: 'Michael Park', company: 'Carlyle Group', email: 'm.park@carlyle.com', phone: '(202) 555-0156', type: 'Corporate', status: 'inquiry', property: '', neighborhood: '', checkIn: 'Apr 9', checkOut: 'Apr 12', rate: 7200, nights: 3, totalValue: 21600, guests: 16, notes: 'Large group — needs 2 adjacent properties. Budget ~$15K/night combined.', lastContact: 'Feb 24', source: 'Website', rating: 0 },
  { id: 6, name: 'Linda Thompson', company: 'Thompson Family', email: 'linda.t@gmail.com', phone: '(843) 555-0189', type: 'Private', status: 'qualified', property: '2205 Henry St', neighborhood: 'Olde Town', checkIn: 'Apr 8', checkOut: 'Apr 13', rate: 1800, nights: 5, totalValue: 9000, guests: 6, notes: 'Family reunion — 3 generations. Kid-friendly property needed.', lastContact: 'Feb 25', source: 'Referral', rating: 0 },
  { id: 7, name: 'Dr. Kevin Rhodes', company: 'Augusta Dental', email: 'krhodes@augustadental.com', phone: '(706) 555-0234', type: 'Local', status: 'active', property: '308 Wheeler Rd', neighborhood: 'National Hills', checkIn: 'Apr 9', checkOut: 'Apr 12', rate: 2800, nights: 3, totalValue: 8400, guests: 10, notes: 'Hosting out-of-town partners. Budget-conscious but wants quality.', lastContact: 'Feb 20', source: 'Local Network', rating: 3 },
  { id: 8, name: 'Steve Walsh', company: 'Walsh Family', email: 'swalsh@outlook.com', phone: '(678) 555-0156', type: 'Private', status: 'booked', property: '789 Milledge Rd', neighborhood: 'West Augusta', checkIn: 'Apr 9', checkOut: 'Apr 12', rate: 2500, nights: 3, totalValue: 7500, guests: 8, notes: 'Repeat renter from 2025. Wants golf cart included. Easy client.', lastContact: 'Feb 16', source: 'Repeat', rating: 4 },
  { id: 9, name: 'Diana Flores', company: 'Coca-Cola', email: 'd.flores@coca-cola.com', phone: '(404) 555-0278', type: 'Corporate', status: 'inquiry', property: '', neighborhood: '', checkIn: 'Apr 7', checkOut: 'Apr 14', rate: 0, nights: 7, totalValue: 0, guests: 20, notes: 'Exploring executive hospitality suite. Want premium with pool + event space.', lastContact: 'Feb 24', source: 'Direct', rating: 0 },
  { id: 10, name: 'Dr. Alan Foster', company: 'Augusta University', email: 'afoster@augusta.edu', phone: '(706) 555-0345', type: 'Institutional', status: 'qualified', property: '1803 Highland Ave', neighborhood: 'Summerville', checkIn: 'Apr 8', checkOut: 'Apr 13', rate: 2000, nights: 5, totalValue: 10000, guests: 7, notes: 'Visiting medical faculty. Liked the property. Awaiting budget approval.', lastContact: 'Feb 22', source: 'Email', rating: 0 },
  { id: 11, name: 'Patricia Wells', company: 'UBS', email: 'p.wells@ubs.com', phone: '(203) 555-0199', type: 'Corporate', status: 'booked', property: '925 Lake Olmstead Dr', neighborhood: 'Lake Olmstead', checkIn: 'Apr 7', checkOut: 'Apr 14', rate: 2200, nights: 7, totalValue: 15400, guests: 10, notes: 'Lakefront for private client dinners. Deposit paid.', lastContact: 'Feb 24', source: 'Referral', rating: 4 },
  { id: 12, name: 'Marcus Chen', company: 'Delta Air Lines', email: 'm.chen@delta.com', phone: '(404) 555-0142', type: 'Corporate', status: 'booked', property: '556 Berckmans Rd', neighborhood: 'West Augusta', checkIn: 'Apr 8', checkOut: 'Apr 14', rate: 5500, nights: 6, totalValue: 33000, guests: 18, notes: 'VIP returning — 3rd year. Full concierge package. Airport transfers.', lastContact: 'Feb 28', source: 'Repeat', rating: 5 },
  { id: 13, name: 'Rachel Kim', company: 'Deloitte', email: 'r.kim@deloitte.com', phone: '(404) 555-0367', type: 'Corporate', status: 'active', property: '412 Highland Ave', neighborhood: 'Summerville', checkIn: 'Apr 9', checkOut: 'Apr 12', rate: 4100, nights: 3, totalValue: 12300, guests: 12, notes: 'Partner retreat. Needs AV setup for presentations.', lastContact: 'Feb 26', source: 'Direct', rating: 3 },
  { id: 14, name: 'Tom Brennan', company: 'Brennan Law', email: 't.brennan@brennanlaw.com', phone: '(706) 555-0489', type: 'Local', status: 'inactive', property: '', neighborhood: '', checkIn: '', checkOut: '', rate: 0, nights: 0, totalValue: 0, guests: 0, notes: 'Inquired in January, went cold. Follow up in March.', lastContact: 'Jan 15', source: 'Local Network', rating: 0 },
  { id: 15, name: 'Raj Patel', company: 'IBM Events', email: 'raj.patel@ibm.com', phone: '(919) 555-0412', type: 'Corporate', status: 'inquiry', property: '', neighborhood: '', checkIn: 'Apr 7', checkOut: 'Apr 17', rate: 0, nights: 10, totalValue: 0, guests: 16, notes: 'Needs 2 homes for 16 execs. 10-night stay. Budget ~$8K/night combined.', lastContact: 'Feb 27', source: 'Website', rating: 0 },
];

function App() {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [typeFilter, setTypeFilter] = useState('all');
  const [view, setView] = useState('table');
  const [sortBy, setSortBy] = useState('totalValue');
  const [sortDir, setSortDir] = useState('desc');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let r = RENTERS;
    if (statusFilter !== 'all') r = r.filter(x => x.status === statusFilter);
    if (typeFilter !== 'all') r = r.filter(x => x.type === typeFilter);
    if (search) { const s = search.toLowerCase(); r = r.filter(x => [x.name,x.company,x.email,x.property].some(v=>v.toLowerCase().includes(s))); }
    r.sort((a,b) => {
      let va = a[sortBy], vb = b[sortBy];
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return r;
  }, [search, statusFilter, typeFilter, sortBy, sortDir]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('desc'); }
  };

  /* ── KPI calculations ── */
  const totalPipeline = RENTERS.reduce((s,r) => s + r.totalValue, 0);
  const bookedValue = RENTERS.filter(r => r.status === 'booked').reduce((s,r) => s + r.totalValue, 0);
  const activeRenters = RENTERS.filter(r => r.status === 'active').length;
  const bookedCount = RENTERS.filter(r => r.status === 'booked').length;
  const qualifiedCount = RENTERS.filter(r => r.status === 'qualified').length;
  const inquiryCount = RENTERS.filter(r => r.status === 'inquiry').length;

  const initials = (name) => name.split(' ').map(w => w[0]).join('').slice(0,2);
  const initialsColor = (name) => {
    const colors = ['#006B54','#1d4ed8','#7c3aed','#c53030','#0369a1','#b45309','#0f766e','#9333ea'];
    let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
  };

  const StatusBadge = ({ status }) => {
    const s = STATUS[status] || STATUS.inactive;
    return (
      <span style={{ display: 'inline-block', padding: '3px 10px', borderRadius: 12, fontSize: 11, fontWeight: 600, background: s.bg, color: s.text, border: `1px solid ${s.border}`, whiteSpace: 'nowrap' }}>
        {s.label}
      </span>
    );
  };

  const TypeTag = ({ type }) => {
    const c = TYPE_COLORS[type] || TYPE_COLORS.Private;
    return <span style={{ fontSize: 11, fontWeight: 600, color: c.text, background: c.bg, padding: '2px 8px', borderRadius: 4, border: `1px solid ${c.border}` }}>{type}</span>;
  };

  const StarRating = ({ rating }) => {
    if (!rating) return <span style={{ fontSize: 11, color: '#888' }}>—</span>;
    return <span style={{ fontSize: 12, letterSpacing: 1, color: '#D4AF37' }}>{Array(rating).fill('★').join('')}<span style={{ color: '#ddd' }}>{Array(5-rating).fill('★').join('')}</span></span>;
  };

  const SortHeader = ({ col, label, align }) => {
    const isActive = sortBy === col;
    return (
      <th onClick={() => toggleSort(col)} style={{
        padding: '10px 16px', textAlign: align || 'left', fontSize: 11, fontWeight: 600, color: isActive ? '#006B54' : '#555',
        letterSpacing: 0.3, cursor: 'pointer', userSelect: 'none', textTransform: 'uppercase', whiteSpace: 'nowrap',
        background: '#f4f4f3', borderBottom: '2px solid #d0d0d0',
      }}>
        {label} {isActive && (sortDir === 'asc' ? '↑' : '↓')}
      </th>
    );
  };

  /* ── Status button style — colors match the status badges in the table ── */
  const StatusButton = ({ value, label, count, color }) => {
    const isActive = statusFilter === value;
    const s = STATUS[value];
    // "All" button uses primary green
    const btnBg = value === 'all' ? (isActive ? '#006B54' : '#fff') : (isActive ? s.solid : s.bg);
    const btnColor = value === 'all' ? (isActive ? '#fff' : '#555') : (isActive ? '#fff' : s.text);
    const btnBorder = value === 'all' ? (isActive ? '#006B54' : '#e0e0e0') : (isActive ? s.solid : s.border);
    return (
      <button onClick={() => setStatusFilter(statusFilter === value ? 'all' : value)}
        style={{
          padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
          border: `2px solid ${btnBorder}`,
          background: btnBg,
          color: btnColor,
          transition: 'all 0.15s',
          display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap',
        }}>
        {label}
        <span style={{
          background: isActive ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.06)',
          padding: '1px 7px', borderRadius: 10, fontSize: 10, fontWeight: 700,
          color: isActive ? '#fff' : btnColor,
        }}>{count}</span>
      </button>
    );
  };

  const TypeButton = ({ value, label, count }) => {
    const isActive = typeFilter === value;
    const c = TYPE_COLORS[value] || { bg: '#f0f0f0', text: '#555' };
    return (
      <button onClick={() => setTypeFilter(typeFilter === value ? 'all' : value)}
        style={{
          padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
          border: `2px solid ${value === 'all' ? (isActive ? '#006B54' : '#e0e0e0') : (isActive ? c.text : c.text + '40')}`,
          background: value === 'all' ? (isActive ? '#006B54' : '#fff') : (isActive ? c.bg : c.bg),
          color: value === 'all' ? (isActive ? '#fff' : '#555') : c.text,
          transition: 'all 0.15s',
          display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap',
          opacity: isActive || typeFilter === 'all' ? 1 : 0.5,
        }}>
        {label}
        <span style={{
          background: 'rgba(0,0,0,0.06)',
          padding: '1px 7px', borderRadius: 10, fontSize: 10, fontWeight: 700,
          color: value === 'all' ? (isActive ? '#fff' : '#888') : c.text,
        }}>{count}</span>
      </button>
    );
  };

  const statusCounts = {};
  Object.keys(STATUS).forEach(k => { statusCounts[k] = RENTERS.filter(r => r.status === k).length; });
  const typeCounts = {};
  Object.keys(TYPE_COLORS).forEach(k => { typeCounts[k] = RENTERS.filter(r => r.type === k).length; });

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Branded Header (matches season planner) ── */}
      <header style={{
        background: 'linear-gradient(135deg, #006B54 0%, #004D3B 100%)',
        color: '#fff', padding: '20px 32px',
        boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.5 }}>Renter CRM</h1>
            <p style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>Patron Properties · Masters 2027</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button style={{ padding: '8px 16px', background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>Export</button>
            <button style={{ padding: '8px 16px', background: '#fff', color: '#006B54', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>+ Add Renter</button>
          </div>
        </div>
      </header>

      {/* ── KPI Dashboard Bar (matches season planner) ── */}
      <div style={{
        background: '#fff', padding: '20px 32px', borderBottom: '1px solid #e0e0e0',
        display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 24,
      }}>
        {[
          { label: 'Pipeline Value', value: `$${(totalPipeline/1000).toFixed(0)}K`, sub: `${RENTERS.length} total renters`, pct: 100 },
          { label: 'Booked Revenue', value: `$${(bookedValue/1000).toFixed(0)}K`, sub: `${bookedCount} confirmed`, pct: Math.round((bookedValue/totalPipeline)*100) },
          { label: 'Active Renters', value: activeRenters, sub: 'In progress', pct: Math.round((activeRenters/RENTERS.length)*100) },
          { label: 'Qualified', value: qualifiedCount, sub: 'Ready to book', pct: Math.round((qualifiedCount/RENTERS.length)*100) },
          { label: 'Inquiries', value: inquiryCount, sub: 'Awaiting response', pct: Math.round((inquiryCount/RENTERS.length)*100) },
          { label: 'Avg Deal Size', value: `$${(totalPipeline/RENTERS.filter(r=>r.totalValue>0).length/1000).toFixed(1)}K`, sub: 'Per renter', pct: 0 },
        ].map(kpi => (
          <div key={kpi.label}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>{kpi.label}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: '#006B54', lineHeight: 1 }}>{kpi.value}</div>
            <div style={{ fontSize: 11, color: '#999', marginTop: 4 }}>{kpi.sub}</div>
            {kpi.pct > 0 && (
              <div style={{ width: '100%', height: 5, background: '#e8f0ed', borderRadius: 3, marginTop: 8, overflow: 'hidden' }}>
                <div style={{ width: `${Math.min(kpi.pct,100)}%`, height: '100%', background: 'linear-gradient(90deg, #006B54, #005543)', borderRadius: 3 }} />
              </div>
            )}
          </div>
        ))}
      </div>

      {/* ── Masters Banner ── */}
      <div style={{
        background: 'linear-gradient(90deg, #D4AF37 0%, #F4E4A6 50%, #D4AF37 100%)',
        color: '#333', padding: '10px 32px', textAlign: 'center',
        fontSize: 13, fontWeight: 600, letterSpacing: 0.5,
        borderBottom: '2px solid #B8941C',
      }}>
        The Masters Tournament · April 5–11, 2027 · Augusta National Golf Club
      </div>

      {/* ── Filter Bar: Clickable Status + Type Buttons ── */}
      <div style={{ background: '#fff', padding: '16px 32px', borderBottom: '1px solid #e0e0e0' }}>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
          {/* Search */}
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search renters…"
            style={{ width: 220, padding: '8px 12px', fontSize: 13, border: '1px solid #e0e0e0', borderRadius: 6, outline: 'none', background: '#f5f5f4', color: '#1a1a1a', alignSelf: 'flex-start', marginTop: 4 }} />

          {/* Status + Type stacked */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flex: 1 }}>
            {/* Status buttons */}
            <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginRight: 4, minWidth: 52 }}>Status:</span>
              <StatusButton value="all" label="All" count={RENTERS.length} color="#006B54" />
              {Object.entries(STATUS).map(([key, s]) => (
                <StatusButton key={key} value={key} label={s.label} count={statusCounts[key]} color={s.solid} />
              ))}
            </div>

            {/* Type buttons */}
            <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: 0.5, marginRight: 4, minWidth: 52 }}>Type:</span>
              <TypeButton value="all" label="All" count={RENTERS.length} />
              {Object.keys(TYPE_COLORS).map(t => (
                <TypeButton key={t} value={t} label={t} count={typeCounts[t]} />
              ))}
            </div>
          </div>

          <div style={{ flex: 1 }} />

          {/* View toggle */}
          <div style={{ display: 'flex', border: '1px solid #e0e0e0', borderRadius: 6, overflow: 'hidden' }}>
            {['table','cards'].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding: '7px 14px', fontSize: 12, fontWeight: 500, border: 'none', cursor: 'pointer',
                background: view === v ? '#006B54' : '#fff', color: view === v ? '#fff' : '#555',
              }}>{v === 'table' ? 'Table' : 'Cards'}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{ flex: 1, overflow: 'auto', display: 'flex' }}>
        <div style={{ flex: 1, padding: view === 'cards' ? 24 : 0, overflow: 'auto' }}>

          {view === 'table' ? (
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr>
                  <SortHeader col="name" label="Renter" />
                  <SortHeader col="status" label="Status" />
                  <SortHeader col="type" label="Type" />
                  <SortHeader col="property" label="Property" />
                  <SortHeader col="checkIn" label="Dates" />
                  <SortHeader col="guests" label="Guests" align="center" />
                  <SortHeader col="rate" label="Rate" align="right" />
                  <SortHeader col="totalValue" label="Total" align="right" />
                  <SortHeader col="rating" label="Rating" align="center" />
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, idx) => (
                  <tr key={r.id} onClick={() => setSelected(selected === r.id ? null : r.id)}
                    style={{
                      cursor: 'pointer', borderBottom: '1px solid #e0e0e0',
                      background: selected === r.id ? 'rgba(0,107,84,0.06)' : idx % 2 === 0 ? '#fff' : '#fafaf9',
                    }}>
                    <td style={{ padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        background: initialsColor(r.name), color: '#fff', fontSize: 12, fontWeight: 700, flexShrink: 0,
                      }}>{initials(r.name)}</div>
                      <div>
                        <div style={{ fontWeight: 600, color: '#1a1a1a', lineHeight: 1.2 }}>{r.name}</div>
                        <div style={{ fontSize: 11, color: '#555' }}>{r.company}</div>
                      </div>
                    </td>
                    <td style={{ padding: '10px 16px' }}><StatusBadge status={r.status} /></td>
                    <td style={{ padding: '10px 16px' }}><TypeTag type={r.type} /></td>
                    <td style={{ padding: '10px 16px' }}>
                      {r.property ? (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 500 }}>{r.property}</div>
                          <div style={{ fontSize: 11, color: '#888' }}>{r.neighborhood}</div>
                        </div>
                      ) : <span style={{ fontSize: 12, color: '#888', fontStyle: 'italic' }}>Unassigned</span>}
                    </td>
                    <td style={{ padding: '10px 16px', fontSize: 12, color: '#555', whiteSpace: 'nowrap' }}>
                      {r.checkIn ? `${r.checkIn} – ${r.checkOut}` : '—'}
                    </td>
                    <td style={{ padding: '10px 16px', textAlign: 'center', fontSize: 12 }}>{r.guests || '—'}</td>
                    <td style={{ padding: '10px 16px', textAlign: 'right', fontSize: 12, fontWeight: 500 }}>
                      {r.rate ? `$${r.rate.toLocaleString()}` : '—'}
                    </td>
                    <td style={{ padding: '10px 16px', textAlign: 'right', fontWeight: 700, color: r.totalValue ? '#006B54' : '#888' }}>
                      {r.totalValue ? `$${(r.totalValue/1000).toFixed(1)}K` : 'TBD'}
                    </td>
                    <td style={{ padding: '10px 16px', textAlign: 'center' }}><StarRating rating={r.rating} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : (
            /* Card View */
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 12 }}>
              {filtered.map(r => (
                <div key={r.id} onClick={() => setSelected(selected === r.id ? null : r.id)}
                  style={{
                    background: '#fff', border: '1px solid #e0e0e0', borderRadius: 8, padding: 16, cursor: 'pointer',
                    borderLeft: `4px solid ${STATUS[r.status]?.solid || '#e0e0e0'}`, transition: 'box-shadow 0.12s',
                  }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                    <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        background: initialsColor(r.name), color: '#fff', fontSize: 13, fontWeight: 700,
                      }}>{initials(r.name)}</div>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a' }}>{r.name}</div>
                        <div style={{ fontSize: 12, color: '#555' }}>{r.company}</div>
                      </div>
                    </div>
                    <StatusBadge status={r.status} />
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px 16px', fontSize: 12, marginBottom: 8 }}>
                    <div><span style={{ color: '#888' }}>Property: </span><span style={{ fontWeight: 500 }}>{r.property || 'Unassigned'}</span></div>
                    <div><span style={{ color: '#888' }}>Dates: </span><span>{r.checkIn ? `${r.checkIn}–${r.checkOut}` : '—'}</span></div>
                    <div><span style={{ color: '#888' }}>Guests: </span><span>{r.guests}</span></div>
                    <div><span style={{ color: '#888' }}>Type: </span><TypeTag type={r.type} /></div>
                  </div>

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', paddingTop: 8, borderTop: '1px solid #f5f5f4' }}>
                    <StarRating rating={r.rating} />
                    <span style={{ fontSize: 16, fontWeight: 700, color: r.totalValue ? '#006B54' : '#888' }}>
                      {r.totalValue ? `$${(r.totalValue/1000).toFixed(1)}K` : 'TBD'}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── Detail Sidebar ── */}
        {selected && (() => {
          const r = RENTERS.find(x => x.id === selected);
          if (!r) return null;
          return (
            <div style={{ width: 340, borderLeft: '1px solid #e0e0e0', background: '#fff', overflow: 'auto', padding: 24, flexShrink: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
                <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: initialsColor(r.name), color: '#fff', fontSize: 16, fontWeight: 700,
                  }}>{initials(r.name)}</div>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: '#1a1a1a' }}>{r.name}</div>
                    <div style={{ fontSize: 13, color: '#555' }}>{r.company}</div>
                  </div>
                </div>
                <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', fontSize: 18, color: '#888', cursor: 'pointer' }}>×</button>
              </div>

              <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
                <StatusBadge status={r.status} />
                <TypeTag type={r.type} />
              </div>

              {/* Value card */}
              <div style={{ background: '#f5f5f4', borderRadius: 8, padding: 16, marginBottom: 20 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: '#888' }}>Deal Value</span>
                  <span style={{ fontSize: 20, fontWeight: 700, color: r.totalValue ? '#006B54' : '#888' }}>{r.totalValue ? `$${r.totalValue.toLocaleString()}` : 'TBD'}</span>
                </div>
                {r.rate > 0 && <div style={{ fontSize: 12, color: '#555' }}>${r.rate.toLocaleString()}/night × {r.nights} nights</div>}
              </div>

              {/* Details grid */}
              <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr', gap: '8px 12px', fontSize: 12, marginBottom: 20 }}>
                {[
                  ['Email', r.email],
                  ['Phone', r.phone],
                  ['Property', r.property || 'Unassigned'],
                  ['Neighborhood', r.neighborhood || '—'],
                  ['Check-in', r.checkIn || '—'],
                  ['Check-out', r.checkOut || '—'],
                  ['Guests', r.guests || '—'],
                  ['Source', r.source],
                  ['Last Contact', r.lastContact],
                ].map(([label, val]) => (
                  <React.Fragment key={label}>
                    <span style={{ color: '#888', fontWeight: 500 }}>{label}</span>
                    <span style={{ color: '#1a1a1a', fontWeight: 500 }}>{val}</span>
                  </React.Fragment>
                ))}
              </div>

              {/* Rating */}
              <div style={{ marginBottom: 20 }}>
                <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: '#888', marginBottom: 4, display: 'block' }}>Rating</span>
                <StarRating rating={r.rating} />
              </div>

              {/* Notes */}
              <div style={{ marginBottom: 20 }}>
                <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: '#888', marginBottom: 6, display: 'block' }}>Notes</span>
                <p style={{ fontSize: 13, color: '#555', lineHeight: 1.6 }}>{r.notes}</p>
              </div>

              {/* Actions */}
              <div style={{ display: 'flex', gap: 8 }}>
                <button style={{ flex: 1, padding: '10px', background: '#006B54', color: '#fff', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  Send Email
                </button>
                <button style={{ flex: 1, padding: '10px', background: '#fff', color: '#006B54', border: '1px solid #006B54', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  Edit Renter
                </button>
              </div>
            </div>
          );
        })()}
      </div>

      {/* Footer */}
      <footer style={{ padding: '12px 32px', borderTop: '1px solid #e0e0e0', background: '#fff', display: 'flex', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#999', textTransform: 'uppercase' }}>Patron Properties</span>
        <span style={{ fontSize: 11, color: '#999' }}>Masters 2027 · {filtered.length} of {RENTERS.length} renters · Click row for detail</span>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
