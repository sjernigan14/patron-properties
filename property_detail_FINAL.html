<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Augusta Estate | Patron Properties</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #006B54;
            --primary-dark: #004D3B;
            --primary-light: rgba(0,107,84,0.08);
            --bg: #f5f5f4;
            --surface: #ffffff;
            --text: #111111;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --border: #e0e0e0;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        html, body { font-family: var(--font); color: var(--text); background: var(--bg); line-height: 1.5; }
        button { font-family: var(--font); cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        /* ── property data ─── */
        const PROPERTY = {
            id: 'PP-1001',
            name: 'The Augusta Estate',
            address: '1847 Berkman Drive, Augusta GA 30901',
            status: 'available',
            rating: 4.9,
            reviews: 23,
            walkable: true,
            beds: 5, baths: 4, sqft: 3200, sleeps: 12, garage: 2,
            pricing: {
                practiceNight: 2200,
                tournamentNight: 3400,
                fullWeek: 18500,
                weeklyRate: 16800,
                cleaningFee: 450,
                securityDeposit: 2500,
            },
            description: 'Experience unparalleled luxury at The Augusta Estate, a stunning contemporary home nestled in one of Augusta\'s most prestigious neighborhoods. This magnificent residence combines sophisticated design with modern comfort, offering the perfect retreat for those seeking an exclusive Masters experience.',
            descriptionLong: 'Every detail has been meticulously curated to provide an exceptional stay—from the elegant interior finishes and chef\'s kitchen to the resort-style outdoor amenities including a heated pool, hot tub, and professional putting green. The open floor plan is ideal for entertaining, while five generously appointed bedrooms ensure everyone has a private retreat. Located less than a mile from Augusta National, this is the ultimate base for your Masters week.',
            amenities: [
                { name:'Heated Pool', icon:'🏊', cat:'Outdoor' },
                { name:'Hot Tub', icon:'🛁', cat:'Outdoor' },
                { name:"Chef's Kitchen", icon:'👨‍🍳', cat:'Indoor' },
                { name:'Outdoor Dining', icon:'🍽️', cat:'Outdoor' },
                { name:'Smart Home', icon:'🏠', cat:'Tech' },
                { name:'Security System', icon:'🔒', cat:'Tech' },
                { name:'Golf Cart Included', icon:'⛳', cat:'Outdoor' },
                { name:'Fenced Yard', icon:'🌳', cat:'Outdoor' },
                { name:'Fire Pit', icon:'🔥', cat:'Outdoor' },
                { name:'Game Room', icon:'🎮', cat:'Indoor' },
                { name:'High-Speed WiFi', icon:'📡', cat:'Tech' },
                { name:'Washer / Dryer', icon:'🧺', cat:'Indoor' },
                { name:'Putting Green', icon:'⛳', cat:'Outdoor' },
                { name:'75" Smart TV', icon:'📺', cat:'Indoor' },
                { name:'EV Charger', icon:'🔌', cat:'Tech' },
            ],
            rules: [
                { icon:'🚭', title:'No Smoking', desc:'Not permitted inside the property. Designated outdoor area available.' },
                { icon:'🐾', title:'No Pets', desc:'For the comfort of all guests, pets are not allowed at this property.' },
                { icon:'🎵', title:'Quiet Hours', desc:'10 PM – 8 AM. Please be respectful of neighbors.' },
                { icon:'👥', title:'Max 12 Guests', desc:'Additional guests require prior approval from management.' },
                { icon:'🔑', title:'Check-in 3 PM / Out 11 AM', desc:'Early check-in and late check-out available upon request.' },
                { icon:'🅿️', title:'Parking', desc:'2-car garage + driveway fits 4 additional vehicles.' },
            ],
            nearby: [
                { icon:'⛳', name:'Augusta National Golf Club', dist:'0.8 miles', note:'Walkable via Berkman Dr' },
                { icon:'🏙️', name:'Downtown Augusta', dist:'3.0 miles', note:'Restaurants & nightlife' },
                { icon:'✈️', name:'Augusta Regional Airport', dist:'15 miles', note:'25 min drive' },
                { icon:'🍽️', name:'Fine Dining District', dist:'1.2 miles', note:'T-Bonz, Frog Hollow, Boll Weevil' },
                { icon:'🛒', name:'Grocery & Essentials', dist:'0.5 miles', note:'Publix, CVS, Starbucks' },
                { icon:'🏥', name:'Augusta University Medical', dist:'4.2 miles', note:'Level I trauma center' },
            ],
            similarProperties: [
                { name:'The Magnolia Manor', address:'2156 Lakeside Dr', beds:4, baths:3, sleeps:8, price:2600, rating:4.7, status:'available' },
                { name:'Hillcrest Golf View', address:'1923 Clubhouse Rd', beds:6, baths:5, sleeps:14, price:3200, rating:4.8, status:'on_hold' },
                { name:'The Oak Grove Villa', address:'2847 Heritage Ln', beds:4, baths:3, sleeps:10, price:2450, rating:4.6, status:'available' },
            ],
        };

        const STATUS_LABELS = {
            available: { label:'Available', bg:'#D1FAE5', text:'#065F46', border:'#6EE7B7' },
            on_hold:   { label:'On Hold',   bg:'#FEF3C7', text:'#92400E', border:'#FCD34D' },
            booked:    { label:'Booked',    bg:'#DBEAFE', text:'#1E40AF', border:'#93C5FD' },
        };

        /* ── main component ─── */
        function PropertyDetail() {
            const [tab, setTab] = useState('overview');
            const [calMonth, setCalMonth] = useState(3); // April
            const [selectedImage, setSelectedImage] = useState(0);
            const [showBookingModal, setShowBookingModal] = useState(false);
            const [formData, setFormData] = useState({ name:'', email:'', phone:'', checkIn:'', checkOut:'', guests:'', message:'' });
            const p = PROPERTY;
            const sc = STATUS_LABELS[p.status];

            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const bookedDates = { 3: [5,6,7,8,9,10,11] }; // Masters week booked
            const holdDates = { 3: [1,2,3,4] }; // early week on hold

            const getDaysInMonth = (m) => new Date(2027, m+1, 0).getDate();
            const getFirstDay = (m) => new Date(2027, m, 1).getDay();

            const tabs = [
                { key:'overview', label:'Overview' },
                { key:'amenities', label:'Amenities & Details' },
                { key:'availability', label:'Availability' },
                { key:'location', label:'Location' },
                { key:'rules', label:'House Rules' },
            ];

            const handleFormChange = (e) => {
                setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            };

            /* ── header ─── */
            const Header = () => (
                <div style={{ background:'linear-gradient(135deg, #006B54, #004D3B)', color:'white', padding:'20px 32px' }}>
                    <div style={{ maxWidth:1400, margin:'0 auto' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
                                <button onClick={() => {}} style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.25)', color:'white', padding:'6px 14px', borderRadius:6, fontSize:13, fontWeight:500 }}>← All Properties</button>
                                <div>
                                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                                        <span style={{ fontSize:22, fontWeight:700, letterSpacing:'-0.02em' }}>{p.name}</span>
                                        <span style={{ background:sc.bg, color:sc.text, border:`1px solid ${sc.border}`, padding:'3px 10px', borderRadius:12, fontSize:11, fontWeight:600 }}>{sc.label}</span>
                                        {p.walkable && <span style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.3)', padding:'3px 10px', borderRadius:12, fontSize:11 }}>🚶 Walkable to Augusta National</span>}
                                    </div>
                                    <div style={{ fontSize:13, opacity:0.85, marginTop:3 }}>{p.address}</div>
                                </div>
                            </div>
                            <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                                <div style={{ textAlign:'right', marginRight:12 }}>
                                    <div style={{ fontSize:11, opacity:0.7 }}>★ {p.rating} · {p.reviews} reviews</div>
                                </div>
                                <button style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.3)', color:'white', padding:'8px 18px', borderRadius:6, fontSize:13, fontWeight:500 }}>♡ Save</button>
                                <button style={{ background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.3)', color:'white', padding:'8px 18px', borderRadius:6, fontSize:13, fontWeight:500 }}>↗ Share</button>
                                <button onClick={() => setShowBookingModal(true)} style={{ background:'white', color:'#006B54', border:'none', padding:'8px 22px', borderRadius:6, fontSize:13, fontWeight:700 }}>Request to Book</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            /* ── Masters banner ─── */
            const MastersBanner = () => (
                <div style={{ background:'linear-gradient(90deg, #D4AF37, #C5A028)', padding:'8px 32px', display:'flex', justifyContent:'center', alignItems:'center', gap:24 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:'#1a1a1a', letterSpacing:'0.5px' }}>⛳ MASTERS 2027</span>
                    <span style={{ fontSize:12, color:'#4a3800' }}>Tournament: Apr 7–13 • Practice Rounds: Apr 5–6</span>
                    <span style={{ fontSize:12, color:'#4a3800' }}>Premium rental — book early for best availability</span>
                </div>
            );

            /* ── KPI bar ─── */
            const KpiBar = () => {
                const kpis = [
                    { label:'Bedrooms', value: p.beds },
                    { label:'Bathrooms', value: p.baths },
                    { label:'Sq Ft', value: p.sqft.toLocaleString() },
                    { label:'Sleeps', value: p.sleeps },
                    { label:'Garage', value: p.garage },
                    { label:'Nightly From', value: `$${p.pricing.practiceNight.toLocaleString()}` },
                    { label:'Weekly Rate', value: `$${p.pricing.weeklyRate.toLocaleString()}` },
                    { label:'Rating', value: `★ ${p.rating}` },
                ];
                return (
                    <div style={{ background:'white', borderBottom:'1px solid #e0e0e0', padding:'16px 32px' }}>
                        <div style={{ maxWidth:1400, margin:'0 auto', display:'flex', justifyContent:'space-between' }}>
                            {kpis.map((k,i) => (
                                <div key={i} style={{ textAlign:'center', flex:1 }}>
                                    <div style={{ fontSize:28, fontWeight:700, color:'#006B54', lineHeight:1.1 }}>{k.value}</div>
                                    <div style={{ fontSize:11, color:'#888', marginTop:4, textTransform:'uppercase', letterSpacing:'0.5px' }}>{k.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            /* ── tab bar ─── */
            const TabBar = () => (
                <div style={{ background:'white', borderBottom:'1px solid #e0e0e0', padding:'0 32px' }}>
                    <div style={{ maxWidth:1400, margin:'0 auto', display:'flex', gap:0 }}>
                        {tabs.map(t => (
                            <button key={t.key} onClick={() => setTab(t.key)} style={{
                                padding:'14px 24px', fontSize:13, fontWeight: tab===t.key ? 700 : 500,
                                color: tab===t.key ? '#006B54' : '#888', background:'none', border:'none',
                                borderBottom: tab===t.key ? '3px solid #006B54' : '3px solid transparent',
                            }}>{t.label}</button>
                        ))}
                    </div>
                </div>
            );

            /* ── OVERVIEW TAB ─── */
            const OverviewTab = () => (
                <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:24 }}>
                    {/* Left: gallery + description */}
                    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
                        {/* Photo gallery */}
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', overflow:'hidden' }}>
                            <div style={{ height:380, background:'linear-gradient(135deg, #1a5d4f 0%, #0d3a31 50%, #006B54 100%)', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                                <span style={{ fontSize:80, opacity:0.4 }}>🏡</span>
                                <div style={{ position:'absolute', bottom:16, left:'50%', transform:'translateX(-50%)', display:'flex', gap:8 }}>
                                    {[0,1,2,3,4,5].map(i => (
                                        <button key={i} onClick={() => setSelectedImage(i)} style={{
                                            width:10, height:10, borderRadius:'50%', border:'none',
                                            background: selectedImage===i ? 'white' : 'rgba(255,255,255,0.4)',
                                        }} />
                                    ))}
                                </div>
                                <div style={{ position:'absolute', top:16, right:16, background:'rgba(0,0,0,0.5)', color:'white', padding:'4px 12px', borderRadius:12, fontSize:12, fontWeight:600 }}>
                                    {selectedImage+1} / 6
                                </div>
                                <button onClick={() => setSelectedImage(i => i===0 ? 5 : i-1)} style={{ position:'absolute', left:16, top:'50%', transform:'translateY(-50%)', width:40, height:40, borderRadius:8, background:'rgba(255,255,255,0.9)', border:'none', fontSize:16, fontWeight:700, color:'#333' }}>‹</button>
                                <button onClick={() => setSelectedImage(i => i===5 ? 0 : i+1)} style={{ position:'absolute', right:16, top:'50%', transform:'translateY(-50%)', width:40, height:40, borderRadius:8, background:'rgba(255,255,255,0.9)', border:'none', fontSize:16, fontWeight:700, color:'#333' }}>›</button>
                            </div>
                            <div style={{ display:'flex', gap:8, padding:12 }}>
                                {[0,1,2,3,4,5].map(i => (
                                    <div key={i} onClick={() => setSelectedImage(i)} style={{
                                        flex:1, height:64, borderRadius:6, cursor:'pointer',
                                        background: `hsl(${155 + i*12}, 28%, ${32 + i*5}%)`,
                                        border: selectedImage===i ? '2px solid #006B54' : '2px solid #e0e0e0',
                                        display:'flex', alignItems:'center', justifyContent:'center', fontSize:20,
                                        opacity: selectedImage===i ? 1 : 0.6,
                                    }}>📷</div>
                                ))}
                            </div>
                        </div>

                        {/* Description */}
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                            <div style={{ fontSize:16, fontWeight:700, marginBottom:12 }}>About This Property</div>
                            <p style={{ fontSize:14, lineHeight:1.8, color:'#555', marginBottom:12 }}>{p.description}</p>
                            <p style={{ fontSize:14, lineHeight:1.8, color:'#555' }}>{p.descriptionLong}</p>
                        </div>

                        {/* Top amenities preview */}
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                                <div style={{ fontSize:16, fontWeight:700 }}>Featured Amenities</div>
                                <button onClick={() => setTab('amenities')} style={{ background:'none', border:'none', color:'#006B54', fontSize:13, fontWeight:600 }}>View all {p.amenities.length} →</button>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:10 }}>
                                {p.amenities.slice(0,10).map((a,i) => (
                                    <div key={i} style={{ textAlign:'center', padding:'14px 6px', background:'var(--primary-light)', border:'1.5px solid #006B54', borderRadius:8 }}>
                                        <div style={{ fontSize:22, marginBottom:4 }}>{a.icon}</div>
                                        <div style={{ fontSize:11, fontWeight:600, color:'#006B54' }}>{a.name}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Right sidebar: pricing + booking CTA */}
                    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
                        {/* Pricing card */}
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24, position:'sticky', top:20 }}>
                            <div style={{ fontSize:16, fontWeight:700, marginBottom:4 }}>Masters 2027 Rates</div>
                            <div style={{ fontSize:12, color:'#888', marginBottom:16 }}>April 5–13, 2027</div>

                            <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
                                {[
                                    { label:'Practice Rounds', sub:'Mon–Tue', price:`$${p.pricing.practiceNight.toLocaleString()}`, unit:'/night' },
                                    { label:'Tournament Days', sub:'Thu–Sun', price:`$${p.pricing.tournamentNight.toLocaleString()}`, unit:'/night' },
                                    { label:'Weekly Rate', sub:'7 nights', price:`$${p.pricing.weeklyRate.toLocaleString()}`, unit:'/week', savings: true },
                                    { label:'Full Masters Package', sub:'Apr 5–11', price:`$${p.pricing.fullWeek.toLocaleString()}`, unit:'', featured:true },
                                ].map((r,i) => (
                                    <div key={i} style={{
                                        display:'flex', justifyContent:'space-between', alignItems:'center',
                                        padding:'12px 14px', borderRadius:8,
                                        background: r.featured ? '#D1FAE5' : r.savings ? '#F0FDF4' : '#f5f5f4',
                                        border: r.featured ? '1.5px solid #6EE7B7' : r.savings ? '1px solid #BBF7D0' : '1px solid #e0e0e0',
                                    }}>
                                        <div>
                                            <div style={{ fontSize:13, fontWeight: r.featured ? 700 : 500, color: r.featured ? '#065F46' : '#111' }}>{r.label}</div>
                                            <div style={{ fontSize:11, color:'#888' }}>{r.sub}</div>
                                        </div>
                                        <div style={{ textAlign:'right' }}>
                                            <span style={{ fontSize: r.featured ? 18 : 16, fontWeight:700, color: r.featured ? '#006B54' : '#111' }}>{r.price}</span>
                                            <span style={{ fontSize:11, color:'#888' }}>{r.unit}</span>
                                            {r.savings && <div style={{ fontSize:10, color:'#006B54', fontWeight:600, marginTop:1 }}>Save $1,700</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div style={{ borderTop:'1px solid #e0e0e0', paddingTop:14, marginBottom:16, display:'flex', flexDirection:'column', gap:6 }}>
                                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'#888' }}>
                                    <span>Cleaning fee</span>
                                    <span>${p.pricing.cleaningFee}</span>
                                </div>
                                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'#888' }}>
                                    <span>Security deposit (refundable)</span>
                                    <span>${p.pricing.securityDeposit.toLocaleString()}</span>
                                </div>
                            </div>

                            <button onClick={() => setShowBookingModal(true)} style={{ width:'100%', padding:'14px', background:'#006B54', color:'white', border:'none', borderRadius:8, fontSize:15, fontWeight:700, marginBottom:10 }}>
                                Request to Book
                            </button>
                            <button onClick={() => setShowBookingModal(true)} style={{ width:'100%', padding:'12px', background:'transparent', color:'#006B54', border:'1.5px solid #006B54', borderRadius:8, fontSize:13, fontWeight:600 }}>
                                Ask a Question
                            </button>

                            <div style={{ marginTop:16, textAlign:'center', fontSize:12, color:'#888' }}>
                                📞 (706) 555-0142 • Typically responds within 4 hours
                            </div>
                        </div>
                    </div>
                </div>
            );

            /* ── AMENITIES TAB ─── */
            const AmenitiesTab = () => {
                const cats = ['Outdoor','Indoor','Tech'];
                return (
                    <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
                        {cats.map(cat => {
                            const items = p.amenities.filter(a => a.cat === cat);
                            return (
                                <div key={cat} style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                                    <div style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>{cat} Amenities</div>
                                    <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12 }}>
                                        {items.map((a,i) => (
                                            <div key={i} style={{ textAlign:'center', padding:'18px 8px', background:'var(--primary-light)', border:'1.5px solid #006B54', borderRadius:8 }}>
                                                <div style={{ fontSize:28, marginBottom:6 }}>{a.icon}</div>
                                                <div style={{ fontSize:12, fontWeight:600, color:'#006B54' }}>{a.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                        {/* Property specs */}
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                            <div style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>Property Specifications</div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16 }}>
                                {[
                                    { label:'Year Built', value:'2018' }, { label:'Lot Size', value:'0.45 acres' },
                                    { label:'Style', value:'Contemporary' }, { label:'Floors', value:'2' },
                                    { label:'Master Suite', value:'King, en-suite' }, { label:'Kitchen', value:'Sub-Zero, Wolf' },
                                    { label:'Outdoor Space', value:'3,500 sq ft' }, { label:'Pool', value:'Heated, 40ft' },
                                ].map((s,i) => (
                                    <div key={i} style={{ padding:'14px 16px', background:'#f5f5f4', borderRadius:8, border:'1px solid #e0e0e0' }}>
                                        <div style={{ fontSize:11, color:'#888', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:4 }}>{s.label}</div>
                                        <div style={{ fontSize:14, fontWeight:600, color:'#111' }}>{s.value}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            /* ── AVAILABILITY TAB ─── */
            const AvailabilityTab = () => {
                const daysInMonth = getDaysInMonth(calMonth);
                const firstDay = getFirstDay(calMonth);
                const booked = bookedDates[calMonth] || [];
                const holds = holdDates[calMonth] || [];
                const cells = [];
                for (let i=0; i<firstDay; i++) cells.push(null);
                for (let d=1; d<=daysInMonth; d++) cells.push(d);

                return (
                    <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:24 }}>
                        <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                                <div style={{ display:'flex', gap:8 }}>
                                    <button onClick={() => setCalMonth(Math.max(0, calMonth-1))} style={{ width:34, height:34, borderRadius:6, border:'1px solid #e0e0e0', background:'white', fontSize:14 }}>←</button>
                                    <button onClick={() => setCalMonth(Math.min(11, calMonth+1))} style={{ width:34, height:34, borderRadius:6, border:'1px solid #e0e0e0', background:'white', fontSize:14 }}>→</button>
                                </div>
                                <div style={{ fontSize:17, fontWeight:700 }}>{months[calMonth]} 2027</div>
                                <div style={{ display:'flex', gap:14 }}>
                                    <span style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}><span style={{ width:12, height:12, borderRadius:3, background:'#D1FAE5', border:'1px solid #6EE7B7', display:'inline-block' }}></span> Available</span>
                                    <span style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}><span style={{ width:12, height:12, borderRadius:3, background:'#FEF3C7', border:'1px solid #FCD34D', display:'inline-block' }}></span> On Hold</span>
                                    <span style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}><span style={{ width:12, height:12, borderRadius:3, background:'#DBEAFE', border:'1px solid #93C5FD', display:'inline-block' }}></span> Booked</span>
                                </div>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:6, marginBottom:8 }}>
                                {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
                                    <div key={d} style={{ textAlign:'center', fontSize:11, fontWeight:600, color:'#888', padding:'6px 0' }}>{d}</div>
                                ))}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:6 }}>
                                {cells.map((day,i) => {
                                    if (!day) return <div key={i} />;
                                    const isBooked = booked.includes(day);
                                    const isHold = holds.includes(day);
                                    const bg = isBooked ? '#DBEAFE' : isHold ? '#FEF3C7' : '#D1FAE5';
                                    const border = isBooked ? '#93C5FD' : isHold ? '#FCD34D' : '#6EE7B7';
                                    const color = isBooked ? '#1E40AF' : isHold ? '#92400E' : '#065F46';
                                    return (
                                        <div key={i} style={{ aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:6, fontSize:13, fontWeight:500, background:bg, border:`1px solid ${border}`, color, cursor: !isBooked ? 'pointer' : 'default' }}>
                                            {day}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Booking guidance sidebar */}
                        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                            <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:20 }}>
                                <div style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>Booking Tips</div>
                                <div style={{ display:'flex', flexDirection:'column', gap:10, fontSize:13, color:'#555', lineHeight:1.6 }}>
                                    <div>⛳ <strong>Masters Week</strong> is the most popular period. Book early to secure your preferred dates.</div>
                                    <div>📅 <strong>On Hold</strong> dates may become available — submit an inquiry and we'll notify you.</div>
                                    <div>💰 <strong>Weekly bookings</strong> include a $1,700 discount over nightly rates.</div>
                                    <div>🔒 A <strong>50% deposit</strong> secures your reservation. Balance due 30 days before check-in.</div>
                                </div>
                            </div>
                            <div style={{ background:'#D1FAE5', borderRadius:10, border:'1px solid #6EE7B7', padding:20 }}>
                                <div style={{ fontSize:14, fontWeight:700, color:'#065F46', marginBottom:8 }}>April Availability</div>
                                <div style={{ fontSize:13, color:'#065F46', lineHeight:1.6 }}>
                                    <strong>16 nights available</strong> in April 2027. Masters Week (Apr 5–11) is currently booked. Practice round dates (Apr 1–4) are on hold — inquire for availability.
                                </div>
                            </div>
                            <button onClick={() => setShowBookingModal(true)} style={{ width:'100%', padding:'14px', background:'#006B54', color:'white', border:'none', borderRadius:8, fontSize:14, fontWeight:700 }}>
                                Request to Book
                            </button>
                        </div>
                    </div>
                );
            };

            /* ── LOCATION TAB ─── */
            const LocationTab = () => (
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
                    <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', overflow:'hidden' }}>
                        <div style={{ height:360, background:'linear-gradient(135deg, #e8e4df, #d4cfc8)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:48, color:'#aaa' }}>
                            🗺️ Map View
                        </div>
                    </div>
                    <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                        <div style={{ fontSize:16, fontWeight:700, marginBottom:6 }}>Prime Augusta Location</div>
                        <div style={{ fontSize:13, color:'#888', marginBottom:20 }}>Less than a mile from Augusta National Golf Club</div>
                        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                            {p.nearby.map((n,i) => (
                                <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:14, padding:'12px 14px', background:'#f5f5f4', borderRadius:8, border:'1px solid #e0e0e0' }}>
                                    <span style={{ fontSize:24, flexShrink:0 }}>{n.icon}</span>
                                    <div>
                                        <div style={{ fontSize:13, fontWeight:600, color:'#111' }}>{n.name}</div>
                                        <div style={{ fontSize:12, color:'#006B54', fontWeight:500 }}>{n.dist}</div>
                                        <div style={{ fontSize:12, color:'#888', marginTop:2 }}>{n.note}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            /* ── RULES TAB ─── */
            const RulesTab = () => (
                <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
                    <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                        <div style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>House Rules</div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16 }}>
                            {p.rules.map((r,i) => (
                                <div key={i} style={{ padding:20, background:'#f5f5f4', borderRadius:8, border:'1px solid #e0e0e0' }}>
                                    <div style={{ fontSize:28, marginBottom:8 }}>{r.icon}</div>
                                    <div style={{ fontSize:14, fontWeight:700, color:'#111', marginBottom:6 }}>{r.title}</div>
                                    <div style={{ fontSize:13, color:'#555', lineHeight:1.6 }}>{r.desc}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Cancellation policy */}
                    <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                        <div style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>Cancellation Policy</div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16 }}>
                            {[
                                { period:'60+ days before', refund:'100%', color:'#006B54', bg:'#D1FAE5', border:'#6EE7B7' },
                                { period:'30–59 days before', refund:'50%', color:'#D97706', bg:'#FEF3C7', border:'#FCD34D' },
                                { period:'Under 30 days', refund:'Non-refundable', color:'#DC2626', bg:'#FEE2E2', border:'#FCA5A5' },
                            ].map((c,i) => (
                                <div key={i} style={{ padding:20, background:c.bg, borderRadius:8, border:`1px solid ${c.border}`, textAlign:'center' }}>
                                    <div style={{ fontSize:24, fontWeight:700, color:c.color, marginBottom:6 }}>{c.refund}</div>
                                    <div style={{ fontSize:13, color:c.color, fontWeight:500 }}>{c.period}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Contact */}
                    <div style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', padding:24 }}>
                        <div style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>Questions?</div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16 }}>
                            {[
                                { icon:'📞', label:'Call Us', value:'(706) 555-0142' },
                                { icon:'✉️', label:'Email', value:'inquiries@patronproperties.com' },
                                { icon:'⏱️', label:'Response Time', value:'Typically within 4 hours' },
                            ].map((c,i) => (
                                <div key={i} style={{ padding:20, background:'#f5f5f4', borderRadius:8, border:'1px solid #e0e0e0', textAlign:'center' }}>
                                    <div style={{ fontSize:24, marginBottom:8 }}>{c.icon}</div>
                                    <div style={{ fontSize:13, fontWeight:700, color:'#111', marginBottom:4 }}>{c.label}</div>
                                    <div style={{ fontSize:13, color:'#555' }}>{c.value}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            /* ── Similar Properties (shown on all tabs) ─── */
            const SimilarProperties = () => (
                <div style={{ marginTop:32 }}>
                    <div style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>Similar Properties</div>
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:20 }}>
                        {p.similarProperties.map((sp,i) => {
                            const ssc = STATUS_LABELS[sp.status];
                            return (
                                <div key={i} style={{ background:'white', borderRadius:10, border:'1px solid #e0e0e0', overflow:'hidden', cursor:'pointer', transition:'all 0.15s' }} onMouseEnter={e => e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)'} onMouseLeave={e => e.currentTarget.style.boxShadow='none'}>
                                    <div style={{ height:160, background:`linear-gradient(135deg, hsl(${155+i*20}, 28%, 34%), hsl(${165+i*20}, 32%, 24%))`, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                                        <span style={{ fontSize:40, opacity:0.4 }}>🏡</span>
                                        <span style={{ position:'absolute', top:10, right:10, background:ssc.bg, color:ssc.text, border:`1px solid ${ssc.border}`, padding:'2px 10px', borderRadius:10, fontSize:11, fontWeight:600 }}>{ssc.label}</span>
                                    </div>
                                    <div style={{ padding:16 }}>
                                        <div style={{ fontSize:14, fontWeight:700, color:'#111', marginBottom:4 }}>{sp.name}</div>
                                        <div style={{ fontSize:12, color:'#888', marginBottom:10 }}>{sp.address}, Augusta GA</div>
                                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                                            <div style={{ fontSize:12, color:'#555' }}>{sp.beds} bd · {sp.baths} ba · Sleeps {sp.sleeps}</div>
                                            <div style={{ fontSize:14, fontWeight:700, color:'#006B54' }}>${sp.price.toLocaleString()}<span style={{ fontSize:11, fontWeight:400, color:'#888' }}>/nt</span></div>
                                        </div>
                                        <div style={{ marginTop:8, fontSize:12, color:'#D97706', fontWeight:500 }}>★ {sp.rating}</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            /* ── Booking Modal ─── */
            const BookingModal = () => {
                if (!showBookingModal) return null;
                return (
                    <div style={{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }} onClick={() => setShowBookingModal(false)}>
                        <div style={{ background:'white', borderRadius:12, padding:32, width:540, maxHeight:'85vh', overflow:'auto' }} onClick={e => e.stopPropagation()}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                                <div>
                                    <div style={{ fontSize:18, fontWeight:700 }}>Request to Book</div>
                                    <div style={{ fontSize:13, color:'#888', marginTop:2 }}>{p.name} · {p.address}</div>
                                </div>
                                <button onClick={() => setShowBookingModal(false)} style={{ background:'none', border:'none', fontSize:22, color:'#888', padding:4 }}>✕</button>
                            </div>
                            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                                    <div>
                                        <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Full Name *</label>
                                        <input name="name" value={formData.name} onChange={handleFormChange} placeholder="Your full name" style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Email *</label>
                                        <input name="email" type="email" value={formData.email} onChange={handleFormChange} placeholder="email@example.com" style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                    </div>
                                </div>
                                <div>
                                    <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Phone</label>
                                    <input name="phone" type="tel" value={formData.phone} onChange={handleFormChange} placeholder="(xxx) xxx-xxxx" style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
                                    <div>
                                        <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Check-in *</label>
                                        <input name="checkIn" type="date" value={formData.checkIn} onChange={handleFormChange} style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Check-out *</label>
                                        <input name="checkOut" type="date" value={formData.checkOut} onChange={handleFormChange} style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Guests *</label>
                                        <input name="guests" type="number" min="1" max="12" value={formData.guests} onChange={handleFormChange} placeholder="# guests" style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)' }} />
                                    </div>
                                </div>
                                <div>
                                    <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>Message or Special Requests</label>
                                    <textarea name="message" value={formData.message} onChange={handleFormChange} rows={3} placeholder="Let us know if you have any special requests, dietary needs, or questions..." style={{ width:'100%', padding:'10px 14px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:14, fontFamily:'var(--font)', resize:'vertical' }} />
                                </div>
                                <div style={{ background:'#f5f5f4', borderRadius:8, padding:14, fontSize:12, color:'#555', lineHeight:1.6 }}>
                                    By submitting this request, you agree to Patron Properties' rental terms. A 50% deposit is required to confirm your reservation. You will receive a response within 4 hours.
                                </div>
                                <button onClick={() => { setShowBookingModal(false); alert('Thank you! Your booking request has been submitted. We\'ll contact you within 4 hours.'); setFormData({ name:'', email:'', phone:'', checkIn:'', checkOut:'', guests:'', message:'' }); }} style={{ width:'100%', padding:'14px', background:'#006B54', color:'white', border:'none', borderRadius:8, fontSize:15, fontWeight:700 }}>
                                    Submit Booking Request
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div style={{ minHeight:'100vh', background:'#f5f5f4' }}>
                    <Header />
                    <MastersBanner />
                    <KpiBar />
                    <TabBar />
                    <div style={{ maxWidth:1400, margin:'0 auto', padding:'24px 32px' }}>
                        {tab === 'overview' && <OverviewTab />}
                        {tab === 'amenities' && <AmenitiesTab />}
                        {tab === 'availability' && <AvailabilityTab />}
                        {tab === 'location' && <LocationTab />}
                        {tab === 'rules' && <RulesTab />}
                        <SimilarProperties />
                    </div>
                    <BookingModal />
                </div>
            );
        }

        ReactDOM.render(<PropertyDetail />, document.getElementById('root'));
    </script>
</body>
</html>
