<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patron Properties — Homeowner Portal</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #faf8f5;
            color: #3a3a3a;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* SIDEBAR */
        .sidebar {
            background: linear-gradient(180deg, #2d5f47 0%, #245240 100%);
            color: #fff;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #f0e8de;
        }

        .homeowner-name {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-top: 0.5rem;
            font-weight: 400;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.75rem;
            display: block;
        }

        .nav-item {
            display: block;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            width: 100%;
            text-align: left;
            background: none;
            border-top: none;
            border-right: none;
            border-bottom: none;
            font-family: inherit;
        }

        .nav-item:hover {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
        }

        .nav-item.active {
            background-color: rgba(255,255,255,0.15);
            color: #fff;
            border-left-color: #a8d5ba;
            font-weight: 500;
        }

        /* MAIN CONTENT */
        .main {
            background-color: #faf8f5;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #fff;
            border-bottom: 1px solid #e8e4df;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #2d5f47;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            background-color: #f5f2ed;
            cursor: pointer;
            font-size: 0.9rem;
            color: #3a3a3a;
            border: 1px solid #e8e4df;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8d5ba, #7cb99a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .content {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* PAYOUT HERO */
        .payout-hero {
            background: linear-gradient(135deg, #2d5f47 0%, #3a7a5c 100%);
            border-radius: 10px;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .payout-main {
            flex: 1;
            min-width: 200px;
        }

        .payout-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }

        .payout-amount {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .payout-detail {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-top: 0.5rem;
        }

        .payout-breakdown {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .payout-stat {
            text-align: center;
            min-width: 100px;
        }

        .payout-stat-value {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .payout-stat-label {
            font-size: 0.8rem;
            opacity: 0.75;
            margin-top: 0.25rem;
        }

        /* SEASONAL STEPPER */
        .season-stepper {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }

        .season-stepper-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 1rem;
        }

        .stepper-track {
            display: flex;
            align-items: flex-start;
            position: relative;
        }

        .stepper-step {
            flex: 1;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .stepper-dot-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            position: relative;
        }

        .stepper-line-left, .stepper-line-right {
            flex: 1;
            height: 3px;
            background: #e8e4df;
        }

        .stepper-line-left.done, .stepper-line-right.done {
            background: #a8d5ba;
        }

        .stepper-step:first-child .stepper-line-left,
        .stepper-step:last-child .stepper-line-right {
            visibility: hidden;
        }

        .stepper-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8e4df;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            flex-shrink: 0;
            transition: all 0.2s ease;
            border: 3px solid transparent;
        }

        .stepper-dot.done {
            background: #4a7c5a;
            color: #fff;
        }

        .stepper-dot.current {
            background: #2d5f47;
            color: #fff;
            border-color: #a8d5ba;
            width: 36px;
            height: 36px;
            font-size: 0.85rem;
        }

        .stepper-label {
            font-size: 0.75rem;
            color: #999;
            font-weight: 500;
            line-height: 1.3;
        }

        .stepper-label.current {
            color: #2d5f47;
            font-weight: 600;
        }

        .stepper-dates {
            font-size: 0.7rem;
            color: #bbb;
            margin-top: 0.15rem;
        }

        .stepper-dates.current {
            color: #7cb99a;
        }

        /* CARDS GRID */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: #a8d5ba;
            box-shadow: 0 2px 8px rgba(45, 95, 71, 0.08);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 1rem;
        }

        .card-body {
            font-size: 0.95rem;
            color: #3a3a3a;
            line-height: 1.6;
        }

        .card-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e8e4df;
        }

        .card-stat:last-child {
            border-bottom: none;
        }

        .card-stat-label {
            font-size: 0.85rem;
            color: #666;
        }

        .card-stat-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d5f47;
        }

        /* ACTION ITEMS */
        .action-items {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .action-items-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 1rem;
        }

        .action-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: #faf8f5;
            border-left: 4px solid #a8d5ba;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .action-item:last-child {
            margin-bottom: 0;
        }

        .action-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        .action-content {
            flex: 1;
        }

        .action-text {
            font-size: 0.95rem;
            color: #3a3a3a;
            margin-bottom: 0.25rem;
        }

        .action-button {
            font-size: 0.85rem;
            color: #2d5f47;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
        }

        .action-button:hover {
            color: #1a3a2a;
        }

        /* SEASON DETAIL PANEL */
        .season-panel {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .season-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .season-panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2d5f47;
        }

        .season-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .season-badge.active {
            background: #e8f3ec;
            color: #2d5f47;
        }

        .season-badge.upcoming {
            background: #fce8d8;
            color: #c97a3f;
        }

        .season-badge.complete {
            background: #f0ede5;
            color: #666;
        }

        /* CHECKLIST */
        .checklist {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .checklist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .checklist-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d5f47;
        }

        .checklist-progress {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }

        .completion-bar {
            height: 6px;
            background: #e8e4df;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #a8d5ba, #7cb99a);
            transition: width 0.3s ease;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid #f0ede5;
            cursor: pointer;
            user-select: none;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .check-box {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 2px solid #d4c9b8;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-size: 0.75rem;
            color: transparent;
        }

        .check-box.checked {
            background: #4a7c5a;
            border-color: #4a7c5a;
            color: #fff;
        }

        .checklist-label {
            font-size: 0.95rem;
            color: #3a3a3a;
        }

        .checklist-label.checked {
            color: #999;
            text-decoration: line-through;
        }

        /* PROPERTY DETAILS */
        .property-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .property-image-section {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            overflow: hidden;
        }

        .property-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #d4c9b8, #c9bfa8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a7a6a;
            font-size: 0.9rem;
        }

        .image-controls {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .btn-secondary {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #d4c9b8;
            border-radius: 6px;
            background: #fff;
            color: #2d5f47;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-secondary:hover {
            background: #f5f2ed;
            border-color: #a8d5ba;
        }

        .property-specs {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
        }

        .spec-group {
            margin-bottom: 1.5rem;
        }

        .spec-group:last-child {
            margin-bottom: 0;
        }

        .spec-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 0.5rem;
            display: block;
        }

        .spec-value {
            font-size: 1rem;
            color: #3a3a3a;
            font-weight: 500;
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .room-card {
            background: #faf8f5;
            border: 1px solid #e8e4df;
            border-radius: 6px;
            padding: 1rem;
        }

        .room-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 0.75rem;
        }

        .room-detail {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .preference-section {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .preference-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 1rem;
        }

        .preference-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e8e4df;
        }

        .preference-row:last-child {
            border-bottom: none;
        }

        .preference-label {
            font-size: 0.95rem;
            color: #3a3a3a;
        }

        .preference-value {
            font-size: 0.9rem;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-weight: 500;
        }

        .preference-value.yes {
            background: #e8f3ec;
            color: #4a7c5a;
        }

        .preference-value.no {
            background: #f5e8e0;
            color: #c97a3f;
        }

        .preference-value.flexible {
            background: #f0ede5;
            color: #666;
        }

        /* FORM SECTIONS */
        .form-section {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 1rem;
        }

        .completion-text {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .form-field {
            margin-bottom: 1.5rem;
        }

        .form-field:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: #3a3a3a;
            margin-bottom: 0.5rem;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d4c9b8;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #3a3a3a;
            transition: border-color 0.2s ease;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #a8d5ba;
            box-shadow: 0 0 0 3px rgba(168, 213, 186, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .field-complete {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #e8f3ec;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #4a7c5a;
            font-weight: 500;
        }

        .field-incomplete {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #f5e8e0;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #c97a3f;
            font-weight: 500;
        }

        /* CALENDAR */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e8e4df;
        }

        .calendar-nav {
            display: flex;
            gap: 1rem;
        }

        .calendar-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #d4c9b8;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #3a3a3a;
            font-family: inherit;
        }

        .calendar-btn:hover {
            background: #f5f2ed;
        }

        .month-year {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d5f47;
        }

        .calendar-check {
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e8e4df;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .check-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2d5f47;
            margin-bottom: 1rem;
        }

        .check-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: #2d5f47;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary:hover {
            background: #1a3a2a;
        }

        .btn-outline {
            padding: 0.75rem 1.5rem;
            background: #fff;
            color: #2d5f47;
            border: 1px solid #d4c9b8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-outline:hover {
            background: #f5f2ed;
            border-color: #a8d5ba;
        }

        .mini-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e8e4df;
        }

        .cal-day-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #999;
            text-align: center;
            padding: 0.5rem;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #3a3a3a;
            border: 1px solid #e8e4df;
        }

        .cal-day.empty {
            background: #faf8f5;
            color: #ccc;
            border: none;
        }

        .cal-day.available {
            background: #e8f3ec;
            color: #2d5f47;
            font-weight: 500;
        }

        .cal-day.rented {
            background: #a8d5ba;
            color: #fff;
            font-weight: 600;
        }

        .cal-day.other {
            background: #f5e8e0;
            color: #c97a3f;
            font-weight: 500;
        }

        .cal-day.blocked {
            background: #e8e4df;
            color: #999;
            font-weight: 500;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 1.5rem;
            background: #fff;
            border-radius: 8px;

                                <div className="user-menu">

                                    <span>Margaret W.</span>
                                </div>
                            </div>
                        </div>

                        <div className="content">

                            {/* DASHBOARD */}
                            {activeSection === 'dashboard' && (
                                <div>
                                    {renderPayoutHero()}
                                    {renderSeasonStepper()}

                                    {/* Current Season Panel */}
                                    <div className="season-panel">
                                        <div className="season-panel-header">
                                            <div className="season-panel-title">{seasonContent[currentSeason.id].title}</div>
                                            <div className={`season-badge ${seasonContent[currentSeason.id].badge}`}>
                                                {seasonContent[currentSeason.id].badgeLabel}
                                            </div>
                                        </div>
                                        <p style={{fontSize: '0.95rem', color: '#666', marginBottom: '1.5rem', lineHeight: '1.6'}}>
                                            {seasonContent[currentSeason.id].description}
                                        </p>
                                    </div>

                                    {renderChecklist(currentChecklist, 'Final Prep Checklist — You Handle 85% of Prep', true)}

                                    <div className="action-items">
                                        <div className="action-items-title">{actionItems.length} Items Need Your Attention</div>
                                        {actionItems.map(item => (
                                            <div key={item.id} className="action-item">
                                                <div className="action-content">
                                                    <div className="action-text">{item.text}</div>
                                                    <button className="action-button">{item.action} &rarr;</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="cards-grid">
                                        <div className="card">
                                            <div className="card-title">Property Snapshot</div>
                                            <div className="card-stat">
                                                <span className="card-stat-label">Address</span>
                                                <span className="card-stat-value">{homeowner.property.name}</span>
                                            </div>
                                            <div className="card-stat">
                                                <span className="card-stat-label">Beds / Baths</span>
                                                <span className="card-stat-value">{homeowner.property.beds} / {homeowner.property.baths}</span>
                                            </div>
                                            <div className="card-stat">
                                                <span className="card-stat-label">Home Type</span>
                                                <span className="card-stat-value">{homeowner.homeType}</span>
                                            </div>
                                            <div className="card-stat">
                                                <span className="card-stat-label">Neighborhood</span>
                                                <span className="card-stat-value">{homeowner.property.neighborhood}</span>
                                            </div>
                                        </div>

                                        <div className="card">
                                            <div className="card-title">Renter Details</div>
                                            <div className="card-body">
                                                <strong>{homeowner.renter}</strong><br />
                                                Masters week (Apr 6-13)<br />
                                                8 nights<br />
                                                Professional rental management
                                            </div>
                                        </div>

                                        <div className="card">
                                            <div className="card-title">House Info Status</div>
                                            <div className="card-body">
                                                <div className="completion-bar" style={{marginBottom: '0.5rem'}}>
                                                    <div className="completion-fill" style={{width: `${Math.round(homeowner.houseInfoComplete / homeowner.houseInfoTotal * 100)}%`}}></div>
                                                </div>
                                                <div style={{fontSize: '0.9rem', color: '#666', marginBottom: '0.75rem'}}>
                                                    {homeowner.houseInfoComplete} of {homeowner.houseInfoTotal} fields complete
                                                </div>
                                                <div style={{fontSize: '0.9rem'}}>
                                                    Missing: <strong>AV Setup</strong> and <strong>Emergency HVAC</strong>. Complete these before handoff.
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Upcoming Season Preview */}
                                    <div className="season-panel" style={{background: '#faf8f5'}}>
                                        <div className="season-panel-header">
                                            <div className="season-panel-title">{seasonContent['tournament'].title}</div>
                                            <div className="season-badge upcoming">{seasonContent['tournament'].badgeLabel}</div>
                                        </div>
                                        <p style={{fontSize: '0.95rem', color: '#666', marginBottom: '1rem', lineHeight: '1.6'}}>
                                            {seasonContent['tournament'].description}
                                        </p>
                                        {renderChecklist(seasonContent['tournament'].items, 'Tournament Week Checklist', true)}
                                    </div>
                                </div>
                            )}

                            {/* MY PROPERTY */}
                            {activeSection === 'property' && (
                                <div>
                                    <div className="property-grid">
                                        <div className="property-image-section">
                                            <div className="property-image">Professional photo of your home</div>
                                            <div className="image-controls">
                                                <button className="btn-secondary">Upload Photo</button>
                                                <button className="btn-secondary">Manage Photos</button>
                                            </div>
                                        </div>

                                        <div className="property-specs">
                                            <div className="spec-group">
                                                <span className="spec-label">Address</span>
                                                <div className="spec-value">{homeowner.property.address}</div>
                                            </div>
                                            <div className="spec-group">
                                                <span className="spec-label">Bedrooms & Bathrooms</span>
                                                <div className="spec-value">{homeowner.property.beds} bed / {homeowner.property.baths} bath</div>
                                            </div>
                                            <div className="spec-group">
                                                <span className="spec-label">Square Footage</span>
                                                <div className="spec-value">{homeowner.property.sqft.toLocaleString()} sq ft</div>
                                            </div>
                                            <div className="spec-group">
                                                <span className="spec-label">Year Built</span>
                                                <div className="spec-value">{homeowner.property.yearBuilt}</div>
                                            </div>
                                            <div className="spec-group">
                                                <span className="spec-label">Neighborhood</span>
                                                <div className="spec-value">{homeowner.property.neighborhood}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="preference-section">
                                        <div className="preference-title">Room Details</div>
                                        <div className="room-grid">
                                            {roomDetails.map((room, idx) => (
                                                <div key={idx} className="room-card">
                                                    <div className="room-name">{room.name}</div>
                                                    <div className="room-detail">{room.type}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="preference-section">
                                        <div className="preference-title">Usage Preferences</div>
                                        <div className="preference-row">
                                            <span className="preference-label">Chef Allowed</span>
                                            <span className="preference-value yes">Yes, with restrictions</span>
                                        </div>
                                        <div className="preference-row">
                                            <span className="preference-label">Events Allowed</span>
                                            <span className="preference-value yes">Small gatherings</span>
                                        </div>
                                        <div className="preference-row">
                                            <span className="preference-label">Locked Areas</span>
                                            <span className="preference-value flexible">Master closet, wine rack</span>
                                        </div>
                                        <div className="preference-row">
                                            <span className="preference-label">Home Type</span>
                                            <span className="preference-value">{homeowner.homeType}</span>
                                        </div>
                                    </div>

                                    <div className="preference-section">
                                        <div className="preference-title">Marketability Tips</div>
                                        <div className="card-body">
                                            <strong>Doing well:</strong><br/>
                                            - En-suite bathrooms in primary (major appeal)<br/>
                                            - Professional photos (renters notice this)<br/>
                                            - Host home designation (attracts higher-value renters)<br/><br/>
                                            <strong>Quick wins:</strong><br/>
                                            - White linens are expected -- consider upgrading to premium sets<br/>
                                            - Update AV description -- streaming services matter<br/>
                                            - Highlight neighborhood (Summerville is premium)
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* HOUSE INFO FORM */}
                            {activeSection === 'houseinfo' && (
                                <div>
                                    <div className="form-section">
                                        <div className="form-title">House Information for Renters</div>
                                        <div className="completion-bar">
                                            <div className="completion-fill" style={{width: `${Math.round(homeowner.houseInfoComplete / homeowner.houseInfoTotal * 100)}%`}}></div>
                                        </div>
                                        <div className="completion-text">
                                            {homeowner.houseInfoComplete} of {homeowner.houseInfoTotal} fields complete -- {homeowner.houseInfoTotal - homeowner.houseInfoComplete} remaining
                                        </div>

                                        {houseInfoFields.map((field, idx) => (
                                            <div key={idx} className="form-field">
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem'}}>
                                                    <label className="form-label">{field.name}</label>
                                                    {field.status === 'complete' ? (
                                                        <div className="field-complete">Complete</div>
                                                    ) : (
                                                        <div className="field-incomplete">Incomplete</div>
                                                    )}
                                                </div>
                                                <input type="text" className="form-input" placeholder={`Enter ${field.name.toLowerCase()}`} />
                                            </div>
                                        ))}

                                        <button className="btn-primary" style={{marginTop: '1.5rem'}}>Save Changes</button>
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Special Instructions for Guests</div>
                                        <div className="form-field">
                                            <label className="form-label">Add any special notes for your renter</label>
                                            <textarea className="form-textarea" placeholder="E.g., 'Please don't use the guest bath on the second floor', 'Coffee is in the pantry on the left'..."></textarea>
                                        </div>
                                        <button className="btn-primary">Save</button>
                                    </div>
                                </div>
                            )}

                            {/* AVAILABILITY */}
                            {activeSection === 'availability' && (
                                <div>
                                    <div className="calendar-header">
                                        <div className="month-year">April 2027</div>
                                        <div className="calendar-nav">
                                            <button className="calendar-btn">&larr; Previous</button>
                                            <button className="calendar-btn">Next &rarr;</button>
                                        </div>
                                    </div>

                                    <div className="calendar-check">
                                        <div className="check-title">Is your home still available for Masters 2027?</div>
                                        <div style={{marginBottom: '1rem', fontSize: '0.9rem', color: '#666'}}>Last updated: Mar 15, 2026</div>
                                        <div className="check-buttons">
                                            <button className="btn-primary">Yes, confirmed</button>
                                            <button className="btn-outline">Need to update</button>
                                        </div>
                                    </div>

                                    <div className="mini-calendar">
                                        {calendarDays.map((day, idx) => (
                                            <div key={idx} className="cal-day-name">{day.day}</div>
                                        ))}
                                        {calendarData.map((item, idx) => (
                                            <div key={idx} className={item ? `cal-day ${item.type}` : 'cal-day empty'}>
                                                {item ? item.num : ''}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="legend">
                                        <div className="legend-item">
                                            <div className="legend-color" style={{background: '#e8f3ec'}}></div>
                                            <span>Available</span>
                                        </div>
                                        <div className="legend-item">
                                            <div className="legend-color" style={{background: '#a8d5ba'}}></div>
                                            <span>Rented (Patron)</span>
                                        </div>
                                        <div className="legend-item">
                                            <div className="legend-color" style={{background: '#f5e8e0'}}></div>
                                            <span>Rented (Other broker)</span>
                                        </div>
                                        <div className="legend-item">
                                            <div className="legend-color" style={{background: '#e8e4df'}}></div>
                                            <span>Blocked (Personal use)</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* DOCUMENTS & PAYMENTS */}
                            {activeSection === 'documents' && (
                                <div>
                                    {/* Payout summary at top of documents */}
                                    <div className="form-section" style={{background: 'linear-gradient(135deg, #f0f7f3, #faf8f5)', borderColor: '#a8d5ba'}}>
                                        <div className="form-title">Your Payout Summary</div>
                                        <div className="card-stat" style={{padding: '0.75rem 0'}}>
                                            <span className="card-stat-label">Gross Rental</span>
                                            <span className="card-stat-value">${homeowner.grossRental.toLocaleString()}</span>
                                        </div>
                                        <div className="card-stat" style={{padding: '0.75rem 0'}}>
                                            <span className="card-stat-label">Patron Commission (15%)</span>
                                            <span className="card-stat-value" style={{color: '#c97a3f'}}>-${patronCut.toLocaleString()}</span>
                                        </div>
                                        <div className="card-stat" style={{padding: '0.75rem 0', borderBottom: 'none'}}>
                                            <span className="card-stat-label" style={{fontWeight: 600, color: '#2d5f47', fontSize: '1rem'}}>Your Net Payout</span>
                                            <span className="card-stat-value" style={{fontSize: '1.3rem'}}>${ownerPayout.toLocaleString()}</span>
                                        </div>
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Payment Tracker</div>
                                        <div className="card-stat" style={{padding: '1rem 0'}}>
                                            <div>
                                                <div className="status-label">Payment 1 (50% of your payout)</div>
                                                <div style={{marginTop: '0.25rem', fontSize: '0.9rem', color: '#666'}}>Received {homeowner.payment1.date}, 2026</div>
                                            </div>
                                            <div className="status-value success">${homeowner.payment1.amount.toLocaleString()}</div>
                                        </div>
                                        <div className="card-stat" style={{padding: '1rem 0', borderTop: '1px solid #e8e4df'}}>
                                            <div>
                                                <div className="status-label">Payment 2 (50% of your payout)</div>
                                                <div style={{marginTop: '0.25rem', fontSize: '0.9rem', color: '#666'}}>Due {homeowner.payment2.date}, 2026</div>
                                            </div>
                                            <div className="status-value warning">${homeowner.payment2.amount.toLocaleString()}</div>
                                        </div>
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Rental Agreement & Documents</div>
                                        {documents.map((doc, idx) => (
                                            <div key={idx} className="doc-item">
                                                <div className="doc-info">
                                                    <div className="doc-details">
                                                        <div className="doc-name">{doc.name}</div>
                                                        <div className="doc-meta">{doc.date} &middot; {doc.size}</div>
                                                    </div>
                                                </div>
                                                <div className="doc-actions">
                                                    <button className="doc-btn">View</button>
                                                    <button className="doc-btn">Download</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* POST-TOURNAMENT REVIEW */}
                            {activeSection === 'postevent' && (
                                <div>
                                    <div className="season-panel">
                                        <div className="season-panel-header">
                                            <div className="season-panel-title">Post-Tournament Review</div>
                                            <div className="season-badge complete">From Last Year</div>
                                        </div>
                                        <p style={{fontSize: '0.95rem', color: '#666', lineHeight: '1.6'}}>
                                            This section covers the post-tournament wrap-up: revenue summary, guest feedback, damage reports, and rebooking for next year.
                                        </p>
                                    </div>

                                    {renderChecklist(seasonContent['post-tournament'].items, 'Post-Tournament Checklist', true)}

                                    <div className="form-section">
                                        <div className="form-title">Report Issues (within 48 hours of checkout)</div>
                                        {issues.map(issue => (
                                            <div key={issue.id} className="issue-card">
                                                <div className="issue-header">
                                                    <div>
                                                        <div className="issue-title">{issue.title}</div>
                                                        <div style={{fontSize: '0.8rem', color: '#999', marginTop: '0.25rem'}}>Reported {issue.date}</div>
                                                    </div>
                                                    <div className={`issue-status status-${issue.status}`}>
                                                        {issue.status === 'submitted' ? 'Submitted' : 'Resolved'}
                                                    </div>
                                                </div>
                                                <div className="issue-description">{issue.desc}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Report New Issue</div>
                                        <div className="form-field">
                                            <label className="form-label">Issue Description</label>
                                            <textarea className="form-textarea" placeholder="Describe any damage or issues found after renter checkout..."></textarea>
                                        </div>
                                        <div className="form-field">
                                            <label className="form-label">Upload Photos</label>
                                            <button className="btn-secondary" style={{width: '100%', padding: '1rem'}}>Choose files</button>
                                        </div>
                                        <div className="form-field">
                                            <label className="form-label">Priority</label>
                                            <select className="form-input">
                                                <option>Low (cosmetic)</option>
                                                <option>Medium (functional)</option>
                                                <option>High (urgent repair needed)</option>
                                            </select>
                                        </div>
                                        <button className="btn-primary">Submit Issue Report</button>
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Renter Feedback</div>
                                        <div className="form-field">
                                            <label className="form-label">How was your experience with this renter?</label>
                                            <textarea className="form-textarea" placeholder="Optional: share feedback to help us match you with future renters..."></textarea>
                                        </div>
                                        <button className="btn-primary">Submit Feedback</button>
                                    </div>
                                </div>
                            )}

                            {/* RESOURCES & FAQ */}
                            {activeSection === 'resources' && (
                                <div>
                                    <div className="form-section">
                                        <div className="form-title">Resources</div>
                                        {resources.map((res, idx) => (
                                            <div key={idx} className="resource-item">
                                                <div className="resource-info">
                                                    <h3>{res.title}</h3>
                                                    <div className="resource-desc">{res.desc}</div>
                                                </div>
                                                <button className="resource-link">Download</button>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Contact Information</div>
                                        <div style={{lineHeight: '1.8'}}>
                                            <strong>Taite Williams</strong><br/>
                                            Patron Properties<br/>
                                            Email: taite@patronproperties.com<br/>
                                            Phone: (706) 555-0147<br/><br/>
                                            <em>Best time to reach: Monday-Friday, 9am-5pm ET</em>
                                        </div>
                                    </div>

                                    <div className="form-section">
                                        <div className="form-title">Frequently Asked Questions</div>
                                        {faqs.map((faq, idx) => (
                                            <div key={idx} className="faq-item">
                                                <div className="faq-question" onClick={() => setExpandedFaq(expandedFaq === idx ? null : idx)}>
                                                    <span>{faq.q}</span>
                                                    <span className={`faq-toggle ${expandedFaq === idx ? 'open' : ''}`}>&or;</span>
                                                </div>
                                                {expandedFaq === idx && (
                                                    <div className="faq-answer">{faq.a}</div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
