<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patron Properties — Prospect Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            padding: 20px;
        }

        .container { max-width: 1600px; margin: 0 auto; }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header-left .subtitle { color: #8b949e; font-size: 13px; margin-top: 2px; }
        .header-left .description { font-size: 12px; color: #6e7681; }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .api-badge {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 14px;
            color: #3fb950;
            font-size: 13px;
            font-weight: 500;
        }

        /* ===== KPI CARDS ===== */
        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .kpi-card .label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .kpi-card .value {
            font-size: 26px;
            font-weight: 700;
            color: #3fb950;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 220px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #388bfd;
            box-shadow: 0 0 0 3px rgba(56,139,253,0.1);
        }

        .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

        .btn-filter {
            padding: 8px 14px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-filter:hover { border-color: #58a6ff; color: #f0f6fc; }

        .btn-filter.active {
            background-color: #388bfd;
            border-color: #388bfd;
            color: white;
        }

        .btn-clean-toggle {
            padding: 8px 16px;
            background-color: #0d1117;
            border: 2px solid #d29922;
            color: #d29922;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-clean-toggle:hover { background-color: rgba(210,153,34,0.1); }

        .btn-clean-toggle.active {
            background-color: #d29922;
            color: #0d1117;
        }

        .btn-export {
            padding: 8px 14px;
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-export:hover { border-color: #58a6ff; color: #f0f6fc; }

        .sort-select {
            padding: 8px 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .sort-select:focus { outline: none; border-color: #388bfd; }

        .results-count {
            font-size: 12px;
            color: #6e7681;
            padding: 8px 0;
        }

        /* ===== PROPERTY CARD GRID ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            align-items: start;
        }

        .property-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .property-card:hover {
            border-color: #388bfd;
            box-shadow: 0 4px 16px rgba(56,139,253,0.08);
        }

        .property-card.clean-highlight {
            border-color: #d29922;
        }

        .property-card.clean-highlight:hover {
            border-color: #d29922;
            box-shadow: 0 4px 16px rgba(210,153,34,0.12);
        }

        .card-photo {
            width: 100%;
            height: 180px;
            background-color: #0d1117;
            overflow: hidden;
            position: relative;
        }

        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #30363d;
        }

        .card-photo-placeholder svg {
            width: 48px;
            height: 48px;
        }

        .score-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .score-90 { background-color: #2ea043; }
        .score-80 { background-color: #1a7f37; }
        .score-75 { background-color: #388bfd; }
        .score-60 { background-color: #6e7681; }

        .clean-badge-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            background-color: #d29922;
            color: #0d1117;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-new { background-color: rgba(56,139,253,0.2); color: #58a6ff; }
        .status-contacted { background-color: rgba(210,153,34,0.2); color: #d29922; }
        .status-interested { background-color: rgba(46,160,67,0.2); color: #3fb950; }
        .status-signed { background-color: rgba(46,160,67,0.4); color: #3fb950; }
        .status-passed { background-color: rgba(110,118,129,0.2); color: #6e7681; }

        .card-body { padding: 14px 16px; }

        .card-address {
            font-size: 15px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-owner {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 10px;
        }

        .card-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #8b949e;
        }

        .card-stats span { white-space: nowrap; }
        .card-stats .val { color: #f0f6fc; font-weight: 600; }

        .card-contact {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 10px;
            border-top: 1px solid #30363d;
        }

        .contact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .contact-info .icon { color: #8b949e; flex-shrink: 0; }

        .contact-info .text {
            color: #f0f6fc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dnc-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            background-color: rgba(248,81,73,0.15);
            color: #f85149;
            flex-shrink: 0;
        }

        .cell-tag {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 3px;
            background-color: rgba(56,139,253,0.15);
            color: #58a6ff;
            flex-shrink: 0;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            background-color: #0d1117;
        }

        .btn-call {
            color: #3fb950;
            border-color: rgba(63,185,80,0.3);
        }

        .btn-call:hover {
            background-color: rgba(63,185,80,0.1);
            border-color: #3fb950;
        }

        .btn-email-action {
            color: #58a6ff;
            border-color: rgba(88,166,255,0.3);
        }

        .btn-email-action:hover {
            background-color: rgba(56,139,253,0.1);
            border-color: #58a6ff;
        }

        .btn-maps-action {
            color: #8b949e;
            border-color: #30363d;
        }

        .btn-maps-action:hover {
            background-color: rgba(139,148,158,0.1);
            border-color: #8b949e;
        }

        /* ===== DETAIL MODAL ===== */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 100;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal-backdrop.active { display: flex; justify-content: center; align-items: flex-start; }

        .modal {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .modal-photo {
            width: 100%;
            height: 300px;
            background-color: #0d1117;
            overflow: hidden;
            position: relative;
        }

        .modal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background-color: rgba(0,0,0,0.6);
            border: none;
            color: #f0f6fc;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover { background-color: rgba(0,0,0,0.9); }

        .modal-body { padding: 24px; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #f0f6fc;
        }

        .modal-owner {
            font-size: 14px;
            color: #8b949e;
            margin-top: 2px;
        }

        .modal-score {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .modal-stat {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
        }

        .modal-stat .label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .modal-stat .value {
            font-size: 16px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .modal-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }

        .modal-contacts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .modal-contact-item {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
        }

        .modal-contact-number {
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 4px;
        }

        .modal-contact-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            background-color: rgba(56,139,253,0.15);
            color: #58a6ff;
            border-radius: 3px;
            margin: 2px;
        }

        .modal-contact-badge.dnc {
            background-color: rgba(248,81,73,0.15);
            color: #f85149;
        }

        .modal-emails {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .modal-email-item {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #58a6ff;
            word-break: break-all;
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .score-label {
            font-size: 12px;
            color: #8b949e;
            min-width: 70px;
        }

        .score-progress {
            flex: 1;
            height: 8px;
            background-color: #0d1117;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background-color: #3fb950;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .score-value {
            font-size: 12px;
            font-weight: 600;
            color: #f0f6fc;
            min-width: 35px;
            text-align: right;
        }

        .modal-status-select {
            padding: 6px 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #f0f6fc;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .modal-status-select:focus {
            outline: none;
            border-color: #388bfd;
        }

        .notes-textarea {
            width: 100%;
            padding: 10px 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 70px;
            margin-top: 8px;
        }

        .notes-textarea:focus {
            outline: none;
            border-color: #388bfd;
            box-shadow: 0 0 0 3px rgba(56,139,253,0.1);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }

        .modal-actions a, .modal-actions button {
            flex: 1;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
        }

        .modal-btn-call {
            background-color: #2ea043;
            color: white;
        }

        .modal-btn-call:hover { background-color: #26843a; }

        .modal-btn-email {
            background-color: #388bfd;
            color: white;
        }

        .modal-btn-email:hover { background-color: #1f6feb; }

        .modal-btn-maps {
            background-color: #0d1117;
            border: 1px solid #30363d !important;
            color: #8b949e;
        }

        .modal-btn-maps:hover { color: #f0f6fc; border-color: #58a6ff !important; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            padding: 14px 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
        }

        .filter-bar-label {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12px;
            color: #8b949e;
            white-space: nowrap;
        }

        .filter-select {
            padding: 6px 10px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #f0f6fc;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #388bfd;
            box-shadow: 0 0 0 3px rgba(56,139,253,0.1);
        }

        .filter-pills {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 5px 10px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-pill:hover { border-color: #58a6ff; color: #f0f6fc; }

        .filter-pill.active {
            background-color: #388bfd;
            border-color: #388bfd;
            color: white;
        }

        .filter-divider {
            width: 1px;
            height: 24px;
            background-color: #30363d;
            margin: 0 4px;
        }

        .btn-clear-filters {
            padding: 5px 10px;
            background: none;
            border: 1px solid transparent;
            color: #f85149;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            margin-left: auto;
        }

        .btn-clear-filters:hover { border-color: #f85149; }

        .active-filters-summary {
            font-size: 11px;
            color: #d29922;
            padding: 4px 0 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .card-grid { grid-template-columns: 1fr; }
            .modal-grid { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .modal-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>PATRON PROPERTIES</h1>
                <div class="subtitle">Prospect Pipeline</div>
                <div class="description" id="resultCount">110 Tier 1 Prospects &bull; Augusta, GA 30904</div>
            </div>
            <div class="header-right">
                <div class="api-badge">&#x2705; Street View Active</div>
            </div>
        </header>

        <div class="kpi-cards">
            <div class="kpi-card">
                <div class="label">Total Prospects</div>
                <div class="value" id="kpiTotal">110</div>
            </div>
            <div class="kpi-card">
                <div class="label">With Phone</div>
                <div class="value" id="kpiPhone">&mdash;</div>
            </div>
            <div class="kpi-card">
                <div class="label">With Email</div>
                <div class="value" id="kpiEmail">&mdash;</div>
            </div>
            <div class="kpi-card">
                <div class="label">Clean Cell / No DNC</div>
                <div class="value" id="kpiClean">&mdash;</div>
            </div>
            <div class="kpi-card">
                <div class="label">Avg Patron Score</div>
                <div class="value" id="kpiAvgScore">&mdash;</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by address, name, phone, email...">
            </div>
            <div class="filter-buttons">
                <button class="btn-filter active" data-filter="all">All</button>
                <button class="btn-filter" data-filter="90">90+</button>
                <button class="btn-filter" data-filter="80">80-89</button>
                <button class="btn-filter" data-filter="75">75-79</button>
            </div>
            <button class="btn-clean-toggle" id="cleanToggle">&#x1F4DE; Clean Outreach Only</button>
            <select class="sort-select" id="sortSelect">
                <option value="score-desc">Score: High &rarr; Low</option>
                <option value="score-asc">Score: Low &rarr; High</option>
                <option value="address">Address: A &rarr; Z</option>
                <option value="value-desc">Value: High &rarr; Low</option>
                <option value="beds-desc">Beds: Most &rarr; Least</option>
            </select>
            <button class="btn-export" id="exportBtn">Export CSV</button>
        </div>

        <!-- PROPERTY FILTER BAR -->
        <div class="filter-bar">
            <span class="filter-bar-label">Filters</span>

            <div class="filter-group">
                <label>Beds</label>
                <div class="filter-pills" id="bedFilter">
                    <button class="filter-pill active" data-val="any">Any</button>
                    <button class="filter-pill" data-val="2">2+</button>

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            allProspects = PROSPECT_DATA;
            allProspects.forEach((p, i) => {
                p.id = i;
                if (!p.status) p.status = 'New';
                if (!p.notes) p.notes = '';
            });
            updateKPIs();
            filteredProspects = [...allProspects];
            renderGrid();

            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('sortSelect').addEventListener('change', applyFilters);

            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentScoreFilter = btn.dataset.filter;
                    applyFilters();
                });
            });

            document.getElementById('cleanToggle').addEventListener('click', () => {
                cleanOnly = !cleanOnly;
                document.getElementById('cleanToggle').classList.toggle('active', cleanOnly);
                applyFilters();
            });

            document.getElementById('exportBtn').addEventListener('click', exportCSV);

            // Bed pills
            document.querySelectorAll('#bedFilter .filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('#bedFilter .filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    bedMin = pill.dataset.val;
                    applyFilters();
                });
            });

            // Bath pills
            document.querySelectorAll('#bathFilter .filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('#bathFilter .filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    bathMin = pill.dataset.val;
                    applyFilters();
                });
            });

            // Value select
            document.getElementById('valueFilter').addEventListener('change', (e) => {
                valueRange = e.target.value;
                applyFilters();
            });

            // Sqft select
            document.getElementById('sqftFilter').addEventListener('change', (e) => {
                sqftMin = e.target.value;
                applyFilters();
            });

            // Clear all filters
            document.getElementById('clearFilters').addEventListener('click', () => {
                bedMin = 'any'; bathMin = 'any'; valueRange = 'any'; sqftMin = 'any';
                currentScoreFilter = 'all'; cleanOnly = false;
                document.getElementById('searchInput').value = '';
                document.getElementById('valueFilter').value = 'any';
                document.getElementById('sqftFilter').value = 'any';
                document.getElementById('sortSelect').value = 'score-desc';
                document.getElementById('cleanToggle').classList.remove('active');
                document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                document.querySelector('.btn-filter[data-filter="all"]').classList.add('active');
                document.querySelectorAll('#bedFilter .filter-pill').forEach(p => p.classList.remove('active'));
                document.querySelector('#bedFilter .filter-pill[data-val="any"]').classList.add('active');
                document.querySelectorAll('#bathFilter .filter-pill').forEach(p => p.classList.remove('active'));
                document.querySelector('#bathFilter .filter-pill[data-val="any"]').classList.add('active');
                applyFilters();
            });

            document.getElementById('modalBackdrop').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        });

        // ===== KPIs =====
        function updateKPIs() {
            const src = allProspects;
            document.getElementById('kpiTotal').textContent = src.length;
            document.getElementById('kpiPhone').textContent = src.filter(p => p.phones?.length).length;
            document.getElementById('kpiEmail').textContent = src.filter(p => p.emails?.length).length;
            document.getElementById('kpiClean').textContent = src.filter(p => p.is_clean_cell_no_dnc).length;
            document.getElementById('kpiAvgScore').textContent = (src.reduce((s, p) => s + p.patron_score, 0) / src.length).toFixed(0);
        }

        // ===== HELPERS =====
        function getScoreClass(score) {
            if (score >= 90) return 'score-90';
            if (score >= 80) return 'score-80';
            if (score >= 75) return 'score-75';
            return 'score-60';
        }

        function formatCurrency(val) {
            if (!val) return '$0';
            return '$' + parseInt(val).toLocaleString();
        }

        function formatPhone(num) {
            if (!num) return '';
            const c = num.replace(/\D/g, '');
            if (c.length === 10) return `(${c.slice(0,3)}) ${c.slice(3,6)}-${c.slice(6)}`;
            return num;
        }

        function getStatusClass(status) {
            return 'status-' + (status || 'new').toLowerCase();
        }

        function getBestPhone(p) {
            if (!p.phones?.length) return null;
            // Prefer clean cell first
            const cleanCell = p.phones.find(ph => ph.type === 'Cell' && !ph.dnc);
            if (cleanCell) return cleanCell;
            const cell = p.phones.find(ph => ph.type === 'Cell');
            if (cell) return cell;
            return p.phones[0];
        }

        // ===== FILTER & SORT =====
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;

            filteredProspects = allProspects.filter(p => {
                // Score filter
                if (currentScoreFilter === '90' && p.patron_score < 90) return false;
                if (currentScoreFilter === '80' && (p.patron_score < 80 || p.patron_score >= 90)) return false;
                if (currentScoreFilter === '75' && (p.patron_score < 75 || p.patron_score >= 80)) return false;

                // Clean outreach filter
                if (cleanOnly && !p.is_clean_cell_no_dnc) return false;

                // Bedrooms filter
                if (bedMin !== 'any' && (parseInt(p.beds) || 0) < parseInt(bedMin)) return false;

                // Bathrooms filter
                if (bathMin !== 'any' && (parseFloat(p.baths) || 0) < parseInt(bathMin)) return false;

                // Value filter
                if (valueRange !== 'any') {
                    const v = p.est_value || 0;
                    if (valueRange === '0-200' && v >= 200000) return false;
                    if (valueRange === '200-400' && (v < 200000 || v >= 400000)) return false;
                    if (valueRange === '400-600' && (v < 400000 || v >= 600000)) return false;
                    if (valueRange === '600-1000' && (v < 600000 || v >= 1000000)) return false;
                    if (valueRange === '1000+' && v < 1000000) return false;
                }

                // Sqft filter
                if (sqftMin !== 'any' && (parseInt(p.sqft) || 0) < parseInt(sqftMin)) return false;

                // Search
                if (search) {
                    const haystack = [
                        p.property_address,
                        p.owner_name,
                        p.owner_2_name,
                        ...(p.phones || []).map(ph => ph.number),
                        ...(p.emails || [])
                    ].join(' ').toLowerCase();
                    if (!haystack.includes(search)) return false;
                }

                return true;
            });

            // Sort
            filteredProspects.sort((a, b) => {
                switch (sort) {
                    case 'score-desc': return b.patron_score - a.patron_score;
                    case 'score-asc': return a.patron_score - b.patron_score;
                    case 'address': return a.property_address.localeCompare(b.property_address);
                    case 'value-desc': return (b.est_value || 0) - (a.est_value || 0);
                    case 'beds-desc': return (parseInt(b.beds) || 0) - (parseInt(a.beds) || 0);
                    default: return 0;
                }
            });

            renderGrid();
        }

        // ===== RENDER CARD GRID =====
        function renderGrid() {
            const grid = document.getElementById('cardGrid');
            const total = allProspects.length;
            const showing = filteredProspects.length;
            document.getElementById('resultCount').textContent =
                showing === total
                    ? `${total} Tier 1 Prospects \u2022 Augusta, GA 30904`
                    : `Showing ${showing} of ${total} prospects`;

            grid.innerHTML = filteredProspects.map(p => {
                const streetView = `https://maps.googleapis.com/maps/api/streetview?size=600x300&location=${encodeURIComponent(p.property_address + ', Augusta, GA 30904')}&key=${apiKey}`;
                const phone = getBestPhone(p);
                const email = p.emails?.[0];
                const isClean = p.is_clean_cell_no_dnc;

                return `
                <div class="property-card${isClean ? ' clean-highlight' : ''}" onclick="openModal(${p.id})">
                    <div class="card-photo">
                        <img src="${streetView}" loading="lazy" alt="${p.property_address}">
                        <div class="score-overlay ${getScoreClass(p.patron_score)}">${p.patron_score}</div>
                        ${isClean ? '<div class="clean-badge-overlay">CLEAN</div>' : ''}
                        ${p.status !== 'New' ? `<div class="status-overlay ${getStatusClass(p.status)}">${p.status}</div>` : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-address">${p.property_address}</div>
                        <div class="card-owner">${p.owner_name}${p.owner_2_name ? ' & ' + p.owner_2_name : ''}</div>
                        <div class="card-stats">
                            <span><span class="val">${p.beds}</span> bd / <span class="val">${p.baths}</span> ba</span>
                            <span><span class="val">${p.sqft ? parseInt(p.sqft).toLocaleString() : '-'}</span> sqft</span>
                            <span><span class="val">${formatCurrency(p.est_value)}</span></span>
                        </div>
                        <div class="card-contact">
                            ${phone ? `
                            <div class="contact-row">
                                <div class="contact-info">
                                    <span class="icon">&#x1F4F1;</span>
                                    <span class="text">${formatPhone(phone.number)}</span>
                                </div>
                                ${phone.type === 'Cell' ? '<span class="cell-tag">CELL</span>' : ''}
                                ${phone.dnc ? '<span class="dnc-tag">DNC</span>' : ''}
                            </div>` : '<div class="contact-row"><span style="color:#6e7681;font-size:12px;">No phone</span></div>'}
                            ${email ? `
                            <div class="contact-row">
                                <div class="contact-info">
                                    <span class="icon">&#x2709;</span>
                                    <span class="text">${email}</span>
                                </div>
                            </div>` : ''}
                        </div>
                        <div class="card-actions" onclick="event.stopPropagation()">
                            ${phone ? `<a href="tel:${phone.number}" class="btn-action btn-call">&#x1F4DE; Call</a>` : '<span class="btn-action" style="opacity:0.3;cursor:default">No Phone</span>'}
                            ${email ? `<a href="mailto:${email}" class="btn-action btn-email-action">&#x2709; Email</a>` : '<span class="btn-action" style="opacity:0.3;cursor:default">No Email</span>'}
                            <a href="${p.google_maps_url}" target="_blank" class="btn-action btn-maps-action" title="Google Maps">&#x1F5FA;</a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ===== MODAL =====
        function openModal(id) {
            const p = allProspects.find(x => x.id === id);
            if (!p) return;

            const streetView = `https://maps.googleapis.com/maps/api/streetview?size=900x400&location=${encodeURIComponent(p.property_address + ', Augusta, GA 30904')}&key=${apiKey}`;

            const contactsHtml = (p.phones || []).map(ph => `
                <div class="modal-contact-item">
                    <div class="modal-contact-number">${formatPhone(ph.number)}</div>
                    <span class="modal-contact-badge">${ph.type}</span>
                    ${ph.dnc ? '<span class="modal-contact-badge dnc">DNC</span>' : ''}
                </div>
            `).join('');

            const emailsHtml = (p.emails || []).map(e => `<div class="modal-email-item">${e}</div>`).join('');

            const scoringHtml = [
                { label: 'Proximity', val: p.scoring.proximity, max: 30 },
                { label: 'Value', val: p.scoring.value, max: 25 },
                { label: 'Beds', val: p.scoring.beds, max: 20 },
                { label: 'Equity', val: p.scoring.equity, max: 15 },
                { label: 'Sqft', val: p.scoring.sqft, max: 10 }
            ].map(s => `
                <div class="score-bar">
                    <div class="score-label">${s.label}</div>
                    <div class="score-progress"><div class="score-fill" style="width:${(s.val / s.max) * 100}%"></div></div>
                    <div class="score-value">${s.val}/${s.max}</div>
                </div>
            `).join('');

            const mailingDiff = p.mailing_address !== p.property_address
                ? `<div class="modal-stat"><div class="label">Mailing</div><div class="value" style="font-size:13px;">${p.mailing_address}, ${p.mailing_city} ${p.mailing_state} ${p.mailing_zip}</div></div>`
                : '';

            const phone = getBestPhone(p);
            const email = p.emails?.[0];

            document.getElementById('modalContent').innerHTML = `
                <div class="modal-photo">
                    <img src="${streetView}" alt="${p.property_address}">
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-header">
                        <div>
                            <div class="modal-title">${p.property_address}</div>
                            <div class="modal-owner">${p.owner_name}${p.owner_2_name ? ' & ' + p.owner_2_name : ''}</div>
                        </div>
                        <div style="display:flex;gap:10px;align-items:center;">
                            <select class="modal-status-select" onchange="updateStatus(${p.id}, this.value)">
                                ${['New','Contacted','Interested','Signed','Passed'].map(s =>
                                    `<option value="${s}" ${p.status === s ? 'selected' : ''}>${s}</option>`
                                ).join('')}
                            </select>
                            <div class="modal-score ${getScoreClass(p.patron_score)}">${p.patron_score}</div>
                        </div>
                    </div>

                    <div class="modal-grid">
                        <div class="modal-stat"><div class="label">Est Value</div><div class="value">${formatCurrency(p.est_value)}</div></div>
                        <div class="modal-stat"><div class="label">Equity</div><div class="value">${formatCurrency(p.est_equity)}</div></div>
                        <div class="modal-stat"><div class="label">Beds / Baths</div><div class="value">${p.beds} / ${p.baths}</div></div>
                        <div class="modal-stat"><div class="label">Sqft</div><div class="value">${p.sqft ? parseInt(p.sqft).toLocaleString() : '-'}</div></div>
                        <div class="modal-stat"><div class="label">Year Built</div><div class="value">${p.year_built}</div></div>
                        <div class="modal-stat"><div class="label">LTV</div><div class="value">${p.ltv_pct ? p.ltv_pct.toFixed(1) : '-'}%</div></div>
                        <div class="modal-stat"><div class="label">Owner Occupied</div><div class="value">${p.owner_occupied}</div></div>
                        <div class="modal-stat"><div class="label">Last Sale</div><div class="value">${formatCurrency(p.last_sale_price)}<br><span style="font-size:11px;color:#8b949e;">${p.last_sale_date}</span></div></div>
                        ${mailingDiff}
                    </div>

                    <div class="modal-section-title">Phones</div>
                    <div class="modal-contacts">${contactsHtml || '<span style="color:#6e7681;font-size:12px;">No phones on file</span>'}</div>

                    <div class="modal-section-title">Emails</div>
                    <div class="modal-emails">${emailsHtml || '<span style="color:#6e7681;font-size:12px;">No emails on file</span>'}</div>

                    <div class="modal-section-title">Patron Score Breakdown</div>
                    ${scoringHtml}

                    <div class="modal-section-title">Notes</div>
                    <textarea class="notes-textarea" onchange="updateNotes(${p.id}, this.value)" placeholder="Add notes...">${prospectNotes[p.id] || p.notes || ''}</textarea>

                    <div class="modal-actions">
                        ${phone ? `<a href="tel:${phone.number}" class="modal-btn-call">&#x1F4DE; Call ${formatPhone(phone.number)}</a>` : ''}
                        ${email ? `<a href="mailto:${email}" class="modal-btn-email">&#x2709; Email</a>` : ''}
                        <a href="${p.google_maps_url}" target="_blank" class="modal-btn-maps">&#x1F5FA; Google Maps</a>
                    </div>
                </div>
            `;

            document.getElementById('modalBackdrop').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateStatus(id, status) {
            const p = allProspects.find(x => x.id === id);
            if (p) { p.status = status; renderGrid(); }
        }

        function updateNotes(id, text) {
            prospectNotes[id] = text;
        }

        function exportCSV() {
            const headers = ['Score','Address','Owner','Phone 1','Phone 1 Type','Phone 1 DNC','Phone 2','Email 1','Email 2','Beds','Baths','Sqft','Est Value','Est Equity','LTV %','Clean Cell','Status'];
            const rows = filteredProspects.map(p => [
                p.patron_score,
                p.property_address,
                p.owner_name,
                p.phones?.[0]?.number || '',
                p.phones?.[0]?.type || '',
                p.phones?.[0]?.dnc ? 'Y' : 'N',
                p.phones?.[1]?.number || '',
                p.emails?.[0] || '',
                p.emails?.[1] || '',
                p.beds, p.baths, p.sqft,
                p.est_value, p.est_equity,
                p.ltv_pct?.toFixed(2) || '',
                p.is_clean_cell_no_dnc ? 'Y' : 'N',
                p.status
            ]);
            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(c => {
                    const s = String(c ?? '');
                    return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
                }).join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'patron-prospects.csv';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
